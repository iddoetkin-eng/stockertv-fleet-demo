<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#FAF7F2" id="theme-color-meta">
  <title>StockerTV — Unified Demo</title>

  <!-- Pre-paint theme. Light default per Beat 3 lock. Stateless try/catch. -->
  <script>
    (function(){try{var t=localStorage.getItem('stv-theme')||'light';document.documentElement.dataset.theme=t;var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content',t==='light'?'#FAF7F2':'#0A0B0F');}catch(e){document.documentElement.dataset.theme='light';}})();
  </script>

  <!-- Editorial typography per Beat 3.A -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Editorial fonts (Fraunces/Inter/JetBrains Mono) + native-language flavor fonts (E5):
       Bitter (DE) · Cormorant Garamond (IT/PT/ES) · Marcellus (FR) · Noto Serif JP (JP).
       font-display: swap so they don't block paint. -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Bitter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&family=Noto+Serif+JP:wght@400;500&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Bitter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">

  <!-- Locked CDN versions per Beat 5.A. No @latest. -->
  <script src="https://cdn.tailwindcss.com?v=3.4.1"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    /* ============ NEUTRAL SUBSTRATE — set ONCE on first paint ============ */
    :root[data-theme='dark'] {
      --bg: #0A0B0F;
      --text-primary: #FAF7F2;
      --text-muted: #888c98;
      --border: rgba(255,255,255,0.08);
      --surface: #13151c;
      --surface-elevated: #1a1d27;
    }
    :root[data-theme='light'] {
      /* Newspaper-print palette per audit 2.4. Stronger card-to-bg separation. */
      --bg: #F4F0E8;
      --text-primary: #14171F;
      --text-muted: #666c78;
      --border: rgba(0,0,0,0.10);
      --surface: #FFFFFF;
      --surface-elevated: #FBF7EE;
    }
    :root {
      --red: #ef4444;
      --green: #22c55e; /* neutral fallback; brand-switch may override per B.4.D 3-way rule */
      /* Brand-specific vars — eToro defaults. Overwritten by brand-switch handler. */
      --accent: #6AAE22;
      --accent-deep: #8FC850;
      --accent-2: #A8D96E;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .display { font-family: 'Fraunces', Georgia, serif; font-feature-settings: 'liga', 'dlig'; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }

    /* Illustration base — audit 6.1 */
    .illust {
      display: block;
      max-width: 100%;
      color: var(--text-primary);
      transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .illust--newsroom {
      width: min(600px, 90vw);
      height: 80px;
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-fade-in 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 3500ms forwards;
    }
    .illust--stagemap {
      width: 100%;
      height: 60px;
      margin: 0 auto 1.5rem;
      opacity: 0.92;
    }
    .illust--phone {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
    }
    .illust--horizon {
      width: min(500px, 80vw);
      height: 60px;
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-fade-in 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 2600ms forwards;
    }

    /* Reduced-motion respect per Beat 3.C */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============ TEXTURE OVERLAYS — Beat 3.D ============ */
    .stv-grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 9998;
      mix-blend-mode: multiply;
    }
    :root[data-theme='dark'] .stv-grain { mix-blend-mode: screen; opacity: 0.04; }

    .stv-paper-fiber {
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent 0 2px, rgba(0,0,0,0.018) 2px 3px),
        repeating-linear-gradient(-45deg, transparent 0 2px, rgba(0,0,0,0.018) 2px 3px);
      opacity: 1;
      pointer-events: none;
      z-index: 9997;
    }
    :root[data-theme='dark'] .stv-paper-fiber { opacity: 0.3; mix-blend-mode: lighten; }

    /* ============ ATMOSPHERE — blur orbs + parallax (audit C1+C2) ============ */
    .stv-atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-orb {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent) 18%, transparent) 0%, transparent 60%);
      filter: blur(80px);
      opacity: 0.85;
      will-change: transform;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-orb--a { top: -380px; left: -300px; }
    .stv-orb--b { bottom: -360px; right: -260px; width: 720px; height: 720px;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent-deep) 14%, transparent) 0%, transparent 60%);
    }
    .stv-orb--c { top: 30%; right: -380px; width: 600px; height: 600px;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent-2) 10%, transparent) 0%, transparent 65%);
    }
    /* Beat-specific orb position overrides for "glow signature per scene" */
    body[data-beat='hook']     .stv-orb--a { top: -200px; left: 50%; transform: translateX(-50%); }
    body[data-beat='brand']    .stv-orb--a { top: -300px; right: -250px; left: auto; }
    body[data-beat='scale']    .stv-orb--c { top: 50%; right: 30%; }
    body[data-beat='safety']   .stv-orb--b { bottom: -400px; left: -200px; right: auto; }
    body[data-beat='pipeline'] .stv-orb--a { top: -300px; left: 30%; }
    body[data-beat='output']   .stv-orb--c { top: 20%; left: -300px; right: auto; }
    body[data-beat='close']    .stv-orb--a { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 1000px; }
    /* Parallax variable applied via JS — translates whole atmosphere up to ±10px */
    .stv-atmosphere {
      transform: translate(var(--paraX, 0px), var(--paraY, 0px));
      transition: transform 800ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stv-watermark {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .stv-watermark-track {
      display: inline-block;
      white-space: nowrap;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 8rem;
      line-height: 1;
      color: var(--text-primary);
      opacity: 0.04;
      animation: stv-watermark-scroll 240s linear infinite;
      will-change: transform;
    }
    @keyframes stv-watermark-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ============ BEAT 1 — HOOK ============ */
    .boot-stage {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
    }
    .boot-stage::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 95%);
      opacity: 0.6;
      pointer-events: none;
    }
    .boot-content { text-align: center; position: relative; z-index: 1; }
    .boot-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 200ms forwards;
      margin-bottom: 1.5rem;
    }
    .boot-wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 1;
      letter-spacing: -0.03em;
      filter: blur(20px);
      opacity: 0;
      animation: stv-blur-focus 1800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .boot-wordmark-stocker { color: var(--text-primary); }
    .boot-wordmark-tv { color: var(--accent); font-style: italic; transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1); }
    .boot-checks {
      margin-top: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      align-items: center;
    }
    .boot-check {
      opacity: 0;
      animation: stv-check-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .boot-check-tick {
      color: var(--green);
      margin-right: 0.4rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-check-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .boot-status {
      margin-top: 1.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .boot-status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: stv-pulse 1800ms ease-in-out infinite;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .boot-stage.fading-out {
      animation: stv-fade-out 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes stv-blur-focus {
      0%   { filter: blur(20px); opacity: 0; transform: scale(1.1); }
      60%  { filter: blur(0px); opacity: 1; transform: scale(1.02); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    @keyframes stv-fade-in {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes stv-fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes stv-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .hook-stage {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      opacity: 0;
      animation: stv-hook-enter 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 400ms forwards;
    }
    /* Background wash beneath the Hook hero (audit 2.2.a) */
    .hook-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 45%, color-mix(in srgb, var(--accent) 9%, transparent) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.32em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .hook-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Round 2 — dual hero flow: 47 sec → 5 min */
    .hook-hero-flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.75rem, 2vw, 2rem);
      flex-wrap: wrap;
      margin: 0;
    }
    .hook-hero-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      position: relative;
      min-width: 0;
    }
    .hook-hero-number {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      margin: 0;
      font-feature-settings: 'liga', 'dlig', 'onum';
      font-variation-settings: 'opsz' 144;
      position: relative;
      display: inline-flex;
      align-items: baseline;
      gap: 0.35rem;
    }
    /* Brand-accent glow under each hero number (audit 2.2.b) */
    .hook-hero-number::before {
      content: '';
      position: absolute;
      inset: 12% -10%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 40%, transparent) 0%, transparent 65%);
      filter: blur(50px);
      z-index: -1;
      pointer-events: none;
      opacity: 0;
      animation: stv-glow-in 1600ms cubic-bezier(0.25, 0.1, 0.25, 1) 2200ms forwards;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-glow-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .hook-hero-caption {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3300ms forwards;
    }
    .hook-hero-connector {
      width: clamp(60px, 12vw, 180px);
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: stv-fade-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 2700ms forwards;
    }
    .hook-hero-connector svg {
      width: 100%;
      height: 100%;
      display: block;
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-hero-connector svg path {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: stv-connector-draw 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 2900ms forwards;
    }
    @keyframes stv-connector-draw {
      to { stroke-dashoffset: 0; }
    }
    @media (max-width: 600px) {
      .hook-hero-connector {
        width: 26px;
        height: 60px;
        transform: rotate(90deg);
      }
    }
    .hook-hero-unit {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--accent);
      letter-spacing: -0.01em;
      transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      animation: stv-fade-in 500ms cubic-bezier(0.25, 0.1, 0.25, 1) 2700ms forwards;
      display: inline-block;
    }
    /* Underline shimmer beneath hero numbers (audit 3.2) */
    .hook-hero-shimmer {
      display: block;
      position: absolute;
      left: 50%;
      bottom: -0.4em;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
      opacity: 0;
      animation: stv-shimmer 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3100ms forwards;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-shimmer {
      0%   { opacity: 0; transform: translateX(-150%); width: 30%; }
      40%  { opacity: 0.85; }
      100% { opacity: 0; transform: translateX(50%); width: 80%; }
    }
    /* E1 — living counter beneath hook scene */
    .hook-counter {
      margin-top: 3rem;
      display: inline-flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.5rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 4500ms forwards;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-counter-value {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--accent);
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: none;
    }
    .hook-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.5vw, 16px);
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-top: 3rem;
      max-width: 56ch;
      line-height: 1.6;
      opacity: 0;
      animation: stv-fade-in 1000ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .hook-subline-emphasis { color: var(--text-primary); font-weight: 500; }
    .hook-continue {
      margin-top: 4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 4200ms forwards;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: color 200ms ease, border-color 200ms ease;
      border: 1px solid transparent;
      border-radius: 2px;
      background: transparent;
      font-weight: 500;
    }
    .hook-continue:hover { color: var(--accent); border-color: var(--border); }
    .hook-continue-arrow { display: inline-block; margin-left: 0.5rem; transition: transform 200ms ease; }
    .hook-continue:hover .hook-continue-arrow { transform: translateX(4px); }
    .hook-accent-line {
      width: 60px; height: 1px;
      background: var(--accent);
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-line-grow 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 2600ms forwards;
      transform-origin: center;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-line-grow { from { opacity: 0; transform: scaleX(0); } to { opacity: 1; transform: scaleX(1); } }
    @keyframes stv-hero-reveal {
      0%   { filter: blur(28px); opacity: 0; transform: scale(1.15); }
      55%  { filter: blur(0px); opacity: 1; transform: scale(1.02); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    @keyframes stv-hook-enter { from { opacity: 0; } to { opacity: 1; } }

    /* ============ TOP BAR (Beats 2-7) ============ */
    .stv-topbar {
      position: sticky;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), border-color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-left {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .stv-topbar-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.125rem;
      line-height: 1;
      letter-spacing: -0.015em;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .stv-topbar-mark .stv-mark-tv {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-mark .stv-mark-for {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: -0.01em;
      opacity: 0.92;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-mark .stv-mark-divider {
      color: var(--text-muted);
      font-style: normal;
      font-weight: 400;
      opacity: 0.55;
    }

    /* Beat indicator ("03 / 07 · Scale reveal") audit 1.2 */
    .stv-topbar-beat {
      display: none;
      align-items: baseline;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding-left: 0.875rem;
      margin-left: 0.5rem;
      border-left: 1px solid var(--border);
    }
    .stv-topbar-beat-num {
      color: var(--text-primary);
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .stv-topbar-beat-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: -0.005em;
      color: var(--text-primary);
      text-transform: none;
      opacity: 0.85;
    }
    @media (min-width: 880px) {
      .stv-topbar-beat { display: inline-flex; }
    }

    /* Brand-switch full-screen flash (audit 1.4 + E2) */
    .stv-brand-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9990;
      opacity: 0;
      background:
        radial-gradient(ellipse at var(--flashX, 50%) var(--flashY, 50%),
          color-mix(in srgb, var(--accent) 22%, transparent) 0%,
          color-mix(in srgb, var(--accent) 8%, transparent) 30%,
          transparent 65%);
    }
    .stv-brand-flash[data-firing='true'] {
      animation: stv-brand-flash-anim 620ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-brand-flash-anim {
      0%   { opacity: 0; transform: scale(0.6); }
      35%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    /* Brand-pill hover tooltip (audit 1.3) */
    .stv-brand-pill {
      position: relative;
    }
    .stv-brand-pill[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      z-index: 51;
    }
    .stv-brand-pill[data-tooltip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .stv-brand-pill[data-tooltip]::before {
      content: '';
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      transform: translateX(-50%) rotate(45deg);
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 52;
    }
    .stv-brand-pill[data-tooltip]:hover::before { opacity: 1; }

    /* Brand-pill active text contrast — explicit luminance handling per audit 1.3.b */
    /* Use white text for green, blue, navy primaries (most brands); black for very light */
    .stv-brand-pill[data-active='true'] .stv-brand-pill-initials { color: #fff; mix-blend-mode: normal; }
    .stv-topbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
    }
    .stv-topbar-status {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .stv-topbar-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: stv-pulse 2400ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (min-width: 720px) {
      .stv-topbar-status { display: flex; }
    }
    .stv-topbar-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      background: var(--surface-elevated);
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .stv-brand-pill {
      min-width: 38px;
      height: 32px;
      padding: 0 0.625rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      transition: background 220ms ease, color 220ms ease, transform 220ms ease;
      position: relative;
    }
    .stv-brand-pill:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    .stv-brand-pill[data-active='true'] {
      color: var(--text-primary);
      background: var(--accent);
      transform: scale(1.06);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    /* Explicit override below in tooltip section sets active-text color to white via mix-blend-mode: normal */
    .stv-brand-pill-initials {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
      font-size: 11px;
      font-weight: 700;
    }
    .stv-topbar-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stv-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
    }
    .stv-icon-btn:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    .stv-icon-btn svg { width: 14px; height: 14px; }

    /* ============ APP FRAME (post-Hook content area) ============ */
    .stv-app-frame {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: stv-frame-enter 700ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .stv-app-content {
      flex: 1;
      position: relative;
    }
    @keyframes stv-frame-enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ============ BEAT 2 — BRAND LOCK-IN ============ */
    .brand-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 0;
      position: relative;
    }
    /* Background wash on brand scene */
    .brand-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 40%, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 65%);
      pointer-events: none;
      z-index: -1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.20em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .brand-scene-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-builtfor {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      line-height: 1.1;
      margin: 0 0 0.5rem 0;
    }
    .brand-scene-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(5rem, 14vw, 11rem);
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 0.9;
      margin: 0.5rem 0 0 0;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
      animation: stv-brand-name-pop 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes stv-brand-name-pop {
      0% { opacity: 0; filter: blur(8px); transform: scale(0.97); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }
    .brand-scene-line {
      width: 80px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
    }
    .brand-scene-subline strong {
      color: var(--text-primary);
      font-weight: 500;
    }
    .brand-scene-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 1rem;
      max-width: 720px;
      width: 100%;
      margin: 1rem auto 3rem;
    }
    @media (max-width: 720px) {
      .brand-scene-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .brand-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 220ms ease, transform 220ms ease, background 220ms ease;
    }
    .brand-card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }
    .brand-card[data-active='true'] {
      border-color: var(--accent);
      background: var(--surface-elevated);
    }
    .brand-card-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .brand-card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .brand-card[data-active='true'] .brand-card-label {
      color: var(--text-primary);
      font-weight: 600;
    }
    .brand-scene-helper {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .brand-scene-helper kbd {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface-elevated);
      font-family: inherit;
      font-size: 10px;
      color: var(--text-primary);
      margin: 0 2px;
    }

    /* Toast for defensive failures (B.4.G) */
    .stv-toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
      z-index: 9999;
      pointer-events: none;
    }
    .stv-toast[data-visible='true'] {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Continue control reused inside scenes */
    .scene-continue {
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.6rem 1.25rem;
      transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      font-weight: 500;
    }
    .scene-continue:hover {
      color: var(--text-primary);
      border-color: var(--accent);
      background: var(--surface-elevated);
    }
    .scene-continue-arrow {
      display: inline-block;
      margin-left: 0.5rem;
      transition: transform 200ms ease;
    }
    .scene-continue:hover .scene-continue-arrow { transform: translateX(4px); }

    /* ============ BEAT 3 — SCALE REVEAL ============ */
    .scale-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem 4rem;
      gap: 0;
      position: relative;
    }
    .scale-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .scale-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 32ch;
      text-align: center;
      margin: 0.5rem 0 0.5rem 0;
    }
    .scale-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* 4.1 — Scale tower: primary big stat + 4 supporting */
    .scale-tower {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      margin: 1.5rem 0 0.5rem;
    }
    .scale-tower-primary {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.035em;
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
      font-variation-settings: 'opsz' 144;
      position: relative;
    }
    .scale-tower-primary-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .scale-tower-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem 2.5rem;
      max-width: 720px;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .scale-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .scale-stat-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.5rem, 2.6vw, 2.1rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
    }
    .scale-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
    .scale-stat-sub {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 0.2rem;
      opacity: 0.75;
    }
    .scale-stat-flagrow {
      display: flex;
      gap: 2px;
      margin-top: 0.4rem;
    }
    .scale-stat-flagrow span {
      display: inline-block;
      width: 10px;
      height: 7px;
      box-shadow: 0 0 0 1px var(--border) inset;
      border-radius: 1px;
      overflow: hidden;
    }
    .scale-stat-flagrow span svg { width: 100%; height: 100%; display: block; }
    .scale-stat-bar {
      width: 60px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.4rem;
    }
    .scale-stat-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-globe-wrap {
      position: relative;
      width: 100%;
      max-width: 920px;
      aspect-ratio: 1.6 / 1;
      margin: 1rem auto 1rem;
    }
    .scale-globe-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .scale-globe-vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, var(--bg) 100%);
    }
    .scale-globe-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scale-arc-card {
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      max-width: 280px;
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      animation: stv-arc-card-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 1500ms forwards,
                 stv-arc-card-out 600ms cubic-bezier(0.4, 0, 0.2, 1) 9000ms forwards;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-arc-card-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes stv-arc-card-out {
      to { opacity: 0; transform: translateY(-4px) scale(0.97); }
    }
    .scale-arc-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .scale-arc-meta-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.4rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-arc-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-primary);
      margin: 0;
    }
    .scale-arc-foot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-top: 0.5rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-arc-headline.is-native-jp { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-de { font-family: 'Bitter', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-it { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-fr { font-family: 'Marcellus', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-pt,
    .scale-arc-headline.is-native-es { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; }
    .scale-arc-trans {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-style: italic;
    }
    .scale-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 60ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      text-align: center;
      margin: 0.5rem 0 1.5rem;
    }
    .scale-subline strong { color: var(--text-primary); font-weight: 500; }

    /* ============ BEAT 4 — THE SAFETY NET ============ */
    .safety-scene {
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2rem 1.5rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 880px) {
      .safety-scene {
        grid-template-columns: 1.1fr 1fr;
        gap: 2rem;
        padding: 3rem 2rem 5rem;
      }
    }
    .safety-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .safety-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.24em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .safety-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .safety-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0 auto;
    }
    .safety-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Card chrome reused across safety-scene panels — gradient edge per audit 2.2.c */
    .safety-card {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, transparent) 0%, var(--border) 55%, color-mix(in srgb, var(--accent) 8%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 1.25rem 1.25rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .safety-card-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.875rem;
    }
    .safety-card-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.4rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* AI thought stream */
    .thought-stream {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 220px;
      overflow: hidden;
    }
    .thought-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.4rem 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      line-height: 1.45;
      color: var(--text-muted);
      background: var(--surface-elevated);
      border-radius: 4px;
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .thought-row[data-state='passed'] { color: var(--text-primary); border-left: 2px solid var(--green); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='checked'] { color: var(--text-primary); border-left: 2px solid var(--accent); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='blocked'] { color: var(--text-primary); border-left: 2px solid var(--red); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='info'] { border-left: 2px solid var(--border); padding-left: calc(0.5rem - 2px); }
    .thought-row-time {
      color: var(--text-muted);
      flex-shrink: 0;
      width: 50px;
      font-weight: 500;
    }
    .thought-row-code {
      color: var(--accent);
      flex-shrink: 0;
      font-weight: 600;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .thought-row[data-state='passed'] .thought-row-code { color: var(--green); }
    .thought-row[data-state='blocked'] .thought-row-code { color: var(--red); }
    .thought-row-msg { flex: 1; min-width: 0; }
    @keyframes stv-thought-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Decision tree (8 nodes vertically) */
    .tree {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .tree-node {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      background: var(--surface-elevated);
      border-radius: 4px;
      color: var(--text-muted);
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1) both;
    }
    .tree-node[data-active='true'] {
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: calc(0.55rem - 1px) calc(0.6rem - 1px);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .tree-node-num {
      width: 18px; height: 18px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 9.5px;
      font-weight: 600;
    }
    .tree-node[data-active='true'] .tree-node-num {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      mix-blend-mode: difference;
    }
    .tree-node-label { flex: 1; }
    .tree-node-conf {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .tree-node[data-active='true'] .tree-node-conf { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }

    /* Integrity gates */
    .gates {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .gate {
      padding: 0.875rem 0.75rem;
      background: var(--surface-elevated);
      border-radius: 6px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .gate-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .gate-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .gate-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      transition: color 220ms ease;
    }
    .gate[data-status='pass'] .gate-status { color: var(--green); }
    .gate[data-status='check'] .gate-status { color: var(--accent); }
    .gate[data-status='checking'] .gate-status { color: var(--accent); opacity: 0.7; animation: stv-pulse 1100ms ease-in-out infinite; }
    .gate-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }
    .gate-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      width: 100%;
      background: var(--border);
    }
    .gate-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 1100ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .gate[data-status='pass'] .gate-bar::after { width: 100%; }
    .gate[data-status='check'] .gate-bar::after { width: 100%; background: var(--accent); }
    .gate[data-status='checking'] .gate-bar::after { width: 60%; background: var(--accent); }

    /* 4.2 — Quality + Integrity dual reveal as FULL-WIDTH HERO with bars + deltas */
    .dual-reveal-hero {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 1.5rem;
      align-items: center;
      padding: 2rem 1.5rem;
      margin: 1rem 0 0.5rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent) 0%, var(--border) 50%, color-mix(in srgb, var(--green) 22%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 16px 50px color-mix(in srgb, var(--accent) 12%, transparent);
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 880px) {
      .dual-reveal-hero { grid-template-columns: 1fr; gap: 1rem; }
      .dual-reveal-divider-h { display: none; }
    }
    .dual-reveal-divider-h { background: var(--border); height: 70%; align-self: center; }
    .dual-reveal-col { text-align: center; padding: 0.5rem; }
    .dual-reveal-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .dual-reveal-number {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(4rem, 8vw, 7rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.025em;
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
      font-variation-settings: 'opsz' 144;
      position: relative;
      display: inline-block;
    }
    .dual-reveal-number[data-metric='quality'] { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .dual-reveal-number[data-metric='integrity'] { color: var(--green); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    /* Brand-glow under each number */
    .dual-reveal-number::before {
      content: '';
      position: absolute;
      inset: 14% -10%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, currentColor 35%, transparent) 0%, transparent 70%);
      filter: blur(40px);
      z-index: -1;
      pointer-events: none;
    }
    .dual-reveal-track {
      position: relative;
      width: 80%;
      max-width: 220px;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin: 1rem auto 0.5rem;
      overflow: visible;
    }
    .dual-reveal-track-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: linear-gradient(90deg, transparent, currentColor);
      border-radius: 999px;
      transition: width 1400ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .dual-reveal-threshold {
      position: absolute;
      top: -4px;
      width: 2px;
      height: 11px;
      background: var(--text-muted);
      opacity: 0.65;
      border-radius: 1px;
    }
    .dual-reveal-threshold-label {
      position: absolute;
      top: 14px;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.65;
      white-space: nowrap;
    }
    .dual-reveal-delta {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: currentColor;
      margin-top: 1.6rem;
      opacity: 0.92;
    }
    .dual-reveal-delta strong {
      font-style: normal;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    /* 3.1 — Ambient post-phase shimmer on numerals */
    .dual-reveal-number.is-shimmer::after {
      content: '';
      position: absolute;
      inset: -4px -8px;
      background: linear-gradient(110deg, transparent 30%, color-mix(in srgb, currentColor 30%, transparent) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: stv-mark-shimmer 6000ms linear infinite;
      pointer-events: none;
      mix-blend-mode: screen;
      border-radius: 6px;
    }

    /* 4.4 — Hash chain as visual chain (linked blocks, horizontal) */
    .hash-chain-vis {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      padding: 0.5rem 0;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .hash-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 38px;
      padding: 0 0.4rem;
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      border-radius: 4px;
      flex-shrink: 0;
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
      position: relative;
    }
    .hash-block[data-state='signed'] {
      border-color: color-mix(in srgb, var(--green) 50%, transparent);
      background: color-mix(in srgb, var(--green) 8%, var(--surface-elevated));
    }
    .hash-block-hash {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .hash-block-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      color: var(--text-muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .hash-block-link {
      width: 18px;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
      position: relative;
    }
    .hash-block-link::after {
      content: '›';
      position: absolute;
      right: -2px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
    }
    .hash-block[data-state='signed'] + .hash-block-link {
      background: var(--green);
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 4.3 — Latency strips on integrity gates */
    .gate-latency {
      margin-top: 0.4rem;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .gate-latency-fill {
      height: 100%;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 60%, transparent), var(--accent));
      transition: width 800ms cubic-bezier(0.25, 0.1, 0.25, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gate-latency-tick {
      position: absolute;
      top: -2px;
      width: 1px;
      height: 8px;
      background: var(--text-muted);
      opacity: 0.4;
    }

    /* 1.6 — Decision tree confidence bars */
    .tree-node-confbar {
      width: 50px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tree-node-confbar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 400ms cubic-bezier(0.25, 0.1, 0.25, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tree-node[data-active='false'] .tree-node-confbar-fill { background: var(--text-muted); opacity: 0.5; }

    /* 4.5 — Trust badge micro-vizualizations */
    .trust-badge-viz {
      margin-top: 0.5rem;
      min-height: 22px;
      display: flex;
      align-items: center;
    }
    /* Audit: chain icon + counter */
    .trust-viz--audit {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }
    .trust-viz--audit svg { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    /* Tests: dot grid */
    .trust-viz--tests {
      display: grid;
      grid-template-columns: repeat(48, 1fr);
      gap: 1px;
      width: 100%;
      max-width: 220px;
    }
    .trust-viz--tests span {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      background: var(--green);
      opacity: 0.85;
      border-radius: 0.5px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Privacy: pulsing zero */
    .trust-viz--privacy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      animation: stv-pulse-zero 2000ms ease-in-out infinite;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-pulse-zero {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 25%, transparent); }
      50%      { box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 0%, transparent); }
    }
    /* Monitor: tiny EKG line */
    .trust-viz--monitor svg { width: 100px; height: 18px; color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .trust-viz--monitor svg path { stroke-dasharray: 200; stroke-dashoffset: 200; animation: stv-ekg 2400ms cubic-bezier(0.42, 0, 0.58, 1) infinite; }
    @keyframes stv-ekg {
      0%   { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }

    /* B2 — Architectural arches (decorative behind gate cards) */
    .gate-arch-bg {
      position: absolute;
      inset: -8px -4px;
      pointer-events: none;
      opacity: 0.08;
      color: var(--text-primary);
      z-index: 0;
    }
    .gate-arch-bg svg { width: 100%; height: 100%; display: block; }
    .gate { position: relative; z-index: 1; }
    .gate > * { position: relative; z-index: 1; }

    /* E4 — Token-by-token script generation inset */
    .gen-inset {
      margin-top: 0.875rem;
      padding: 0.875rem;
      border: 1px solid var(--border);
      background:
        linear-gradient(var(--surface-elevated), var(--surface-elevated)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 35%, transparent), var(--border)) border-box;
      border: 1px solid transparent;
      border-radius: 6px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gen-inset-head {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .gen-inset-head-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: stv-pulse 1100ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gen-inset-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-primary);
      min-height: 4.5em;
      letter-spacing: -0.005em;
    }
    .gen-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: stv-cursor-blink 900ms steps(1) infinite;
      margin-left: 1px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-cursor-blink {
      0%, 50%   { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Trust badges */
    .trust-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    @media (min-width: 720px) {
      .trust-row { grid-template-columns: repeat(4, 1fr); }
    }
    .trust-badge {
      padding: 0.875rem 1rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, transparent) 0%, var(--border) 60%, color-mix(in srgb, var(--accent) 6%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      text-align: left;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .trust-badge-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .trust-badge-label svg { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .trust-badge-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .trust-badge-foot {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .safety-foot {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 1.5rem;
    }
    .safety-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin: 0 auto 1.5rem;
    }
    .safety-subline strong { color: var(--text-primary); font-weight: 500; }

    /* ============ BEAT 5 — FULL PIPELINE (LINK-OUT) ============ */
    .pipeline-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .pipeline-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0.5rem auto 0.75rem;
    }
    .pipeline-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pipeline-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.6;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }
    .pipeline-subline strong { color: var(--text-primary); font-weight: 500; }
    .pipeline-cta-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1rem 0 2.5rem;
    }
    .pipeline-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: linear-gradient(180deg, var(--accent-deep) 0%, var(--accent) 100%);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
      transition: transform 200ms ease, box-shadow 200ms ease, background 300ms ease;
      text-decoration: none;
      mix-blend-mode: normal;
    }
    .pipeline-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 40%, transparent);
      background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent-deep) 100%);
    }
    .pipeline-cta-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.78);
      text-transform: uppercase;
    }
    .pipeline-cta-arrow {
      display: inline-block;
      transition: transform 200ms ease;
    }
    .pipeline-cta:hover .pipeline-cta-arrow { transform: translateX(4px); }

    .pipeline-cta-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease;
    }
    .pipeline-cta-secondary:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    .pipeline-stages {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }
    @media (min-width: 720px) {
      .pipeline-stages { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    .pipeline-stage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.75rem 0.6rem;
      text-align: left;
      transition: border-color 220ms ease, transform 220ms ease;
      position: relative;
      overflow: hidden;
    }
    .pipeline-stage-card[data-wow='true'] {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .pipeline-stage-card[data-wow='true']::after {
      content: 'WOW';
      position: absolute;
      top: 6px; right: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 700;
    }
    .pipeline-stage-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .pipeline-stage-name {
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .pipeline-callout {
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      background:
        linear-gradient(135deg, var(--surface-elevated) 0%, color-mix(in srgb, var(--accent) 4%, var(--surface-elevated)) 100%) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 60%, transparent) 0%, var(--accent) 50%, color-mix(in srgb, var(--accent) 35%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      max-width: 720px;
      width: 100%;
      text-align: left;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 30px color-mix(in srgb, var(--accent) 16%, transparent);
    }
    .pipeline-callout-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pipeline-callout-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.35;
      margin: 0 0 0.5rem 0;
    }
    .pipeline-callout-body {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* 4.6 — Inline Stage 13 multi-language preview (the WOW moment) */
    .stage13-wrap {
      max-width: 1100px;
      width: 100%;
      margin: 2.5rem auto 1rem;
    }
    .stage13-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.875rem;
      margin-bottom: 1rem;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      width: fit-content;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1), color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stage13-banner-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: stv-pulse 1100ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stage13-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1rem;
    }
    @media (max-width: 880px) {
      .stage13-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .stage13-grid { grid-template-columns: 1fr; }
    }
    .stage13-col {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 28%, transparent) 0%, var(--border) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(8px);
      animation: stv-stage13-col-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 230px;
      text-align: left;
    }
    @keyframes stv-stage13-col-in {
      to { opacity: 1; transform: translateY(0); }
    }
    .stage13-col-flag {
      height: 60px;
      background: var(--surface-elevated);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .stage13-col-flag svg {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.92;
    }
    .stage13-col-flag::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--surface) 60%, transparent) 100%);
      pointer-events: none;
    }
    .stage13-col-body {
      padding: 0.875rem 0.875rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .stage13-col-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .stage13-col-heading {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      margin: 0;
      font-weight: 500;
    }
    .stage13-col-headline {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-primary);
      margin: 0;
    }
    .stage13-col-body-text {
      font-size: 11.5px;
      line-height: 1.45;
      color: var(--text-muted);
      margin: 0;
    }
    /* Native typography per language column (audit E5) */
    .stage13-col[data-lang='en'] .stage13-col-headline,
    .stage13-col[data-lang='en'] .stage13-col-body-text { font-family: 'Fraunces', Georgia, serif; }
    .stage13-col[data-lang='de'] .stage13-col-headline,
    .stage13-col[data-lang='de'] .stage13-col-body-text { font-family: 'Bitter', 'Fraunces', Georgia, serif; letter-spacing: 0; }
    .stage13-col[data-lang='it'] .stage13-col-headline,
    .stage13-col[data-lang='it'] .stage13-col-body-text { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; font-size: 15px; }
    .stage13-col[data-lang='es'] .stage13-col-headline,
    .stage13-col[data-lang='es'] .stage13-col-body-text { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; font-size: 14.5px; }
    .stage13-col[data-lang='fr'] .stage13-col-headline,
    .stage13-col[data-lang='fr'] .stage13-col-body-text { font-family: 'Marcellus', 'Fraunces', Georgia, serif; font-size: 14.5px; letter-spacing: 0.005em; }

    /* ============ BEAT 6 — OUTPUT THROUGH USERS' EYES ============ */
    .output-scene {
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2.5rem 1.5rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    @media (min-width: 880px) {
      .output-scene {
        grid-template-columns: 1.1fr 1fr;
        gap: 2rem;
        padding: 3rem 2rem 5rem;
      }
    }
    .output-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .output-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.30em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .output-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .output-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0 auto;
    }
    .output-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* User surface preview (phone-ish mockup) */
    .user-preview {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent) 0%, var(--border) 55%, color-mix(in srgb, var(--accent) 12%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 16px 40px rgba(0,0,0,0.10),
                  0 0 0 1px color-mix(in srgb, var(--accent) 6%, transparent),
                  0 30px 80px color-mix(in srgb, var(--accent) 12%, transparent);
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), box-shadow 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .user-preview-frame {
      background: var(--surface-elevated);
      border-radius: 10px;
      padding: 1rem 1rem 0.75rem;
    }
    .user-preview-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.875rem;
      margin-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .user-preview-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .user-preview-name {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    .user-preview-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .user-preview-card {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    .user-preview-card:last-child { border-bottom: none; }
    .user-preview-thumb {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent-deep) 0%, var(--accent) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      position: relative;
    }
    .user-preview-thumb--portrait { padding: 0; }
    .user-preview-thumb--portrait svg { width: 100%; height: 100%; display: block; }

    /* Audio-suggesting waveform under reporter portrait (audit E6) */
    .stv-waveform {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      height: 10px;
      margin: 0 0.4rem;
    }
    .stv-waveform span {
      display: inline-block;
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
      animation: stv-wave 1400ms ease-in-out infinite;
      transform-origin: center;
    }
    .stv-waveform span:nth-child(1) { animation-delay: 0ms;   height: 4px; }
    .stv-waveform span:nth-child(2) { animation-delay: 120ms; height: 7px; }
    .stv-waveform span:nth-child(3) { animation-delay: 240ms; height: 9px; }
    .stv-waveform span:nth-child(4) { animation-delay: 360ms; height: 6px; }
    .stv-waveform span:nth-child(5) { animation-delay: 480ms; height: 8px; }
    .stv-waveform span:nth-child(6) { animation-delay: 600ms; height: 5px; }
    .stv-waveform span:nth-child(7) { animation-delay: 720ms; height: 7px; }
    @keyframes stv-wave {
      0%, 100% { transform: scaleY(0.55); opacity: 0.55; }
      50%      { transform: scaleY(1); opacity: 1; }
    }
    .user-preview-body { flex: 1; min-width: 0; }
    .user-preview-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .user-preview-meta-flag {
      display: inline-block;
      width: 13px;
      height: 9px;
      vertical-align: middle;
      border-radius: 1px;
      margin-right: 4px;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .user-preview-meta-flag svg { width: 100%; height: 100%; display: block; }
    .user-preview-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      line-height: 1.35;
      color: var(--text-primary);
      margin: 0;
      font-weight: 500;
    }
    .user-preview-foot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }
