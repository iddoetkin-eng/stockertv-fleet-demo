<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#FAF7F2" id="theme-color-meta">
  <title>StockerTV — Unified Demo</title>

  <!-- Pre-paint theme. Light default per Beat 3 lock. Stateless try/catch. -->
  <script>
    (function(){try{var t=localStorage.getItem('stv-theme')||'light';document.documentElement.dataset.theme=t;var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content',t==='light'?'#FAF7F2':'#0A0B0F');}catch(e){document.documentElement.dataset.theme='light';}})();
  </script>

  <!-- Editorial typography per Beat 3.A -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Editorial fonts (Fraunces/Inter/JetBrains Mono) + native-language flavor fonts (E5):
       Bitter (DE) · Cormorant Garamond (IT/PT/ES) · Marcellus (FR) · Noto Serif JP (JP).
       font-display: swap so they don't block paint. -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Bitter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&family=Noto+Serif+JP:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Bitter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&family=Noto+Serif+JP:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Locked CDN versions per Beat 5.A. No @latest. -->
  <script src="https://cdn.tailwindcss.com?v=3.4.1"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <!-- Round 2 — fleet showcase data (Natural Earth 110m continent paths for Beat 3 globe texture) -->
  <script src="../showcase.js"></script>
  <!-- Round 3 P3 — Natural Earth 110m country borders (public-domain) for globe -->
  <script src="../countries-110m.js"></script>

  <style>
    /* ============ NEUTRAL SUBSTRATE — set ONCE on first paint ============ */
    :root[data-theme='dark'] {
      --bg: #0A0B0F;
      --text-primary: #FAF7F2;
      --text-muted: #888c98;
      --border: rgba(255,255,255,0.08);
      --surface: #13151c;
      --surface-elevated: #1a1d27;
    }
    :root[data-theme='light'] {
      /* Newspaper-print palette per audit 2.4. Stronger card-to-bg separation. */
      --bg: #F4F0E8;
      --text-primary: #14171F;
      --text-muted: #666c78;
      --border: rgba(0,0,0,0.10);
      --surface: #FFFFFF;
      --surface-elevated: #FBF7EE;
    }
    :root {
      --red: #ef4444;
      --green: #22c55e; /* neutral fallback; brand-switch may override per B.4.D 3-way rule */
      /* Brand-specific vars — eToro defaults. Overwritten by brand-switch handler. */
      --accent: #6AAE22;
      --accent-deep: #8FC850;
      --accent-2: #A8D96E;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .display { font-family: 'Fraunces', Georgia, serif; font-feature-settings: 'liga', 'dlig'; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }

    /* Illustration base — audit 6.1 */
    .illust {
      display: block;
      max-width: 100%;
      color: var(--text-primary);
      transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .illust--newsroom {
      width: min(600px, 90vw);
      height: 80px;
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-fade-in 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 3500ms forwards;
    }
    .illust--stagemap {
      width: 100%;
      height: 60px;
      margin: 0 auto 1.5rem;
      opacity: 0.92;
    }
    .illust--phone {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
    }
    .illust--horizon {
      width: min(500px, 80vw);
      height: 60px;
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-fade-in 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 2600ms forwards;
    }

    /* Reduced-motion respect per Beat 3.C */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============ TEXTURE OVERLAYS — Beat 3.D ============ */
    .stv-grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 9998;
      mix-blend-mode: multiply;
    }
    :root[data-theme='dark'] .stv-grain { mix-blend-mode: screen; opacity: 0.04; }

    .stv-paper-fiber {
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent 0 2px, rgba(0,0,0,0.018) 2px 3px),
        repeating-linear-gradient(-45deg, transparent 0 2px, rgba(0,0,0,0.018) 2px 3px);
      opacity: 1;
      pointer-events: none;
      z-index: 9997;
    }
    :root[data-theme='dark'] .stv-paper-fiber { opacity: 0.3; mix-blend-mode: lighten; }

    /* ============ ATMOSPHERE — blur orbs + parallax (audit C1+C2) ============ */
    .stv-atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-orb {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent) 18%, transparent) 0%, transparent 60%);
      filter: blur(80px);
      opacity: 0.85;
      will-change: transform;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-orb--a { top: -380px; left: -300px; }
    .stv-orb--b { bottom: -360px; right: -260px; width: 720px; height: 720px;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent-deep) 14%, transparent) 0%, transparent 60%);
    }
    .stv-orb--c { top: 30%; right: -380px; width: 600px; height: 600px;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent-2) 10%, transparent) 0%, transparent 65%);
    }
    /* Beat-specific orb position overrides for "glow signature per scene" */
    body[data-beat='hook']     .stv-orb--a { top: -200px; left: 50%; transform: translateX(-50%); }
    body[data-beat='brand']    .stv-orb--a { top: -300px; right: -250px; left: auto; }
    body[data-beat='scale']    .stv-orb--c { top: 50%; right: 30%; }
    body[data-beat='safety']   .stv-orb--b { bottom: -400px; left: -200px; right: auto; }
    body[data-beat='pipeline'] .stv-orb--a { top: -300px; left: 30%; }
    body[data-beat='output']   .stv-orb--c { top: 20%; left: -300px; right: auto; }
    body[data-beat='close']    .stv-orb--a { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 1000px; }
    /* Parallax variable applied via JS — translates whole atmosphere up to ±10px */
    .stv-atmosphere {
      transform: translate(var(--paraX, 0px), var(--paraY, 0px));
      transition: transform 800ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stv-watermark {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .stv-watermark-track {
      display: inline-block;
      white-space: nowrap;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 8rem;
      line-height: 1;
      color: var(--text-primary);
      opacity: 0.04;
      animation: stv-watermark-scroll 240s linear infinite;
      will-change: transform;
    }
    @keyframes stv-watermark-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ============ R5 C1 — PER-BEAT CHROMATIC TINT (visual journey across 7 beats) */
    /* A subtle environmental tint layered ABOVE atmosphere but BELOW content.
       Renders as a fixed full-viewport ::before on body keyed by data-beat. */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1200ms cubic-bezier(0.4, 0, 0.2, 1),
                  background 1200ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, background;
    }
    body[data-beat]::before { opacity: 1; }
    /* Beat 1 — warm paper light from above */
    body[data-beat='hook']::before {
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(212, 165, 116, 0.10) 0%, transparent 65%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(247, 233, 211, 0.06) 0%, transparent 60%);
    }
    /* Beat 2 — brand-saturated backwash */
    body[data-beat='brand']::before {
      background: radial-gradient(ellipse 90% 70% at 50% 50%, color-mix(in srgb, var(--accent) 9%, transparent) 0%, transparent 70%);
    }
    /* Beat 3 — cool deep-night ocean */
    body[data-beat='scale']::before {
      background:
        linear-gradient(180deg, rgba(11, 18, 36, 0.18) 0%, transparent 30%, transparent 70%, rgba(11, 18, 36, 0.10) 100%),
        radial-gradient(ellipse 60% 35% at 50% 110%, rgba(60, 90, 150, 0.10) 0%, transparent 70%);
    }
    /* Beat 4 — warm cream editorial */
    body[data-beat='safety']::before {
      background:
        radial-gradient(ellipse 70% 50% at 50% 30%, rgba(232, 200, 154, 0.08) 0%, transparent 70%),
        linear-gradient(180deg, rgba(232, 200, 154, 0.04) 0%, transparent 60%);
    }
    /* Beat 5 — institutional slate */
    body[data-beat='pipeline']::before {
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(70, 78, 96, 0.12) 0%, transparent 65%),
        linear-gradient(180deg, transparent 60%, rgba(48, 56, 72, 0.10) 100%);
    }
    /* Beat 6 — paper cream warm (around the iPhone) */
    body[data-beat='output']::before {
      background:
        radial-gradient(ellipse 50% 35% at 30% 45%, rgba(250, 235, 210, 0.10) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 70% 55%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 70%);
    }
    /* Beat 7 — brand gold twilight (full-bleed glow) */
    body[data-beat='close']::before {
      background:
        radial-gradient(ellipse 70% 55% at 50% 50%, color-mix(in srgb, var(--accent) 14%, transparent) 0%, transparent 70%),
        linear-gradient(180deg, transparent 0%, rgba(15, 12, 18, 0.10) 100%);
    }
    /* In dark mode, blend the warm tints LIGHTER not darker */
    :root[data-theme='dark'] body[data-beat='hook']::before,
    :root[data-theme='dark'] body[data-beat='safety']::before,
    :root[data-theme='dark'] body[data-beat='output']::before {
      mix-blend-mode: screen;
    }

    /* ============ R5 A5 — CHAPTER HEADING (small caps Fraunces with rule) */
    .chapter-heading {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      margin: 0 auto 0.875rem;
      padding-bottom: 0.625rem;
      position: relative;
      font-feature-settings: 'smcp', 'c2sc', 'liga';
      font-variant-caps: all-small-caps;
    }
    .chapter-heading::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 1px;
      background: var(--accent);
      opacity: 0.55;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .chapter-heading-num {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.2em;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .chapter-heading-divider {
      color: var(--text-muted);
      opacity: 0.55;
      font-weight: 400;
    }
    @media (max-width: 520px) {
      .chapter-heading { font-size: 10px; letter-spacing: 0.32em; gap: 0.6rem; }
      .chapter-heading::after { width: 28px; }
    }

    /* ============ R5 C5 — HALFTONE-DOT PATTERN UTILITY */
    .stv-halftone {
      background-image: radial-gradient(
        circle at center,
        color-mix(in srgb, var(--accent) 22%, transparent) 0.7px,
        transparent 0.85px
      );
      background-size: 5px 5px;
      background-position: 0 0;
    }
    .stv-halftone--green {
      background-image: radial-gradient(
        circle at center,
        color-mix(in srgb, var(--green) 28%, transparent) 0.7px,
        transparent 0.85px
      );
      background-size: 5px 5px;
    }

    /* ============ R5 C4 — ANIMATED GRAIN with idle color shift */
    /* Default static grain is .stv-grain above. The idle shift kicks in via JS
       attaching body[data-idle='true'] after 5+ seconds of no interaction. */
    @keyframes stv-grain-drift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(2%, -2%); }
      50%  { transform: translate(-2%, 2%); }
      75%  { transform: translate(2%, 2%); }
      100% { transform: translate(0, 0); }
    }
    body[data-idle='true'] .stv-grain {
      animation: stv-grain-drift 60s linear infinite;
      mix-blend-mode: overlay;
      opacity: 0.06;
    }
    :root[data-theme='dark'] body[data-idle='true'] .stv-grain {
      mix-blend-mode: screen;
      opacity: 0.05;
    }
    /* Subtle accent-tint wash on idle, pulses very slowly */
    @keyframes stv-idle-tint-pulse {
      0%, 100% { opacity: 0; }
      50%      { opacity: 1; }
    }
    body[data-idle='true']::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 70%);
      opacity: 0;
      animation: stv-idle-tint-pulse 12s ease-in-out infinite;
    }

    /* ============ R5 D4 — IDLE BREATH UTILITY (subtle 1.0 ↔ 1.005 over 4s) */
    @keyframes stv-breath {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.005); }
    }
    body[data-idle='true'] .stv-breathe {
      animation: stv-breath 4s ease-in-out infinite;
    }

    /* ============ BEAT 1 — HOOK ============ */
    /* R5 F2 — Boot cinematic (8s sequence): dark void → letter emergence →
       wordmark coalesce → brand pulse → coverage trace → system checks → status. */
    .boot-stage {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
    }
    .boot-stage::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 70%),
        radial-gradient(ellipse at center, transparent 0%, var(--bg) 95%);
      opacity: 0.85;
      pointer-events: none;
      animation: stv-boot-bg-breath 8s ease-in-out infinite;
    }
    @keyframes stv-boot-bg-breath {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1.0; }
    }
    .boot-content { text-align: center; position: relative; z-index: 1; }

    /* R5 F2 — letter-by-letter Fraunces emergence */
    .boot-letters {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(4rem, 9vw, 7rem);
      line-height: 1;
      letter-spacing: -0.03em;
      font-variation-settings: 'opsz' 144;
      position: relative;
    }
    /* During emergence: extra horizontal spacing between letters that closes
       on coalesce. */
    .boot-letters[data-phase='0'] { letter-spacing: 0.18em; }
    .boot-letters[data-phase='1'] { letter-spacing: -0.03em; transition: letter-spacing 700ms cubic-bezier(0.25, 0.1, 0.25, 1); }
    .boot-letters[data-phase='2'],
    .boot-letters[data-phase='3'],
    .boot-letters[data-phase='4'],
    .boot-letters[data-phase='5'],
    .boot-letters[data-phase='6'] { letter-spacing: -0.03em; }
    .boot-letter {
      display: inline-block;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(8px);
      filter: blur(12px);
      animation: stv-boot-letter-in 850ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-boot-letter-in {
      from { opacity: 0; transform: translateY(8px); filter: blur(12px); }
      to   { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    /* The TV letters get italic + brand-accent (matches in-app wordmark) */
    .boot-letter[data-tv='true'] {
      color: var(--accent);
      font-style: italic;
      transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Brand pulse — radial accent glow that expands + fades after letters coalesce */
    .boot-pulse {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 140%;
      aspect-ratio: 1 / 1;
      pointer-events: none;
      background: radial-gradient(circle at center,
        color-mix(in srgb, var(--accent) 30%, transparent) 0%,
        color-mix(in srgb, var(--accent) 8%, transparent) 25%,
        transparent 55%);
      filter: blur(20px);
      opacity: 0;
      z-index: -1;
    }
    .boot-pulse[data-phase='2'] {
      animation: stv-boot-pulse 1400ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-boot-pulse {
      0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      35%  { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
    }

    .boot-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      margin-bottom: 1.5rem;
      transition: opacity 700ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .boot-eyebrow[data-show='true'] { opacity: 1; }

    /* Wordmark glow base (kept for back-compat references in code) */
    .boot-wordmark::before {
      content: '';
      position: absolute;
      inset: -10% -8%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 22%, transparent) 0%, transparent 60%);
      filter: blur(28px);
      z-index: -1;
      opacity: 0.85;
      pointer-events: none;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Coverage line — handwriting-style left→right reveal via clip-path */
    .boot-coverage {
      margin-top: 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.95rem, 1.6vw, 1.2rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: none;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      transition: opacity 400ms cubic-bezier(0.25, 0.1, 0.25, 1),
                  clip-path 1100ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .boot-coverage[data-show='true'] {
      opacity: 1;
      clip-path: inset(0 0 0 0);
    }
    .boot-coverage-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .boot-checks {
      margin-top: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      align-items: center;
    }
    .boot-check {
      opacity: 0;
      animation: stv-check-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .boot-check-tick {
      color: var(--green);
      margin-right: 0.4rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-check-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .boot-status {
      margin-top: 1.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 700ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .boot-status[data-show='true'] { opacity: 1; }
    .boot-status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: stv-pulse 1800ms ease-in-out infinite;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .boot-stage.fading-out {
      animation: stv-fade-out 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes stv-blur-focus {
      0%   { filter: blur(20px); opacity: 0; transform: scale(1.1); }
      60%  { filter: blur(0px); opacity: 1; transform: scale(1.02); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    @keyframes stv-fade-in {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes stv-fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes stv-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .hook-stage {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      opacity: 0;
      animation: stv-hook-enter 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 400ms forwards;
    }
    /* Round 4 P7 — tighter padding on phone so hero numbers + captions fit */
    @media (max-width: 520px) {
      .hook-stage { padding: 1.25rem 0.875rem; }
    }
    /* Background wash beneath the Hook hero (audit 2.2.a) */
    .hook-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 45%, color-mix(in srgb, var(--accent) 9%, transparent) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.32em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .hook-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Round 2 — dual hero flow: 47 sec → 5 min */
    .hook-hero-flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.75rem, 2vw, 2rem);
      flex-wrap: wrap;
      margin: 0;
    }
    .hook-hero-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      position: relative;
      min-width: 0;
    }
    /* Round 3 P2 — bumped hero numbers to clamp(5rem, 12vw, 9rem) for room-readability */
    .hook-hero-number {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(5rem, 12vw, 9rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      margin: 0;
      font-feature-settings: 'liga', 'dlig', 'onum';
      font-variation-settings: 'opsz' 144;
      position: relative;
      display: inline-flex;
      align-items: baseline;
      gap: 0.35rem;
    }
    /* R5 F3 + R6 P1 — italic display variant: bigger Fraunces italic at opsz=144.
       3D shadow chain + pen-stroke trace REMOVED in R6 per user feedback (too much).
       Brand radial glow underneath (.hook-hero-number::before from R1) stays. */
    .hook-hero-number--italic {
      font-size: clamp(7rem, 14vw, 12rem);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.02em;
      font-variation-settings: 'opsz' 144;
    }
    .hook-hero-num-glyph { display: inline-block; position: relative; z-index: 2; }

    /* R5 B3 → R8 C2 — backdrop swapped to portrait phone illustration */
    .hook-tower-bg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      /* Portrait viewBox 320×560 → fix by height for vertical dominance */
      width: auto;
      height: min(620px, 78vh);
      pointer-events: none;
      opacity: 0.06;
      color: var(--text-primary);
      z-index: 0;
    }
    .hook-tower-bg svg { width: auto; height: 100%; display: block; }
    @media (max-width: 720px) {
      .hook-tower-bg { height: min(480px, 70vh); opacity: 0.05; }
    }
    /* Brand-accent glow under each hero number (audit 2.2.b) */
    .hook-hero-number::before {
      content: '';
      position: absolute;
      inset: 12% -10%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 40%, transparent) 0%, transparent 65%);
      filter: blur(50px);
      z-index: -1;
      pointer-events: none;
      opacity: 0;
      animation: stv-glow-in 1600ms cubic-bezier(0.25, 0.1, 0.25, 1) 2200ms forwards;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-glow-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    /* Round 3 P2 — captions bumped to be readable across a meeting room */
    .hook-hero-caption {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      letter-spacing: 0.05em;
      color: var(--text-primary);
      text-transform: none;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3300ms forwards;
      max-width: 18ch;
      text-align: center;
      line-height: 1.25;
    }
    .hook-hero-connector {
      width: clamp(60px, 12vw, 180px);
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: stv-fade-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 2700ms forwards;
    }
    .hook-hero-connector svg {
      width: 100%;
      height: 100%;
      display: block;
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-hero-connector svg path {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: stv-connector-draw 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 2900ms forwards;
    }
    @keyframes stv-connector-draw {
      to { stroke-dashoffset: 0; }
    }
    @media (max-width: 600px) {
      .hook-hero-connector {
        width: 26px;
        height: 60px;
        transform: rotate(90deg);
      }
    }
    /* Round 3 P2 — unit scaled with hero number */
    .hook-hero-unit {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.8rem, 4vw, 3rem);
      color: var(--accent);
      letter-spacing: -0.01em;
      transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      animation: stv-fade-in 500ms cubic-bezier(0.25, 0.1, 0.25, 1) 2700ms forwards;
      display: inline-block;
    }
    /* Underline shimmer beneath hero numbers (audit 3.2) */
    .hook-hero-shimmer {
      display: block;
      position: absolute;
      left: 50%;
      bottom: -0.4em;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
      opacity: 0;
      animation: stv-shimmer 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3100ms forwards;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-shimmer {
      0%   { opacity: 0; transform: translateX(-150%); width: 30%; }
      40%  { opacity: 0.85; }
      100% { opacity: 0; transform: translateX(50%); width: 80%; }
    }
    /* R8 C1 — Stories-processed living counter REMOVED. */
    .hook-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.5vw, 16px);
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-top: 3rem;
      max-width: 56ch;
      line-height: 1.6;
      opacity: 0;
      animation: stv-fade-in 1000ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .hook-subline-emphasis { color: var(--text-primary); font-weight: 500; }
    /* R8 C3 — .hook-continue mirrors .scene-continue (prominent brand-accent fill) */
    .hook-continue {
      margin-top: 4rem;
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
      letter-spacing: 0.01em;
      color: #fff;
      text-transform: none;
      opacity: 0;
      cursor: pointer;
      padding: 16px 38px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
      /* R10 C — breathing pulse delayed 8s after the button finishes fading in
         (fade-in completes at 5000ms; breathing starts at 13000ms = 5000+8000). */
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 4200ms forwards,
                 stv-continue-breathe 2500ms ease-in-out 13000ms infinite;
      transition: transform 200ms ease, background 300ms cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 300ms ease;
    }
    .hook-continue:hover {
      transform: translateY(-1px);
      background: var(--accent-deep);
      box-shadow: 0 14px 36px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    .hook-continue:active { transform: translateY(0); }
    .hook-continue-arrow {
      display: inline-block;
      font-size: 1.15em;
      line-height: 1;
      transition: transform 200ms ease;
    }
    .hook-continue:hover .hook-continue-arrow { transform: translateX(5px); }
    @media (max-width: 520px) {
      .hook-continue { padding: 13px 28px; font-size: 1rem; margin-top: 2.5rem; }
    }
    .hook-accent-line {
      width: 60px; height: 1px;
      background: var(--accent);
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-line-grow 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 2600ms forwards;
      transform-origin: center;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-line-grow { from { opacity: 0; transform: scaleX(0); } to { opacity: 1; transform: scaleX(1); } }
    @keyframes stv-hero-reveal {
      0%   { filter: blur(28px); opacity: 0; transform: scale(1.15); }
      55%  { filter: blur(0px); opacity: 1; transform: scale(1.02); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    @keyframes stv-hook-enter { from { opacity: 0; } to { opacity: 1; } }

    /* ============ TOP BAR (Beats 2-7) ============ */
    .stv-topbar {
      position: sticky;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), border-color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-left {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .stv-topbar-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.125rem;
      line-height: 1;
      letter-spacing: -0.015em;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .stv-topbar-mark .stv-mark-tv {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-mark .stv-mark-for {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: -0.01em;
      opacity: 0.92;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-mark .stv-mark-divider {
      color: var(--text-muted);
      font-style: normal;
      font-weight: 400;
      opacity: 0.55;
    }
    /* R11 — Citi co-brand: lowercase "citi" in DM Sans + red arc */
    .stv-topbar-mark .stv-mark-for-citi {
      display: inline-flex;
      align-items: baseline;
      gap: 0.4rem;
      font-style: normal;
    }
    .stv-topbar-mark .stv-mark-for-prefix {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--accent);
      opacity: 0.9;
    }
    .stv-topbar-mark .stv-mark-citi-wordmark {
      position: relative;
      display: inline-block;
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: #003B70;
      letter-spacing: -0.03em;
      line-height: 1;
      padding-top: 0.4rem;
    }
    /* R11.2 Fix 3 — arc anchored above the right portion of "citi" so dot lands on second "i" */
    .stv-topbar-mark .stv-mark-citi-arc {
      position: absolute;
      top: 0;
      right: -0.1em;
      width: 1.55rem;
      height: 0.7rem;
      pointer-events: none;
    }

    /* Beat indicator ("03 / 07 · Scale reveal") audit 1.2 */
    .stv-topbar-beat {
      display: none;
      align-items: baseline;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding-left: 0.875rem;
      margin-left: 0.5rem;
      border-left: 1px solid var(--border);
    }
    .stv-topbar-beat-num {
      color: var(--text-primary);
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .stv-topbar-beat-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: -0.005em;
      color: var(--text-primary);
      text-transform: none;
      opacity: 0.85;
    }
    @media (min-width: 880px) {
      .stv-topbar-beat { display: inline-flex; }
    }

    /* Brand-switch full-screen flash (audit 1.4 + E2) */
    .stv-brand-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9990;
      opacity: 0;
      background:
        radial-gradient(ellipse at var(--flashX, 50%) var(--flashY, 50%),
          color-mix(in srgb, var(--accent) 22%, transparent) 0%,
          color-mix(in srgb, var(--accent) 8%, transparent) 30%,
          transparent 65%);
    }
    .stv-brand-flash[data-firing='true'] {
      animation: stv-brand-flash-anim 620ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-brand-flash-anim {
      0%   { opacity: 0; transform: scale(0.6); }
      35%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.2); }
    }
    /* R5 C2 — RGB-split chromatic aberration overlays during brand-flash peak.
       Two extra colored copies of the radial pulse offset 4px R/L; both fade out
       over ~120ms so the split is felt, not seen. Used ONCE per brand-switch. */
    .stv-brand-flash::before,
    .stv-brand-flash::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }
    .stv-brand-flash::before {
      background: radial-gradient(ellipse at var(--flashX, 50%) var(--flashY, 50%),
        rgba(255, 80, 80, 0.45) 0%,
        rgba(255, 80, 80, 0.10) 30%,
        transparent 60%);
    }
    .stv-brand-flash::after {
      background: radial-gradient(ellipse at var(--flashX, 50%) var(--flashY, 50%),
        rgba(80, 180, 255, 0.45) 0%,
        rgba(80, 180, 255, 0.10) 30%,
        transparent 60%);
    }
    .stv-brand-flash[data-firing='true']::before {
      animation: stv-brand-flash-rgb-r 280ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .stv-brand-flash[data-firing='true']::after {
      animation: stv-brand-flash-rgb-b 280ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-brand-flash-rgb-r {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
      30%  { opacity: 1; transform: translate(4px, 0) scale(1.05); }
      100% { opacity: 0; transform: translate(0, 0) scale(1.1); }
    }
    @keyframes stv-brand-flash-rgb-b {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
      30%  { opacity: 1; transform: translate(-4px, 0) scale(1.05); }
      100% { opacity: 0; transform: translate(0, 0) scale(1.1); }
    }

    /* Brand-pill hover tooltip (audit 1.3) */
    .stv-brand-pill {
      position: relative;
    }
    .stv-brand-pill[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      z-index: 51;
    }
    .stv-brand-pill[data-tooltip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .stv-brand-pill[data-tooltip]::before {
      content: '';
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      transform: translateX(-50%) rotate(45deg);
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 52;
    }
    .stv-brand-pill[data-tooltip]:hover::before { opacity: 1; }

    /* Brand-pill active text contrast — explicit luminance handling per audit 1.3.b */
    /* Use white text for green, blue, navy primaries (most brands); black for very light */
    .stv-brand-pill[data-active='true'] .stv-brand-pill-initials { color: #fff; mix-blend-mode: normal; }
    .stv-topbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
    }
    .stv-topbar-status {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .stv-topbar-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: stv-pulse 2400ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (min-width: 720px) {
      .stv-topbar-status { display: flex; }
    }
    .stv-topbar-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      background: var(--surface-elevated);
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .stv-brand-pill {
      min-width: 38px;
      height: 32px;
      padding: 0 0.625rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      transition: background 220ms ease, color 220ms ease, transform 220ms ease;
      position: relative;
    }
    .stv-brand-pill:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    .stv-brand-pill[data-active='true'] {
      color: var(--text-primary);
      background: var(--accent);
      transform: scale(1.06);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    /* Explicit override below in tooltip section sets active-text color to white via mix-blend-mode: normal */
    .stv-brand-pill-initials {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
      font-size: 11px;
      font-weight: 700;
    }
    .stv-topbar-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stv-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
    }
    .stv-icon-btn:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    .stv-icon-btn svg { width: 14px; height: 14px; }
    /* Round 4 P7 — bump touch hit area on coarse pointers */
    @media (hover: none) and (pointer: coarse) {
      .stv-icon-btn { width: 40px; height: 40px; }
      .stv-icon-btn svg { width: 16px; height: 16px; }
    }

    /* Round 4 P2 — top bar mobile compaction */
    @media (max-width: 720px) {
      .stv-topbar {
        padding: 0.6rem 0.875rem;
        gap: 0.5rem;
      }
      .stv-topbar-left { gap: 0.5rem; }
      .stv-topbar-mark { font-size: 1rem; }
      /* Hide co-brand suffix on small screens to save horizontal space */
      .stv-topbar-mark .stv-mark-divider,
      .stv-topbar-mark .stv-mark-for { display: none; }
      .stv-topbar-divider { display: none; }
      .stv-topbar-pills { padding: 3px; gap: 4px; }
      .stv-brand-pill { min-width: 32px; height: 30px; padding: 0 0.45rem; font-size: 9.5px; }
      .stv-brand-pill-initials { font-size: 10.5px; }
      /* Bump tap target via padding pseudo, keep visual size */
      .stv-brand-pill::before { content: none; }
      .stv-brand-pill[data-tooltip]::after { display: none; } /* drop tooltips on touch */
    }
    @media (max-width: 520px) {
      .stv-topbar {
        padding: 0.55rem 0.65rem;
        gap: 0.4rem;
      }
      /* Allow brand-pill row to scroll horizontally if it overflows */
      .stv-topbar-pills {
        overflow-x: auto;
        flex-wrap: nowrap;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        max-width: 60vw;
      }
      .stv-topbar-pills::-webkit-scrollbar { display: none; }
      .stv-brand-pill { flex-shrink: 0; }
      /* Drop the audio toggle entirely on phone — sound is meeting-room dependent */
      .stv-topbar-right .stv-icon-btn[aria-label="Mute"],
      .stv-topbar-right .stv-icon-btn[aria-label="Unmute"] { display: none; }
    }

    /* ============ APP FRAME (post-Hook content area) ============ */
    .stv-app-frame {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: stv-frame-enter 700ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .stv-app-content {
      flex: 1;
      position: relative;
    }
    @keyframes stv-frame-enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ============ BEAT 2 — BRAND LOCK-IN ============ */
    .brand-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 0;
      position: relative;
    }
    /* Background wash on brand scene */
    .brand-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 40%, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 65%);
      pointer-events: none;
      z-index: -1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.20em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .brand-scene-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-builtfor {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      line-height: 1.1;
      margin: 0 0 0.5rem 0;
    }
    .brand-scene-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(5rem, 14vw, 11rem);
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 0.9;
      margin: 0.5rem 0 0 0;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
      animation: stv-brand-name-pop 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    /* R11 — Citi brand-scene-name: lowercase DM Sans + red arc above "t" */
    .brand-scene-name-citi {
      font-style: normal;
      letter-spacing: -0.045em;
    }
    .brand-scene-citi-wrap {
      position: relative;
      display: inline-block;
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-weight: 700;
      color: #003B70;
      padding-top: 0.4em;
    }
    /* R11.2 Fix 3 — arc anchored above the right portion of "citi" so dot lands on second "i" */
    .brand-scene-citi-arc {
      position: absolute;
      top: 0;
      right: -0.05em;
      width: 0.55em;
      height: 0.32em;
      pointer-events: none;
    }
    @keyframes stv-brand-name-pop {
      0% { opacity: 0; filter: blur(8px); transform: scale(0.97); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }
    .brand-scene-line {
      width: 80px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
    }
    .brand-scene-subline strong {
      color: var(--text-primary);
      font-weight: 500;
    }
    .brand-scene-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 1rem;
      max-width: 720px;
      width: 100%;
      margin: 1rem auto 3rem;
    }
    @media (max-width: 720px) {
      .brand-scene-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .brand-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 220ms ease, transform 220ms ease, background 220ms ease;
    }
    .brand-card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }
    .brand-card[data-active='true'] {
      border-color: var(--accent);
      background: var(--surface-elevated);
    }
    .brand-card-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .brand-card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .brand-card[data-active='true'] .brand-card-label {
      color: var(--text-primary);
      font-weight: 600;
    }
    .brand-scene-helper {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .brand-scene-helper kbd {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface-elevated);
      font-family: inherit;
      font-size: 10px;
      color: var(--text-primary);
      margin: 0 2px;
    }

    /* Toast for defensive failures (B.4.G) */
    .stv-toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
      z-index: 9999;
      pointer-events: none;
    }
    .stv-toast[data-visible='true'] {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* R8 C3 — Continue button: prominent brand-accent fill, larger, with breathing glow.
       Used by all 7 beats (HookScene, ScaleScene, SafetyScene, PipelineScene, OutputScene,
       CloseScene's restart variant kept separate). Visible from across the meeting room. */
    .scene-continue {
      margin-top: 3rem;
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
      letter-spacing: 0.01em;
      color: #fff;
      text-transform: none;
      cursor: pointer;
      padding: 16px 38px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
      transition: transform 200ms ease, background 300ms cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 300ms ease;
      /* R10 C — breathing pulse delayed 8s from beat mount so it doesn't pull eye
         from beat content (especially Beat 4's 5-station auto-advance journey). */
      animation: stv-continue-breathe 2500ms ease-in-out 8000ms infinite;
    }
    .scene-continue:hover {
      transform: translateY(-1px);
      background: var(--accent-deep);
      box-shadow: 0 14px 36px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    .scene-continue:active { transform: translateY(0); }
    .scene-continue-arrow {
      display: inline-block;
      font-size: 1.15em;
      line-height: 1;
      transition: transform 200ms ease;
    }
    .scene-continue:hover .scene-continue-arrow { transform: translateX(5px); }
    /* R8 C3 — soft brand-glow breathing pulse on the Continue button */
    @keyframes stv-continue-breathe {
      0%, 100% {
        box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent),
                    0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent);
      }
      50% {
        box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 35%, transparent),
                    0 0 28px 0 color-mix(in srgb, var(--accent) 35%, transparent);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .scene-continue { animation: none; }
    }
    @media (max-width: 520px) {
      .scene-continue { padding: 13px 28px; font-size: 1rem; margin-top: 2rem; }
    }

    /* ============ BEAT 3 — SCALE REVEAL ============ */
    .scale-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem 4rem;
      gap: 0;
      position: relative;
    }
    .scale-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .scale-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 32ch;
      text-align: center;
      margin: 0.5rem 0 0.5rem 0;
    }
    .scale-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* 4.1 — Scale tower: ROUND 2 — promote 32,000+ to dominant hero */
    .scale-tower {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      margin: 1.5rem 0 0.5rem;
    }
    .scale-tower-primary {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(3.5rem, 7vw, 6rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.035em;
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
      font-variation-settings: 'opsz' 144;
      position: relative;
    }
    /* Hero glow under 32,000+ (matches Beat 1 hero numbers) */
    .scale-tower-primary::before {
      content: '';
      position: absolute;
      inset: 12% -10%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 36%, transparent) 0%, transparent 65%);
      filter: blur(50px);
      z-index: -1;
      pointer-events: none;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-tower-primary-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 0.6rem;
      margin-bottom: 1.5rem;
    }
    /* R5 A3 — magazine kerning treatment on "32,000+" */
    .scale-tower-magazine {
      display: inline-flex;
      align-items: baseline;
      gap: 0;
    }
    .scale-mag-32 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      letter-spacing: -0.04em;
    }
    .scale-mag-comma {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
      margin: 0 -0.06em 0 -0.04em;
      transform: translateY(0.05em);
      display: inline-block;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-mag-000 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      letter-spacing: -0.04em;
    }
    .scale-mag-plus {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 0.6em;
      color: var(--accent);
      margin-left: 0.02em;
      transform: rotate(-8deg) translateY(-0.55em);
      display: inline-block;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Round 2 — supporting stats row at half-scale below 32k+ hero */
    .scale-tower-row .scale-stat-value { font-size: clamp(1.1rem, 1.9vw, 1.5rem); }
    .scale-tower-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem 2.5rem;
      max-width: 720px;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .scale-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .scale-stat-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.5rem, 2.6vw, 2.1rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
    }
    .scale-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
    .scale-stat-sub {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 0.2rem;
      opacity: 0.75;
    }
    .scale-stat-flagrow {
      display: flex;
      gap: 2px;
      margin-top: 0.4rem;
    }
    .scale-stat-flagrow span {
      display: inline-block;
      width: 10px;
      height: 7px;
      box-shadow: 0 0 0 1px var(--border) inset;
      border-radius: 1px;
      overflow: hidden;
    }
    .scale-stat-flagrow span svg { width: 100%; height: 100%; display: block; }
    .scale-stat-bar {
      width: 60px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.4rem;
    }
    .scale-stat-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-globe-wrap {
      position: relative;
      width: 100%;
      max-width: 920px;
      aspect-ratio: 1.6 / 1;
      margin: 1rem auto 1rem;
    }
    /* R8 C5 — click-to-explore hint, anchored right of globe centre on desktop;
       stacks below globe on phone. Dismisses on first marker click (App-level state). */
    .globe-hint {
      position: absolute;
      top: 50%;
      right: 1.5rem;
      transform: translateY(-50%);
      max-width: 220px;
      padding: 0.7rem 0.95rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 30%, var(--border)) 100%) border-box;
      border: 1.5px solid transparent;
      border-radius: 10px;
      box-shadow: 0 8px 22px color-mix(in srgb, var(--accent) 12%, transparent);
      display: flex;
      align-items: center;
      gap: 0.55rem;
      z-index: 5;
      opacity: 0;
      animation:
        stv-globe-hint-in-desktop 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 800ms forwards,
        stv-globe-hint-pulse 2400ms ease-in-out 1500ms infinite;
      pointer-events: none;
    }
    @keyframes stv-globe-hint-in-desktop {
      from { opacity: 0; transform: translate(8px, -50%); }
      to   { opacity: 1; transform: translate(0, -50%); }
    }
    @keyframes stv-globe-hint-in-mobile {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes stv-globe-hint-pulse {
      0%, 100% { box-shadow: 0 8px 22px color-mix(in srgb, var(--accent) 12%, transparent); }
      50%      { box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 32%, transparent); }
    }
    .globe-hint-arrow {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
      animation: stv-globe-hint-arrow-nudge 1800ms ease-in-out infinite;
    }
    @keyframes stv-globe-hint-arrow-nudge {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(-4px); }
    }
    .globe-hint-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1.35;
    }
    @media (max-width: 720px) {
      .globe-hint {
        position: relative;
        top: auto; right: auto;
        transform: none;
        max-width: 92%;
        margin: 0.6rem auto 0;
        animation:
          stv-globe-hint-in-mobile 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards,
          stv-globe-hint-pulse 2400ms ease-in-out 1300ms infinite;
      }
    }

    /* R10 D — drag-to-rotate affordance hint, bottom-right pill on globe */
    .globe-drag-hint {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      animation:
        stv-drag-hint-in 500ms cubic-bezier(0.25, 0.1, 0.25, 1) 1200ms forwards,
        stv-drag-hint-wobble 2200ms ease-in-out 2000ms 3,
        stv-drag-hint-out 400ms cubic-bezier(0.4, 0, 0.2, 1) 7600ms forwards;
    }
    .globe-drag-hint-icon {
      font-size: 13px;
      color: var(--accent);
      animation: stv-drag-hint-spin 2200ms ease-in-out infinite;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-drag-hint-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes stv-drag-hint-out {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(4px); }
    }
    @keyframes stv-drag-hint-wobble {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-3px); }
      75%      { transform: translateX(3px); }
    }
    @keyframes stv-drag-hint-spin {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(140deg); }
    }
    @media (max-width: 720px) {
      .globe-drag-hint { bottom: 0.6rem; right: 0.6rem; padding: 4px 9px; font-size: 9px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .globe-drag-hint { animation: stv-drag-hint-in 500ms forwards; }
      .globe-drag-hint-icon { animation: none; }
    }
    /* Round 4 P3 — globe shape on phone: taller (squarer) so the planet doesn't shrink to nothing */
    @media (max-width: 720px) {
      .scale-globe-wrap { aspect-ratio: 1 / 1; max-width: 95vw; }
      .scale-tower-row {
        gap: 1rem 1.25rem;
        padding-top: 0.75rem;
      }
      .scale-stat { min-width: 0; }
      /* Allow flag row to scroll horizontally if 15 flags overflow */
      .scale-stat-flagrow {
        max-width: 110px;
        overflow-x: auto;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .scale-stat-flagrow::-webkit-scrollbar { display: none; }
      .scale-stat-flagrow span { flex-shrink: 0; }
    }
    .scale-globe-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .scale-globe-vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, var(--bg) 100%);
    }
    .scale-globe-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* R5 F1 — 24-hour exchange-opening ribbon */
    .ribbon {
      width: 100%;
      max-width: 920px;
      margin: 0 auto 1.5rem;
      padding: 1rem 1.25rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 26%, transparent) 0%, var(--border) 60%, color-mix(in srgb, var(--accent) 8%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      box-shadow: 0 8px 28px color-mix(in srgb, var(--accent) 8%, transparent);
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ribbon-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .ribbon-head-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }
    .ribbon-head-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: stv-pulse 2200ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ribbon-head-divider { color: var(--text-muted); opacity: 0.5; }
    .ribbon-head-utc {
      color: var(--text-primary);
      font-weight: 600;
    }
    .ribbon-head-stat {
      display: inline-flex;
      align-items: baseline;
      gap: 0.4rem;
    }
    .ribbon-head-stat-num {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ribbon-head-stat-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .ribbon-grid {
      position: relative;
      padding-top: 18px;
      /* R6 P2 — the bars area starts at this gutter (room for left labels) */
      --gutter: 96px;
      overflow: hidden;
    }
    @media (max-width: 720px) {
      .ribbon-grid { --gutter: 64px; }
    }
    .ribbon-axis {
      position: absolute;
      top: 0; left: 96px; right: 0;
      height: 14px;
      border-bottom: 1px dashed color-mix(in srgb, var(--border) 80%, transparent);
    }
    .ribbon-axis-tick {
      position: absolute;
      top: 0;
      width: 0; height: 14px;
      border-left: 1px solid var(--border);
    }
    .ribbon-axis-lbl {
      position: absolute;
      top: -2px;
      left: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .ribbon-rows {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 6px;
    }
    .ribbon-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      align-items: center;
      gap: 8px;
      height: 16px;
      transition: opacity 300ms ease;
    }
    .ribbon-row:not([data-live='true']) { opacity: 0.55; }
    .ribbon-row-lbl {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      text-align: right;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      white-space: nowrap;
    }
    .ribbon-row[data-live='true'] .ribbon-row-lbl {
      color: var(--accent);
      font-weight: 600;
    }
    .ribbon-row-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 40%, transparent);
      animation: stv-ribbon-pulse 1800ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-ribbon-pulse {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 40%, transparent); }
      50%      { box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 0%, transparent); }
    }
    .ribbon-row-track {
      position: relative;
      height: 8px;
      background: var(--surface-elevated);
      border-radius: 2px;
    }
    .ribbon-row-bar {
      position: absolute;
      top: 0; bottom: 0;
      background: color-mix(in srgb, var(--accent) 32%, transparent);
      border-radius: 1px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ribbon-row[data-live='true'] .ribbon-row-bar {
      background: var(--accent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 40%, transparent);
    }
    /* R6 P2 — fix overflow: now-line is a true 0-width vertical strip rendered
       via border-left only. Position computed via inline style as a calc() that
       interpolates inside the bars area (left:96px + nowPct% × (100%-96px)). */
    .ribbon-now-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 0;
      border-left: 1.5px solid var(--accent);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent);
      pointer-events: none;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ribbon-now-line-marker {
      position: absolute;
      top: 0;
      left: -4px;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 720px) {
      .ribbon { padding: 0.85rem 0.85rem; }
      .ribbon-row { grid-template-columns: 64px 1fr; height: 14px; }
      .ribbon-row-lbl { font-size: 9.5px; }
      .ribbon-axis { left: 64px; }
      .ribbon-axis-lbl { font-size: 7.5px; }
      .ribbon-head-stat-num { font-size: 1.25rem; }
    }

    .scale-arc-card {
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      max-width: 280px;
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      animation: stv-arc-card-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 1500ms forwards,
                 stv-arc-card-out 600ms cubic-bezier(0.4, 0, 0.2, 1) 9000ms forwards;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-arc-card-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes stv-arc-card-out {
      to { opacity: 0; transform: translateY(-4px) scale(0.97); }
    }
    .scale-arc-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .scale-arc-meta-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.4rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-arc-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-primary);
      margin: 0;
    }
    .scale-arc-foot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-top: 0.5rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Round 2 — globe marker hover tooltip (audit 3.3) */
    .globe-tooltip {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      z-index: 25;
      opacity: 0;
      transition: opacity 120ms ease;
    }
    .globe-tooltip[data-visible='true'] { opacity: 1; }
    .globe-tooltip::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 7px; height: 7px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .scale-globe-canvas { cursor: grab; touch-action: none; }
    .scale-globe-canvas[data-hovering='true'] { cursor: pointer; }
    .scale-globe-canvas[data-dragging='true'] { cursor: grabbing; }

    /* R6 P3 — transient hover preview tooltip on globe markers */
    .exchange-hover-preview {
      position: fixed;
      z-index: 65;
      width: 300px;
      max-width: 92vw;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0.7rem 0.85rem;
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      pointer-events: none;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 40%, var(--border)) 100%) border-box;
      animation: stv-hover-preview-in 150ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      will-change: opacity, transform;
    }
    @keyframes stv-hover-preview-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .exchange-hover-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 0.45rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .exchange-hover-flag {
      width: 16px; height: 11px;
      flex-shrink: 0;
      border-radius: 1.5px;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .exchange-hover-flag svg { width: 100%; height: 100%; display: block; }
    .exchange-hover-name {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exchange-hover-lang {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .exchange-hover-body {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      line-height: 1.45;
      color: var(--text-primary);
      max-height: 4.5em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .exchange-hover-body[data-lang='AR'],
    .exchange-hover-body[data-lang='HE'] { font-family: 'Noto Naskh Arabic', 'Noto Sans Hebrew', 'Inter', sans-serif; font-size: 13px; }
    .exchange-hover-body[data-lang='JA'] { font-family: 'Noto Serif JP', 'Inter', sans-serif; }
    .exchange-hover-body[data-lang='ZH'] { font-family: 'Noto Serif TC', 'Inter', sans-serif; }
    .exchange-hover-body[data-lang='KO'] { font-family: 'Noto Serif KR', 'Inter', sans-serif; }
    .exchange-hover-body[data-lang='RU'] { font-family: 'Bitter', 'Inter', sans-serif; }
    .exchange-hover-body[data-lang='HI'] { font-family: 'Noto Serif Devanagari', 'Inter', sans-serif; }
    .exchange-hover-foot {
      margin-top: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px dashed var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .exchange-hover-foot-dot {
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .exchange-hover-foot-divider { opacity: 0.4; }
    .exchange-hover-foot-cta { color: var(--accent); margin-left: auto; }
    @media (max-width: 720px) {
      .exchange-hover-preview { width: 260px; padding: 0.55rem 0.7rem; }
      .exchange-hover-body { font-size: 11.5px; -webkit-line-clamp: 2; }
    }

    /* Round 2 — exchange detail side panel (audit 3.3) */
    .exchange-panel {
      position: fixed;
      top: 64px;
      right: 0;
      bottom: 0;
      width: min(440px, 92vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -16px 0 50px rgba(0,0,0,0.18);
      z-index: 70;
      transform: translateX(100%);
      transition: transform 360ms cubic-bezier(0.25, 0.1, 0.25, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .exchange-panel[data-open='true'] {
      transform: translateX(0);
    }
    /* Round 4 P3 — bottom-sheet pattern on phone instead of right-drawer */
    @media (max-width: 720px) {
      .exchange-panel {
        top: auto;
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        max-width: 100%;
        max-height: 75vh;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -16px 50px rgba(0,0,0,0.22);
        transform: translateY(100%);
        transition: transform 360ms cubic-bezier(0.25, 0.1, 0.25, 1);
      }
      .exchange-panel[data-open='true'] { transform: translateY(0); }
      /* Add a small drag-affordance bar at the top of the sheet */
      .exchange-panel::before {
        content: '';
        position: absolute;
        top: 8px; left: 50%;
        transform: translateX(-50%);
        width: 38px; height: 4px;
        background: var(--text-muted);
        opacity: 0.45;
        border-radius: 2px;
        z-index: 1;
      }
      .exchange-panel-header { padding-top: 1.4rem; }
    }
    .exchange-panel-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, var(--surface)) 0%, var(--surface) 100%);
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .exchange-panel-flag {
      width: 36px;
      height: 24px;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .exchange-panel-flag svg { width: 100%; height: 100%; display: block; }
    .exchange-panel-titles {
      flex: 1;
      min-width: 0;
    }
    .exchange-panel-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.15;
      margin: 0;
    }
    .exchange-panel-locale {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
