    .user-preview-pill {
      padding: 1px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
    }
    .user-preview-pill[data-tone='accent'] {
      color: var(--accent);
      border-color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Operational metrics panel */
    .ops-panel {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, transparent) 0%, var(--border) 55%, color-mix(in srgb, var(--accent) 8%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 1.25rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-panel-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ops-panel-eyebrow-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: stv-pulse 2400ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem 1rem;
    }
    .ops-cell {
      padding: 0.875rem 0.875rem;
      background: var(--surface-elevated);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }
    /* 4.7 — Sparkline on ops cells */
    .ops-cell-sparkline {
      width: 100%;
      height: 18px;
      margin: 0.4rem 0 0.55rem;
      display: block;
    }
    .ops-cell-sparkline path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.4;
      opacity: 0.65;
      transition: stroke 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-cell-sparkline circle {
      fill: var(--accent);
      transition: fill 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* E6 — User preview screen reflection (subtle scroll-tied gradient) */
    .user-preview {
      position: relative;
    }
    .user-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        100deg,
        transparent 0%,
        color-mix(in srgb, var(--accent) 8%, transparent) var(--reflectPos, 30%),
        color-mix(in srgb, white 6%, transparent) calc(var(--reflectPos, 30%) + 6%),
        transparent calc(var(--reflectPos, 30%) + 30%)
      );
      border-radius: 16px;
      transition: background 1200ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-cell-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .ops-cell-value[data-tone='accent'] { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .ops-cell-value[data-tone='success'] { color: var(--green); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .ops-cell-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .ops-cell-foot {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 0.35rem;
      line-height: 1.3;
    }

    .output-foot {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 1rem;
    }
    .output-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin: 0 auto 1.5rem;
    }
    .output-subline strong { color: var(--text-primary); font-weight: 500; }

    /* 1.1 — Bottom-right beat pager (replaces per-scene Continue buttons) */
    .stv-pager {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 60;
      padding: 0.625rem 0.875rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 28%, transparent) 0%, var(--border) 60%) border-box;
      border: 1px solid transparent;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 0.625rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 720px) {
      .stv-pager {
        right: 50%;
        transform: translateX(50%);
        bottom: 1rem;
      }
    }
    .stv-pager-current {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
      padding-right: 0.4rem;
      border-right: 1px solid var(--border);
    }
    .stv-pager-current-num {
      color: var(--text-primary);
      font-weight: 600;
    }
    .stv-pager-current-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 11.5px;
      color: var(--text-primary);
      letter-spacing: -0.005em;
      text-transform: none;
      margin-left: 4px;
    }
    .stv-pager-dots {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stv-pager-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 200ms ease, border-color 200ms ease, transform 200ms ease;
      position: relative;
    }
    .stv-pager-dot:hover {
      transform: scale(1.3);
      border-color: var(--text-muted);
    }
    .stv-pager-dot[data-active='true'] {
      background: var(--accent);
      border-color: var(--accent);
      width: 10px; height: 10px;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    .stv-pager-dot[data-visited='true']:not([data-active='true']) {
      background: color-mix(in srgb, var(--accent) 35%, transparent);
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .stv-pager-keys {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      padding-left: 0.4rem;
      border-left: 1px solid var(--border);
    }
    @media (max-width: 480px) {
      .stv-pager-current { display: none; }
      .stv-pager-keys { display: none; }
    }

    /* D1 — letter-spacing entry animation on text mounts */
    .stv-letter-enter {
      animation: stv-letter-spread 700ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-letter-spread {
      from { letter-spacing: 0.08em; opacity: 0; }
      to   { letter-spacing: inherit; opacity: 1; }
    }

    /* 3.6 — Continue button "ink fill" hover (where buttons remain after pager) */
    .scene-continue {
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    .scene-continue::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 320ms cubic-bezier(0.33, 1, 0.68, 1);
      z-index: -1;
    }
    .scene-continue:hover::before {
      transform: translateX(0);
    }
    .scene-continue:hover {
      color: var(--surface);
      border-color: var(--accent);
      background: transparent;
    }
    .scene-continue:hover .scene-continue-arrow { transform: translateX(4px); }

    /* "Live data simulation" badge per L.1 */
    .sim-badge {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      opacity: 0.42;
      pointer-events: none;
      z-index: 40;
      max-width: 280px;
      line-height: 1.4;
    }
    .sim-badge strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ============ BEAT 7 — CLOSE ============ */
    .close-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      position: relative;
    }
    /* Background wash on close scene — wider, more prominent */
    .close-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, color-mix(in srgb, var(--accent) 14%, transparent) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.34em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 200ms forwards;
    }
    .close-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-line {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      max-width: 22ch;
      margin: 0;
      filter: blur(20px);
      opacity: 0;
      animation: stv-blur-focus 1800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .close-line em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-accent-line {
      width: 80px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0;
      animation: stv-line-grow 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 1800ms forwards;
      transform-origin: center;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0;
      animation: stv-fade-in 1000ms cubic-bezier(0.25, 0.1, 0.25, 1) 2200ms forwards;
      display: inline-flex;
      align-items: baseline;
      gap: 0.55rem;
    }
    .close-mark em {
      font-style: italic;
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-mark-stv { position: relative; color: var(--text-primary); }
    /* E7 — wordmark shimmer animation */
    .close-mark-shimmer {
      position: absolute;
      inset: -2px -4px;
      background: linear-gradient(110deg, transparent 30%, color-mix(in srgb, var(--accent) 38%, transparent) 50%, transparent 70%);
      background-size: 200% 100%;
      background-position: -100% 0;
      animation: stv-mark-shimmer 4000ms linear infinite;
      mix-blend-mode: screen;
      pointer-events: none;
      border-radius: 4px;
    }
    @keyframes stv-mark-shimmer {
      0%   { background-position: -120% 0; }
      35%  { background-position: 120% 0; }
      100% { background-position: 120% 0; }
    }
    .close-mark-x {
      color: var(--text-muted);
      opacity: 0.6;
      font-size: 14px;
      font-style: normal;
    }
    .close-mark-brand {
      color: var(--accent);
      font-style: italic;
      font-weight: 500;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-restart {
      margin-top: 4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: color 200ms ease, border-color 200ms ease;
      border: 1px solid transparent;
      border-radius: 2px;
      background: transparent;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .close-restart:hover {
      color: var(--accent);
      border-color: var(--border);
    }
    .close-restart-arrow {
      display: inline-block;
      margin-left: 0.5rem;
      transition: transform 200ms ease;
    }
    .close-restart:hover .close-restart-arrow { transform: translateX(-4px); }
  </style>
</head>

  // B5 — Brand-locked city horizon (Beat 7, 500x60)
  // Per-brand city + highlighted building from BRAND_CITY_MAP.
  const BRAND_CITY_MAP = {
    etoro:   { city: 'Tel Aviv',     skyline: 'telaviv',   highlightIdx: 4 },
    ibkr:    { city: 'Greenwich, CT',skyline: 'lowrise',   highlightIdx: 5 },
    bac:     { city: 'New York',     skyline: 'manhattan', highlightIdx: 6 },
    jpm:     { city: 'New York',     skyline: 'manhattan', highlightIdx: 4 },
    plus500: { city: 'Haifa',        skyline: 'haifa',     highlightIdx: 3 },
    t212:    { city: 'London',       skyline: 'london',    highlightIdx: 5 },
  };
  function IllustrationCityHorizon({ brandSlug }) {
    const meta = BRAND_CITY_MAP[brandSlug] || BRAND_CITY_MAP.etoro;
    // Build a row of 9-12 building rectangles per skyline type. Heights vary
    // by skyline; one building (highlightIdx) is filled with brand --accent.
    let buildings = [];
    if (meta.skyline === 'manhattan') {
      // tall, varied — Empire-State silhouette in middle
      buildings = [22, 30, 18, 42, 28, 50, 38, 24, 32, 20, 26];
    } else if (meta.skyline === 'london') {
      // spire + dome cluster — St Paul's-ish dome at idx 5
      buildings = [16, 22, 18, 26, 20, 32, 24, 28, 18, 22, 16];
    } else if (meta.skyline === 'telaviv') {
      // mid-rise modernist
      buildings = [18, 26, 22, 30, 28, 34, 24, 28, 22, 20];
    } else if (meta.skyline === 'haifa') {
      // hillside tier
      buildings = [14, 18, 24, 30, 28, 24, 22, 20, 18];
    } else {
      // lowrise default (Greenwich, CT)
      buildings = [16, 18, 20, 22, 18, 24, 20, 18, 16, 14];
    }
    const w = 500;
    const baseY = 56;
    const slotW = w / buildings.length;
    return (
      <svg className="illust illust--horizon" viewBox={`0 0 ${w} 60`} preserveAspectRatio="xMidYMax meet" aria-hidden="true" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
        {/* Horizon line */}
        <line x1="0" y1={baseY} x2={w} y2={baseY} opacity="0.6"/>
        {/* Buildings */}
        {buildings.map((h, i) => {
          const x = i * slotW + 4;
          const bw = slotW - 8;
          const y = baseY - h;
          const isHighlight = i === meta.highlightIdx;
          // London dome adjustment
          if (meta.skyline === 'london' && i === 5) {
            return (
              <g key={i}>
                <rect x={x} y={y + 4} width={bw} height={h - 4} fill={isHighlight ? 'var(--accent)' : 'none'} stroke="currentColor"/>
                <ellipse cx={x + bw/2} cy={y + 4} rx={bw/2} ry="6" fill={isHighlight ? 'var(--accent)' : 'none'} stroke="currentColor"/>
                <line x1={x + bw/2} y1={y - 6} x2={x + bw/2} y2={y - 2} stroke={isHighlight ? 'var(--accent)' : 'currentColor'}/>
              </g>
            );
          }
          return (
            <rect
              key={i}
              x={x}
              y={y}
              width={bw}
              height={h}
              fill={isHighlight ? 'var(--accent)' : 'none'}
              stroke="currentColor"
              opacity={isHighlight ? 1 : 0.85}
            />
          );
        })}
        {/* City name label */}
        <text x={w / 2} y="6" textAnchor="middle" fontSize="6" fill="currentColor" stroke="none" letterSpacing="2" fontFamily="'JetBrains Mono', monospace" opacity="0.5">
          {meta.city.toUpperCase()}

  // ============================================================================
  // AUDIO SYSTEM (audit A4) — procedural Web Audio, default OFF
  // ----------------------------------------------------------------------------
  // 4 sounds: click, gatePass, typewriter, closeChord. Tasteful frequencies.
  // Lazy-init AudioContext on first toggle-on (user gesture required).
  // ============================================================================
  const audioState = {
    ctx: null,
    enabled: false,
    init() {
      if (this.ctx) return this.ctx;
      try {
        const C = window.AudioContext || window.webkitAudioContext;
        if (!C) return null;
        this.ctx = new C();
      } catch (e) { return null; }
      return this.ctx;
    },
    play(name) {
      if (!this.enabled) return;
      const ctx = this.init();
      if (!ctx) return;
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.value = 0;
      master.connect(ctx.destination);
      try {
        if (name === 'click') {
          const o = ctx.createOscillator();
          o.type = 'sine'; o.frequency.value = 580;
          o.connect(master);
          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(0.05, now + 0.005);
          master.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
          o.start(now); o.stop(now + 0.1);
        } else if (name === 'gatePass') {
          // soft 220Hz → 330Hz pass tone
          const o = ctx.createOscillator();
          o.type = 'sine'; o.frequency.setValueAtTime(220, now);
          o.frequency.exponentialRampToValueAtTime(330, now + 0.18);
          o.connect(master);
          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(0.07, now + 0.04);
          master.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
          o.start(now); o.stop(now + 0.34);
        } else if (name === 'typewriter') {
          // brief click — 1.5kHz quick triangle
          const o = ctx.createOscillator();
          o.type = 'triangle'; o.frequency.value = 1500;
          o.connect(master);
          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(0.025, now + 0.002);
          master.gain.exponentialRampToValueAtTime(0.0001, now + 0.025);
          o.start(now); o.stop(now + 0.03);
        } else if (name === 'closeChord') {
          // soft major triad — 261.6 (C) + 329.6 (E) + 392 (G)
          [261.6, 329.6, 392].forEach((f, i) => {
            const o = ctx.createOscillator();
            o.type = 'sine'; o.frequency.value = f;
            const g = ctx.createGain(); g.gain.value = 0;
            o.connect(g); g.connect(master);
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.08, now + 0.05 + i * 0.04);
            g.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
            o.start(now); o.stop(now + 1.7);
          });
          master.gain.setValueAtTime(1, now);
        }
      } catch (e) { /* swallow */ }
    },
  };

  // ---- CountUp (audit 3.2 + D2) — animated numerical reveal ----
  // Counts from 0 (or `from`) to `to` over `duration` ms with easeOutCubic.
  // 60Hz tick. Settles exactly on `to`. Optional `format` for "+", "%", "k" etc.
  function useCountUp(target, opts) {
    const { duration = 1200, delay = 0, format = (v) => Math.round(v).toString(), enabled = true } = opts || {};
    const [val, setVal] = useState(enabled ? 0 : target);
    useEffect(() => {
      if (!enabled) { setVal(target); return; }
      let rafId = null;
      let startTs = null;
      const startTimer = setTimeout(() => {
        const tick = (ts) => {
          if (startTs === null) startTs = ts;
          const elapsed = ts - startTs;
          const t = Math.min(1, elapsed / duration);
          // easeOutCubic
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(target * eased);
          if (t < 1) rafId = requestAnimationFrame(tick);
          else setVal(target);
        };
        rafId = requestAnimationFrame(tick);
      }, delay);
      return () => {
        clearTimeout(startTimer);
        if (rafId) cancelAnimationFrame(rafId);
      };
    }, [target, duration, delay, enabled]);
    return format(val);
  }
  function CountUp({ to, duration, delay, format, suffix, className, style }) {
    const display = useCountUp(to, { duration, delay, format });
    return (
      <span className={className} style={style}>
        {display}{suffix || ''}
      </span>
    );
  }

  // ---- Config cache (per Beat 4 B.4.A) ----
  const configCache = new Map();

  async function loadBrandConfig(slug) {
    if (configCache.has(slug)) return configCache.get(slug);
    const safe = String(slug).replace(/[^a-z0-9_-]/gi, '');
    const url = `../config/${encodeURIComponent(safe)}.json`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const cfg = await res.json();
    configCache.set(slug, cfg);
    return cfg;
  }

  // ---- CSS variable application (per Beat 4 B.4.D, hybrid 3-way --green rule) ----
  function applyBrandVars(cfg) {
    if (!cfg || !cfg.branding) return;
    const b = cfg.branding;
    const root = document.documentElement;
    if (b.primaryColor) {
      root.style.setProperty('--accent', b.primaryColor);
      root.style.setProperty('--gold', b.primaryColor); // Mission Control alias
    }
    if (b.accentDeep) root.style.setProperty('--accent-deep', b.accentDeep);
    if (b.accent2) {
      root.style.setProperty('--accent-2', b.accent2);
      root.style.setProperty('--cyan', b.accent2); // Mission Control alias
    }
    // --green hybrid 3-way rule: brand-aligned green if successColor present;
    // neutral fallback otherwise. Per Beat 4 B.4.D + B.3 lock.
    root.style.setProperty('--green', b.successColor || '#22c55e');
    if (b.pageTitle) document.title = b.pageTitle;
  }

  // ============================================================================
  // SimpleGlobe — Beat 3 cinematic. Three.js sphere + 53 markers + flying arcs +
  // atmospheric haze + cloud layer + orbit particles + airplane-blink markers.
  // ----------------------------------------------------------------------------
  // Audit upgrades: 3.3 faster rotation, 3.4 flying arcs Tokyo→NY (and others),
  // E3 atmosphere/clouds/airplane blinks, D4 orbit particles, A3 hooks for
  // headline-on-arc-land event (handled by parent ScaleScene via onArc callback).
  // ============================================================================
  // Helper: lat/lng → 3D position on sphere of radius R (module scope so other
  // utilities can reuse for screen-space projection if needed).
  function latLngToVec3(lat, lng, R) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lng + 180) * (Math.PI / 180);
    const x = -R * Math.sin(phi) * Math.cos(theta);
    const y = R * Math.cos(phi);
    const z = R * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }

  function SimpleGlobe({ accent, onArcLand }) {
    const containerRef = useRef(null);
    const stateRef = useRef(null);
    const onArcLandRef = useRef(onArcLand);
    useEffect(() => { onArcLandRef.current = onArcLand; }, [onArcLand]);

    useEffect(() => {
      const container = containerRef.current;
      if (!container) return;
      if (typeof THREE === 'undefined') {
        console.warn('[stv-unified] THREE.js not available — globe will render placeholder');
        return;
      }

      // Detect perf mode
      let perfMode = false;
      try {
        perfMode = new URLSearchParams(location.search).get('perf') === '1';
      } catch (e) { /* no-op */ }

      const width = container.clientWidth || 800;
      const height = container.clientHeight || 500;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      camera.position.z = 280;

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: !perfMode });
      renderer.setPixelRatio(perfMode ? 1 : Math.min(2, window.devicePixelRatio));
      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      const accentColor = new THREE.Color(accent || '#6AAE22');

      // Globe sphere — subtle dark interior
      const sphereGeom = new THREE.SphereGeometry(85, perfMode ? 32 : 64, perfMode ? 16 : 32);
      const sphereMat = new THREE.MeshBasicMaterial({
        color: 0x111418,
        transparent: true,
        opacity: 0.92,
        wireframe: false,
      });
      const sphere = new THREE.Mesh(sphereGeom, sphereMat);
      scene.add(sphere);

      // Atmospheric haze — outer sphere with brand-tint glow (E3)
      const hazeGeom = new THREE.SphereGeometry(91, 32, 16);
      const hazeMat = new THREE.MeshBasicMaterial({
        color: accentColor,
        transparent: true,
        opacity: 0.06,
        side: THREE.BackSide,
      });
      const haze = new THREE.Mesh(hazeGeom, hazeMat);
      scene.add(haze);

      // Cloud layer — second outer sphere with subtle noise texture (E3)
      // Procedural via short canvas-derived texture
      const cloudCanvas = document.createElement('canvas');
      cloudCanvas.width = 256; cloudCanvas.height = 128;
      const cctx = cloudCanvas.getContext('2d');
      cctx.fillStyle = 'rgba(0,0,0,0)';
      cctx.fillRect(0, 0, 256, 128);
      // Random soft cloud blobs
      for (let i = 0; i < 22; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 128;
        const r = 8 + Math.random() * 14;
        const grad = cctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, 'rgba(255,255,255,0.45)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        cctx.fillStyle = grad;
        cctx.beginPath(); cctx.arc(x, y, r, 0, Math.PI * 2); cctx.fill();
      }
      const cloudTex = new THREE.CanvasTexture(cloudCanvas);
      cloudTex.wrapS = THREE.RepeatWrapping;
      cloudTex.wrapT = THREE.RepeatWrapping;
      const cloudGeom = new THREE.SphereGeometry(86.4, 32, 16);
      const cloudMat = new THREE.MeshBasicMaterial({
        map: cloudTex,
        transparent: true,
        opacity: 0.18,
        depthWrite: false,
      });
      const clouds = new THREE.Mesh(cloudGeom, cloudMat);
      scene.add(clouds);

      // Wireframe overlay for "world grid" feel
      const wireGeom = new THREE.SphereGeometry(85.1, 24, 16);
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.05,
      });
      const wire = new THREE.Mesh(wireGeom, wireMat);
      scene.add(wire);

      // Exchange dots — 53 markers, brand-tinted
      const dotsGroup = new THREE.Group();
      const blinkMaterials = []; // for airplane-blink animation (E3)
      EXCHANGES_53.forEach((ex) => {
        const pos = latLngToVec3(ex.lat, ex.lng, 86);
        const dotGeom = new THREE.SphereGeometry(1.2, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0.95 });
        const dot = new THREE.Mesh(dotGeom, dotMat);
        dot.position.copy(pos);
        dotsGroup.add(dot);
        // Halo ring
        const haloGeom = new THREE.RingGeometry(1.6, 2.4, 16);
        const haloMat = new THREE.MeshBasicMaterial({
          color: accentColor,
          transparent: true,
          opacity: 0.35,
          side: THREE.DoubleSide,
        });
        const halo = new THREE.Mesh(haloGeom, haloMat);
        halo.position.copy(pos);
        halo.lookAt(0, 0, 0);
        dotsGroup.add(halo);
        // Airplane-blink — tiny pulsing dot just above each marker (E3)
        const blinkMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
        const blink = new THREE.Mesh(new THREE.SphereGeometry(0.55, 6, 6), blinkMat);
        blink.position.copy(pos.clone().multiplyScalar(1.025));
        blinkMaterials.push({ mat: blinkMat, phase: Math.random() * Math.PI * 2 });
        dotsGroup.add(blink);
      });
      scene.add(dotsGroup);

      // Orbit particles — 60 small dots in a slow ring around the planet (D4)
      const orbitGroup = new THREE.Group();
      const orbitParticles = [];
      const orbitCount = perfMode ? 30 : 60;
      for (let i = 0; i < orbitCount; i++) {
        const angle = (i / orbitCount) * Math.PI * 2;
        const tilt = (Math.random() - 0.5) * 0.6;
        const r = 110 + Math.random() * 12;
        const orbitMat = new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0.45 + Math.random() * 0.35 });
        const orbitMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 4, 4), orbitMat);
        orbitParticles.push({ angle, tilt, r, mesh: orbitMesh, mat: orbitMat });
        orbitGroup.add(orbitMesh);
      }
      scene.add(orbitGroup);

      // Initial rotation — favor NA + Europe in default view
      const initialRotX = -0.25;
      const initialRotY = -1.2;
      [sphere, haze, clouds, wire, dotsGroup].forEach((m) => {
        m.rotation.x = initialRotX;
        m.rotation.y = initialRotY;
      });

      // Flying arcs (audit 3.4) — animated great-circle paths between exchange pairs
      const arcGroup = new THREE.Group();
      // Arcs sit OUTSIDE the rotating dots group so they remain in view long
      // enough for the user to read the headline overlay. Position is computed
      // including the current dotsGroup rotation at fire time.
      scene.add(arcGroup);

      const ARC_EVENTS = [
        { fromCode: 'TSE-TYO', toCode: 'NYSE',     headline: '日経平均、連日の高値更新',                       trans: 'Nikkei extends record high, second day',   lang: 'JP' },
        { fromCode: 'B3',      toCode: 'LSE',      headline: 'Petrobras anuncia recorde de exportação',         trans: 'Petrobras announces record oil export',   lang: 'PT' },
        { fromCode: 'XETRA',   toCode: 'HKEX',     headline: 'ASML sichert TSMC-Großauftrag',                  trans: 'ASML secures major TSMC order',           lang: 'DE' },
        { fromCode: 'NYSE',    toCode: 'TSE-TYO',  headline: 'Fed minutes signal patience on cuts',             trans: '',                                        lang: 'EN' },
        { fromCode: 'EURONEXT',toCode: 'BMV',      headline: 'LVMH crece 9,4% en mercados latinoamericanos',    trans: 'LVMH grows 9.4% in Latin American markets', lang: 'ES' },
        { fromCode: 'HKEX',    toCode: 'EURONEXT', headline: 'Tencent dépasse les attentes du Q1',              trans: 'Tencent beats Q1 expectations',           lang: 'FR' },
      ];

      function getExchangePos(code) {
        const ex = EXCHANGES_53.find((e) => e.code === code);
        if (!ex) return null;
        return latLngToVec3(ex.lat, ex.lng, 86);
      }

      function fireArc(eventIdx) {
        const ev = ARC_EVENTS[eventIdx % ARC_EVENTS.length];
        const a = getExchangePos(ev.fromCode);
        const b = getExchangePos(ev.toCode);
        if (!a || !b) return;
        // Apply current dotsGroup rotation so arc starts/ends at the visible
        // marker positions (the arc itself doesn't rotate with the planet).
        const m4 = new THREE.Matrix4();
        m4.makeRotationY(dotsGroup.rotation.y);
        m4.multiply(new THREE.Matrix4().makeRotationX(dotsGroup.rotation.x));
        const aRot = a.clone().applyMatrix4(m4);
        const bRot = b.clone().applyMatrix4(m4);

        // Great-circle approximation via QuadraticBezierCurve3 with elevated control point
        const mid = aRot.clone().add(bRot).multiplyScalar(0.5);
        const dist = aRot.distanceTo(bRot);
        const elev = Math.min(60, dist * 0.45);
        const ctrl = mid.clone().normalize().multiplyScalar(86 + elev);
        const curve = new THREE.QuadraticBezierCurve3(aRot, ctrl, bRot);
        const points = curve.getPoints(64);
        const geom = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({ color: accentColor, transparent: true, opacity: 0.95 });
        const line = new THREE.Line(geom, mat);
        line.geometry.setDrawRange(0, 0);
        arcGroup.add(line);

        // Bloom at destination — sphere that scales + fades after arc lands
        const bloomMat = new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0 });
        const bloom = new THREE.Mesh(new THREE.SphereGeometry(2.5, 16, 16), bloomMat);
        bloom.position.copy(bRot);
        arcGroup.add(bloom);

        // Animate draw range over 1500ms; then bloom; then fade arc + bloom.
        const arcStart = performance.now();
        const arcDur = 1500;
        const fadeDur = 1500;
        const totalDur = arcDur + 4500 + fadeDur;
        let bloomFired = false;

        function tick() {
          const t = performance.now() - arcStart;
          if (t < arcDur) {
            const p = t / arcDur;
            // ease-out-quart
            const eased = 1 - Math.pow(1 - p, 4);
            line.geometry.setDrawRange(0, Math.floor(64 * eased) + 1);
          } else if (t < arcDur + 800) {
            // Bloom phase
            line.geometry.setDrawRange(0, 65);
            if (!bloomFired) {
              bloomFired = true;
              try { onArcLandRef.current && onArcLandRef.current(ev); } catch (e) {}
            }
            const bp = (t - arcDur) / 800;
            bloomMat.opacity = (1 - bp) * 0.85;
            bloom.scale.setScalar(1 + bp * 1.8);
          } else if (t < totalDur - fadeDur) {
            // Hold
            mat.opacity = 0.92;
            bloomMat.opacity = 0;
          } else if (t < totalDur) {
            // Fade out
            const fp = (t - (totalDur - fadeDur)) / fadeDur;
            mat.opacity = 0.92 * (1 - fp);
          } else {
            // Cleanup
            arcGroup.remove(line);
            arcGroup.remove(bloom);
            geom.dispose(); mat.dispose(); bloomMat.dispose();
            bloom.geometry.dispose();
            return;
          }
          requestAnimationFrame(tick);
        }
        tick();
      }

      // Fire arcs every 8 sec, cycling through ARC_EVENTS
      let arcEventIdx = 0;
      const arcInterval = setInterval(() => {
        fireArc(arcEventIdx);
        arcEventIdx++;
      }, 8000);
      // Fire first arc shortly after mount
      const arcKickoff = setTimeout(() => { fireArc(arcEventIdx); arcEventIdx++; }, 1200);

      // Animate — Y rotation + orbit particles + blinks (audit 3.3 faster speed)
      const speed = perfMode ? 0.0014 : 0.0025;
      const cloudSpeed = speed * 0.4; // clouds drift slower than planet
      let rafId = null;
      const animate = () => {
        const tNow = performance.now() * 0.001;
        sphere.rotation.y += speed;
        haze.rotation.y += speed;
        wire.rotation.y += speed;
        dotsGroup.rotation.y += speed;
        clouds.rotation.y += cloudSpeed;
        // Orbit particles spin around the planet
        orbitParticles.forEach((p, i) => {
          const a = p.angle + tNow * 0.15;
          const x = Math.cos(a) * p.r * Math.cos(p.tilt);
          const y = Math.sin(p.tilt) * p.r;
          const z = Math.sin(a) * p.r * Math.cos(p.tilt);
          p.mesh.position.set(x, y, z);
        });
        // Airplane-blink animation
        blinkMaterials.forEach((b) => {
          b.mat.opacity = (Math.sin(tNow * 2.5 + b.phase) + 1) * 0.5 * 0.55;
        });
        renderer.render(scene, camera);
        rafId = requestAnimationFrame(animate);
      };
      animate();

      // Resize handling
      const onResize = () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      };
      window.addEventListener('resize', onResize);

      stateRef.current = { renderer, scene, dotsGroup, accentColor, hazeMat, blinkMaterials, orbitParticles };

      return () => {
        if (rafId) cancelAnimationFrame(rafId);
        clearInterval(arcInterval);
        clearTimeout(arcKickoff);
        window.removeEventListener('resize', onResize);
        renderer.dispose();
        sphereGeom.dispose(); sphereMat.dispose();
        wireGeom.dispose(); wireMat.dispose();
        hazeGeom.dispose(); hazeMat.dispose();
        cloudGeom.dispose(); cloudMat.dispose();
        cloudTex.dispose();
        dotsGroup.children.forEach((m) => {
          if (m.geometry) m.geometry.dispose();
          if (m.material) m.material.dispose();
        });
        orbitParticles.forEach((p) => {
          p.mesh.geometry.dispose();
          p.mat.dispose();
        });
        if (renderer.domElement && renderer.domElement.parentNode === container) {
          container.removeChild(renderer.domElement);
        }
      };
    // eslint-disable-next-line react-hooks/exhaustive-deps
    }, []); // mount once; brand color updates via separate effect

    // Update dot colors when accent changes (brand switch)
    useEffect(() => {
      const s = stateRef.current;
      if (!s || typeof THREE === 'undefined') return;
      const newColor = new THREE.Color(accent || '#6AAE22');
      s.accentColor = newColor;
      s.dotsGroup.children.forEach((m) => {
        if (m.material && m.material.color) m.material.color.copy(newColor);
      });
      if (s.hazeMat) s.hazeMat.color.copy(newColor);
      s.orbitParticles.forEach((p) => p.mat.color.copy(newColor));
    }, [accent]);

    return <div ref={containerRef} className="scale-globe-canvas" />;
  }

        {/* Inner arch (slightly smaller) */}
        <path d={`M ${archX - archR + 4} ${baseY} L ${archX - archR + 4} ${top + archR + 1} A ${archR - 4} ${archR - 4} 0 0 1 ${archX + archR - 4} ${top + archR + 1} L ${archX + archR - 4} ${baseY}`} opacity="0.7" />

        <line x1={archX - archR - 3} y1={baseY} x2={archX + archR + 3} y2={baseY} />

  // ============================================================================
  // GenInset (E4) — token-by-token script generation animation
  // Types out the eToro pinned final script (or fallback) at ~12 chars/sec.
  // ============================================================================
  function GenInset({ active, text, onPlayTone }) {
    const [shown, setShown] = useState(0);
    useEffect(() => {
      if (!active || !text) { setShown(0); return; }
      let cancelled = false;
      let lastSoundIdx = -1;
      const charPerMs = 12 / 1000;
      const start = performance.now();
      const tick = () => {
        if (cancelled) return;
        const t = performance.now() - start;
        const next = Math.min(text.length, Math.floor(t * charPerMs));
        setShown(next);
        // typewriter sound on every ~5th char
        if (onPlayTone && next > lastSoundIdx + 4) {
          lastSoundIdx = next;
          onPlayTone();
        }
        if (next < text.length) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
      return () => { cancelled = true; };
    }, [active, text, onPlayTone]);
    return (
      <div className="gen-inset">
        <div className="gen-inset-head">
          <span className="gen-inset-head-dot" />
          AI is writing the script now · Sonnet 4.6
        </div>
        <div className="gen-inset-text">
          {text ? text.slice(0, shown) : ''}
          {active && shown < (text?.length || 0) && <span className="gen-cursor" aria-hidden="true" />}
        </div>
      </div>
    );
  }

  // ============================================================================
  // Sparkline (audit 4.7) — small inline 30-day-ish sparkline
  // ============================================================================
  function Sparkline({ data, width, height }) {
    const w = width || 100;
    const h = height || 18;
    const pad = 2;
    if (!data || data.length === 0) return null;
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;
    const stepX = (w - pad * 2) / (data.length - 1);
    const points = data.map((v, i) => {
      const x = pad + i * stepX;
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return [x, y];
    });
    const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
    const last = points[points.length - 1];
    return (
      <svg className="ops-cell-sparkline" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" aria-hidden="true">
        <path d={path} />
        <circle cx={last[0]} cy={last[1]} r="1.6" />
      </svg>
    );
  }
  // Pre-generated sparkline data per ops cell — looks "trendy upward" for most
  function genSparkData(seed, len, baseDir) {
    const arr = [];
    let v = 50 + (seed * 7) % 30;
    for (let i = 0; i < len; i++) {
      v += (Math.sin(i * 0.5 + seed) * 4) + (Math.random() - 0.45) * 6 + (baseDir || 0) * 0.8;
      arr.push(Math.max(10, Math.min(95, v)));
    }
    return arr;
  }

  // ============================================================================
  // App — top-level state machine
  // ============================================================================
  function App() {
    const [booted, setBooted] = useState(false);
    const [activeBeat, setActiveBeat] = useState(BEATS.HOOK);
    const [theme, setTheme] = useState(() => {
      try { return document.documentElement.dataset.theme || 'light'; }
      catch (e) { return 'light'; }
    });
    const [brandSlug, setBrandSlug] = useState(() => {
      try {
        const param = new URLSearchParams(location.search).get('client');
        return KNOWN_SLUGS.includes(param) ? param : DEFAULT_SLUG;
      } catch (e) { return DEFAULT_SLUG; }
    });
    const [brandConfig, setBrandConfig] = useState(null);
    const [audioOn, setAudioOn] = useState(false);
    const [brandFlashKey, setBrandFlashKey] = useState(0);
    const switchInFlight = useRef(false);

    // Trigger brand-flash overlay on every brand change (audit 1.4 + E2)
    useEffect(() => {
      if (brandFlashKey === 0) return; // skip first paint
      const el = document.getElementById('stv-brand-flash');
      if (!el) return;
      el.setAttribute('data-firing', 'false');
      // Force reflow so the animation re-fires
      void el.offsetWidth;
      el.setAttribute('data-firing', 'true');
      audioState.play('click');
    }, [brandFlashKey]);

    // Async config load on brandSlug change
    useEffect(() => {
      let cancelled = false;
      switchInFlight.current = true;
      loadBrandConfig(brandSlug)
        .then((cfg) => {
          if (cancelled) return;
          setBrandConfig(cfg);
          applyBrandVars(cfg);
          // Sync URL — stay shallow so back button works
          try {
            const u = new URL(location.href);
            if (brandSlug === DEFAULT_SLUG) u.searchParams.delete('client');
            else u.searchParams.set('client', brandSlug);
            history.replaceState({}, '', u.toString());
          } catch (e) { /* no-op */ }
        })
        .catch((err) => {
          if (cancelled) return;
          // Defensive fallback per B.4.G — keep current brand visually, surface a toast.
          console.error('[stv-unified] brand config load failed for', brandSlug, err);
          showToast(`Couldn't load ${BRAND_DISPLAY_DEFAULTS[brandSlug]?.shortName || brandSlug} config — staying on current.`);
          if (brandSlug !== DEFAULT_SLUG) {
            // Roll back to default if current load failed
            setBrandSlug(DEFAULT_SLUG);
          }
        })
        .finally(() => { switchInFlight.current = false; });
      return () => { cancelled = true; };
    }, [brandSlug]);

    // Theme persistence + meta theme-color sync
    useEffect(() => {
      try {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('stv-theme', theme);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#F4F0E8' : '#0A0B0F');
      } catch (e) { /* no-op */ }
    }, [theme]);

    // Body data-beat attribute drives per-beat orb-position overrides (audit C1)
    useEffect(() => {
      try { document.body.dataset.beat = activeBeat; } catch (e) { /* no-op */ }
    }, [activeBeat]);

    // Mouse parallax for atmosphere orbs (audit C2). ±10px max.
    useEffect(() => {
      const onMove = (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;  // ±10px
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        document.documentElement.style.setProperty('--paraX', `${x.toFixed(1)}px`);
        document.documentElement.style.setProperty('--paraY', `${y.toFixed(1)}px`);
      };
      window.addEventListener('pointermove', onMove, { passive: true });
      return () => window.removeEventListener('pointermove', onMove);
    }, []);

    // Keyboard navigation
    useEffect(() => {
      const onKey = (e) => {
        if (!booted) return;
        // 1-6 → brand switch (works in any beat after Hook)
        if (activeBeat !== BEATS.HOOK && /^[1-6]$/.test(e.key)) {
          const idx = parseInt(e.key, 10) - 1;
          const slug = KNOWN_SLUGS[idx];
          if (slug && slug !== brandSlug) handleBrandSwitch(slug);
          return;
        }
        // ArrowRight / Enter / Space — advance through beats
        if (e.key === 'ArrowRight' || e.key === 'Enter' || e.key === ' ') {
          const i = BEAT_ORDER.indexOf(activeBeat);
          if (i >= 0 && i < BEAT_ORDER.length - 1) {
            e.preventDefault();
            setActiveBeat(BEAT_ORDER[i + 1]);
          }
        }
        // ArrowLeft — back
        if (e.key === 'ArrowLeft') {
          const i = BEAT_ORDER.indexOf(activeBeat);
          if (i > 0) {
            e.preventDefault();
            setActiveBeat(BEAT_ORDER[i - 1]);
          }
        }
        // Escape — return to Hook
        if (e.key === 'Escape') {
          if (activeBeat !== BEATS.HOOK) setActiveBeat(BEATS.HOOK);
        }
      };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [booted, activeBeat, brandSlug]);

    const handleBrandSwitch = useCallback((slug) => {
      if (slug === brandSlug) return;
      setBrandSlug(slug);
      setBrandFlashKey((k) => k + 1);
    }, [brandSlug]);

    const handleToggleTheme = useCallback(() => {
      setTheme((t) => t === 'light' ? 'dark' : 'light');
    }, []);

    const handleAudioToggle = useCallback(() => {
      setAudioOn((on) => {
        const next = !on;
        audioState.enabled = next;
        if (next) {
          // Init context on first toggle so user-gesture requirement is satisfied
          audioState.init();
          audioState.play('click');
        }
        return next;
      });
    }, []);

    const goNext = useCallback(() => {
      const i = BEAT_ORDER.indexOf(activeBeat);
      if (i < BEAT_ORDER.length - 1) setActiveBeat(BEAT_ORDER[i + 1]);
    }, [activeBeat]);

    const goBack = useCallback(() => {
      const i = BEAT_ORDER.indexOf(activeBeat);
      if (i > 0) setActiveBeat(BEAT_ORDER[i - 1]);
    }, [activeBeat]);

    if (!booted) {
      return <BootSequence onComplete={() => setBooted(true)} />;
    }

    if (activeBeat === BEATS.HOOK) {
      return <HookScene onContinue={goNext} />;
    }

    // Post-Hook: app frame with persistent top bar
    let scene = null;
    if (activeBeat === BEATS.BRAND) {
      scene = (
        <BrandScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onBrandSwitch={handleBrandSwitch}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.SCALE) {
      scene = (
        <ScaleScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.SAFETY) {
      scene = (
        <SafetyScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.PIPELINE) {
      scene = (
        <PipelineScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.OUTPUT) {
      scene = (
        <OutputScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.CLOSE) {
      scene = (
        <CloseScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onRestart={() => setActiveBeat(BEATS.HOOK)}
        />
      );
    } else {
      const beatLabels = {
      };
      const meta = beatLabels[activeBeat] || { id: '?', name: 'Unknown' };
      const i = BEAT_ORDER.indexOf(activeBeat);
      scene = (
        <PlaceholderScene
          beatId={meta.id}
          beatName={meta.name}
          onContinue={i < BEAT_ORDER.length - 1 ? goNext : null}
          onBack={i > 0 ? goBack : null}
        />
      );
    }

    return (
      <div className="stv-app-frame">
        <TopBar
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onBrandSwitch={handleBrandSwitch}
          theme={theme}
          onToggleTheme={handleToggleTheme}
          activeBeat={activeBeat}
          onAudioToggle={handleAudioToggle}
          audioOn={audioOn}
        />
        <main className="stv-app-content">{scene}</main>
        <BeatPager
          activeBeat={activeBeat}
          onJump={(b) => setActiveBeat(b)}
        />
      </div>
    );
  }

              aria-label={`Beat ${i + 1} · ${BEAT_LABELS[b].name}`}
              aria-current={b === activeBeat ? 'step' : undefined}
              title={BEAT_LABELS[b].name}
            />
          ))}
        </div>
        <div className="stv-pager-keys" aria-hidden="true">← →</div>
      </nav>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
