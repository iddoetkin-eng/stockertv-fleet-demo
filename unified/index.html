      text-transform: uppercase;
      margin-top: 3px;
    }
    .exchange-panel-close {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
    }
    .exchange-panel-close:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    /* Round 4 P7 — touch-friendly close button on coarse pointers */
    @media (hover: none) and (pointer: coarse) {
      .exchange-panel-close { width: 44px; height: 44px; font-size: 22px; }
    }
    .exchange-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
    }
    .exchange-panel-meta {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .exchange-panel-meta-pill {
      padding: 3px 9px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .exchange-panel-meta-pill.is-company {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .exchange-panel-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-primary);
      margin: 0 0 1rem;
    }
    .exchange-panel-native {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text-primary);
      padding: 1rem 1.1rem;
      background: var(--surface-elevated);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      margin-bottom: 1rem;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .exchange-panel-native[data-lang='AR'],
    .exchange-panel-native[data-lang='HE'] {
      direction: rtl;
      text-align: right;
    }
    .exchange-panel-native[data-lang='JA'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .exchange-panel-native[data-lang='ZH'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .exchange-panel-native[data-lang='KO'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .exchange-panel-native[data-lang='HI'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .exchange-panel-native[data-lang='TH'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .exchange-panel-native[data-lang='AR'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; font-size: 15px; }
    .exchange-panel-native[data-lang='HE'] { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; font-size: 15px; }
    .exchange-panel-native[data-lang='IT'],
    .exchange-panel-native[data-lang='ES'],
    .exchange-panel-native[data-lang='PT'] { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; font-size: 15px; }
    .exchange-panel-native[data-lang='FR'] { font-family: 'Marcellus', 'Fraunces', Georgia, serif; font-size: 15px; }
    .exchange-panel-native[data-lang='DE'] { font-family: 'Bitter', 'Fraunces', Georgia, serif; }
    .exchange-panel-trans-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .exchange-panel-english {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
      font-style: italic;
      margin: 0 0 1.5rem;
    }
    .exchange-panel-foot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .exchange-panel-foot-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.6;
    }

    .scale-arc-headline.is-native-jp { font-family: 'Noto Serif JP', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-de { font-family: 'Bitter', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-it { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-fr { font-family: 'Marcellus', 'Fraunces', Georgia, serif; }
    .scale-arc-headline.is-native-pt,
    .scale-arc-headline.is-native-es { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; }
    .scale-arc-trans {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-style: italic;
    }
    .scale-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 60ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      text-align: center;
      margin: 0.5rem 0 1.5rem;
    }
    .scale-subline strong { color: var(--text-primary); font-weight: 500; }

    /* ============ BEAT 4 — THE SAFETY NET ============ */
    .safety-scene {
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2rem 1.5rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 880px) {
      .safety-scene {
        grid-template-columns: 1.1fr 1fr;
        gap: 2rem;
        padding: 3rem 2rem 5rem;
      }
    }
    .safety-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 0.5rem;
      position: relative;
    }
    /* R5 A4 — background ghost "24" anchors Beat 4 editorially */
    .safety-ghost-num {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -42%);
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-size: clamp(14rem, 28vw, 24rem);
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--text-primary);
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
      font-variation-settings: 'opsz' 144;
      font-feature-settings: 'onum';
      user-select: none;
    }
    :root[data-theme='dark'] .safety-ghost-num { opacity: 0.06; }
    @media (max-width: 720px) {
      .safety-ghost-num { font-size: clamp(8rem, 30vw, 16rem); opacity: 0.05; }
    }
    .safety-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.24em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .safety-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .safety-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0 auto;
    }
    .safety-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Card chrome reused across safety-scene panels — gradient edge per audit 2.2.c */
    .safety-card {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, transparent) 0%, var(--border) 55%, color-mix(in srgb, var(--accent) 8%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 1.25rem 1.25rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .safety-card-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.875rem;
    }
    .safety-card-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.4rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* AI thought stream */
    .thought-stream {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 220px;
      overflow: hidden;
    }
    .thought-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.4rem 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      line-height: 1.45;
      color: var(--text-muted);
      background: var(--surface-elevated);
      border-radius: 4px;
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .thought-row[data-state='passed'] { color: var(--text-primary); border-left: 2px solid var(--green); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='checked'] { color: var(--text-primary); border-left: 2px solid var(--accent); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='blocked'] { color: var(--text-primary); border-left: 2px solid var(--red); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='info'] { border-left: 2px solid var(--border); padding-left: calc(0.5rem - 2px); }
    .thought-row-time {
      color: var(--text-muted);
      flex-shrink: 0;
      width: 50px;
      font-weight: 500;
    }
    .thought-row-code {
      color: var(--accent);
      flex-shrink: 0;
      font-weight: 600;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .thought-row[data-state='passed'] .thought-row-code { color: var(--green); }
    .thought-row[data-state='blocked'] .thought-row-code { color: var(--red); }
    .thought-row-msg { flex: 1; min-width: 0; }
    @keyframes stv-thought-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Decision tree (8 nodes vertically) */
    .tree {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .tree-node {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      background: var(--surface-elevated);
      border-radius: 4px;
      color: var(--text-muted);
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1) both;
    }
    .tree-node[data-active='true'] {
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: calc(0.55rem - 1px) calc(0.6rem - 1px);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .tree-node-num {
      width: 18px; height: 18px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 9.5px;
      font-weight: 600;
    }
    .tree-node[data-active='true'] .tree-node-num {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      mix-blend-mode: difference;
    }
    .tree-node-label { flex: 1; }
    .tree-node-conf {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .tree-node[data-active='true'] .tree-node-conf { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }

    /* Integrity gates */
    .gates {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .gate {
      padding: 0.875rem 0.75rem;
      background: var(--surface-elevated);
      border-radius: 6px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .gate-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .gate-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .gate-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      transition: color 220ms ease;
    }
    .gate[data-status='pass'] .gate-status { color: var(--green); }
    .gate[data-status='check'] .gate-status { color: var(--accent); }
    .gate[data-status='checking'] .gate-status { color: var(--accent); opacity: 0.7; animation: stv-pulse 1100ms ease-in-out infinite; }
    .gate-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }
    .gate-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      width: 100%;
      background: var(--border);
    }
    .gate-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 1100ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .gate[data-status='pass'] .gate-bar::after { width: 100%; }
    .gate[data-status='check'] .gate-bar::after { width: 100%; background: var(--accent); }
    .gate[data-status='checking'] .gate-bar::after { width: 60%; background: var(--accent); }

    /* 4.2 — Quality + Integrity dual reveal as FULL-WIDTH HERO with bars + deltas */
    .dual-reveal-hero {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 1.5rem;
      align-items: center;
      padding: 2rem 1.5rem;
      margin: 1rem 0 0.5rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent) 0%, var(--border) 50%, color-mix(in srgb, var(--green) 22%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 16px 50px color-mix(in srgb, var(--accent) 12%, transparent);
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 880px) {
      .dual-reveal-hero { grid-template-columns: 1fr; gap: 1rem; }
      .dual-reveal-divider-h { display: none; }
    }
    .dual-reveal-divider-h { background: var(--border); height: 70%; align-self: center; }
    .dual-reveal-col { text-align: center; padding: 0.5rem; }
    .dual-reveal-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .dual-reveal-number {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(4rem, 8vw, 7rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.025em;
      font-feature-settings: 'liga', 'dlig', 'onum', 'tnum';
      font-variation-settings: 'opsz' 144;
      position: relative;
      display: inline-block;
    }
    .dual-reveal-number[data-metric='quality'] { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .dual-reveal-number[data-metric='integrity'] { color: var(--green); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    /* Brand-glow under each number */
    .dual-reveal-number::before {
      content: '';
      position: absolute;
      inset: 14% -10%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, currentColor 35%, transparent) 0%, transparent 70%);
      filter: blur(40px);
      z-index: -1;
      pointer-events: none;
    }
    .dual-reveal-track {
      position: relative;
      width: 80%;
      max-width: 220px;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin: 1rem auto 0.5rem;
      overflow: visible;
    }
    .dual-reveal-track-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: linear-gradient(90deg, transparent, currentColor);
      border-radius: 999px;
      transition: width 1400ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .dual-reveal-threshold {
      position: absolute;
      top: -4px;
      width: 2px;
      height: 11px;
      background: var(--text-muted);
      opacity: 0.65;
      border-radius: 1px;
    }
    .dual-reveal-threshold-label {
      position: absolute;
      top: 14px;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.65;
      white-space: nowrap;
    }
    .dual-reveal-delta {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: currentColor;
      margin-top: 1.6rem;
      opacity: 0.92;
    }
    .dual-reveal-delta strong {
      font-style: normal;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    /* 3.1 — Ambient post-phase shimmer on numerals */
    .dual-reveal-number.is-shimmer::after {
      content: '';
      position: absolute;
      inset: -4px -8px;
      background: linear-gradient(110deg, transparent 30%, color-mix(in srgb, currentColor 30%, transparent) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: stv-mark-shimmer 6000ms linear infinite;
      pointer-events: none;
      mix-blend-mode: screen;
      border-radius: 6px;
    }

    /* 4.4 — Hash chain as visual chain (linked blocks, horizontal) */
    .hash-chain-vis {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      padding: 0.5rem 0;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .hash-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 38px;
      padding: 0 0.4rem;
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      border-radius: 4px;
      flex-shrink: 0;
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
      position: relative;
    }
    .hash-block[data-state='signed'] {
      border-color: color-mix(in srgb, var(--green) 50%, transparent);
      background: color-mix(in srgb, var(--green) 8%, var(--surface-elevated));
    }
    .hash-block-hash {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .hash-block-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      color: var(--text-muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .hash-block-link {
      width: 18px;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
      position: relative;
    }
    .hash-block-link::after {
      content: '›';
      position: absolute;
      right: -2px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
    }
    .hash-block[data-state='signed'] + .hash-block-link {
      background: var(--green);
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 4.3 — Latency strips on integrity gates */
    .gate-latency {
      margin-top: 0.4rem;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .gate-latency-fill {
      height: 100%;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 60%, transparent), var(--accent));
      transition: width 800ms cubic-bezier(0.25, 0.1, 0.25, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gate-latency-tick {
      position: absolute;
      top: -2px;
      width: 1px;
      height: 8px;
      background: var(--text-muted);
      opacity: 0.4;
    }

    /* 1.6 — Decision tree confidence bars */
    .tree-node-confbar {
      width: 50px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tree-node-confbar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 400ms cubic-bezier(0.25, 0.1, 0.25, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tree-node[data-active='false'] .tree-node-confbar-fill { background: var(--text-muted); opacity: 0.5; }

    /* 4.5 — Trust badge micro-vizualizations */
    .trust-badge-viz {
      margin-top: 0.5rem;
      min-height: 22px;
      display: flex;
      align-items: center;
    }
    /* Audit: chain icon + counter */
    .trust-viz--audit {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }
    .trust-viz--audit svg { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    /* Tests: dot grid */
    .trust-viz--tests {
      display: grid;
      grid-template-columns: repeat(48, 1fr);
      gap: 1px;
      width: 100%;
      max-width: 220px;
    }
    .trust-viz--tests span {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      background: var(--green);
      opacity: 0.85;
      border-radius: 0.5px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Privacy: pulsing zero */
    .trust-viz--privacy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      animation: stv-pulse-zero 2000ms ease-in-out infinite;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-pulse-zero {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 25%, transparent); }
      50%      { box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 0%, transparent); }
    }
    /* Monitor: tiny EKG line */
    .trust-viz--monitor svg { width: 100px; height: 18px; color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .trust-viz--monitor svg path { stroke-dasharray: 200; stroke-dashoffset: 200; animation: stv-ekg 2400ms cubic-bezier(0.42, 0, 0.58, 1) infinite; }
    @keyframes stv-ekg {
      0%   { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }

    /* B2 — Architectural arches (decorative behind gate cards) */
    .gate-arch-bg {
      position: absolute;
      inset: -8px -4px;
      pointer-events: none;
      opacity: 0.08;
      color: var(--text-primary);
      z-index: 0;
    }
    .gate-arch-bg svg { width: 100%; height: 100%; display: block; }
    .gate { position: relative; z-index: 1; }
    .gate > * { position: relative; z-index: 1; }

    /* E4 — Token-by-token script generation inset */
    .gen-inset {
      margin-top: 0.875rem;
      padding: 0.875rem;
      border: 1px solid var(--border);
      background:
        linear-gradient(var(--surface-elevated), var(--surface-elevated)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 35%, transparent), var(--border)) border-box;
      border: 1px solid transparent;
      border-radius: 6px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gen-inset-head {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .gen-inset-head-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: stv-pulse 1100ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gen-inset-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-primary);
      min-height: 4.5em;
      letter-spacing: -0.005em;
    }
    .gen-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: stv-cursor-blink 900ms steps(1) infinite;
      margin-left: 1px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-cursor-blink {
      0%, 50%   { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* ============================================================================
       R10 BEAT 6 — INTERACTIVE iPHONE SIMULATION
       ============================================================================ */
    .output-scene--r10 {
      max-width: 1240px;
    }
    /* R11.1 Fix 1 — Beat 6 layout: SYMMETRIC 3-column grid so iPhone sits at
       page geometric center across all 7 brand variants. Annotations right-aligned
       in column 1, iPhone column 2, empty visual spacer column 3.
       Previous Round 10.1 layout (320px + 1fr) placed iPhone ~176px right of
       page center — masked by light eToro content but exposed by Citi's dark
       navy iPhone screen. Symmetric layout is the cleaner root-cause fix.
       Mobile (≤980px): single col with flex-order putting iPhone before annotations. */
    .iphone-sim-wrap {
      grid-column: 1 / -1;
      display: grid;
      /* R11.2 Fix 2 — guarantee annotations have ≥300px to fit titles on one line */
      grid-template-columns: minmax(300px, 340px) minmax(380px, auto) minmax(300px, 340px);
      gap: 2rem;
      align-items: center;
      justify-items: center;
      padding: 1rem 0 2rem;
      position: relative;
      max-width: 1140px;
      margin: 0 auto;
    }
    @media (max-width: 980px) {
      .iphone-sim-wrap {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }

    /* Annotations: LEFT column (desktop) / below iPhone (mobile via flex-order).
       R11.1 — right-aligned within column 1 to sit visually adjacent to iPhone. */
    .iphone-annotations {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 340px;
      align-self: center;
      justify-self: end;
      grid-column: 1;
    }
    @media (max-width: 980px) {
      .iphone-annotations { order: 2; max-width: 100%; justify-self: center; }
    }

    /* Center column: country selector ABOVE iPhone, foot-note BELOW.
       R11.1 — moved from grid-column 2 (was right-1fr) to grid-column 2 (now center)
       in the symmetric 3-col grid. Width is iPhone-sized (~380px). */
    .iphone-sim-right {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
      width: 100%;
    }
    @media (max-width: 980px) {
      .iphone-sim-right { grid-column: 1; order: 1; }
    }

    .iphone-country-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      max-width: 100%;
    }
    /* R11.2 Fix 2 — annotation card restructured: number badge stacks ABOVE
       title (was inline-left grid), padding more comfortable, fonts larger. */
    .iphone-annotation {
      display: block;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      transition: border-color 220ms ease, transform 220ms ease, box-shadow 220ms ease;
    }
    .iphone-annotation:hover {
      transform: translateX(2px);
      box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .iphone-annotation-num {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .iphone-annotation-body { min-width: 0; }
    .iphone-annotation-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.25;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }
    .iphone-annotation-text {
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    /* iPhone simulation — outer container.
       R10.1 Fix 1: now nested inside .iphone-sim-right (flex column), no longer
       directly placed in the .iphone-sim-wrap grid. width: 380px explicit. */
    .iphone-sim {
      position: relative;
      width: 380px;
      max-width: 100%;
      aspect-ratio: 9 / 19.5;
      background: #0E1218;
      border-radius: 38px;
      box-shadow:
        0 0 0 4px #1a1f28,
        0 0 0 5px #2a2f38,
        0 24px 60px rgba(0,0,0,0.4),
        0 8px 24px color-mix(in srgb, var(--accent) 14%, transparent);
      overflow: hidden;
      isolation: isolate;
    }
    @media (max-width: 980px) {
      .iphone-sim { width: 340px; }
    }
    @media (max-width: 520px) {
      .iphone-sim { max-width: 300px; }
    }
    .iphone-sim-frame {
      position: absolute;
      inset: 8px;
      border-radius: 30px;
      pointer-events: none;
      z-index: 0;
    }
    /* Dynamic island */
    .iphone-sim-notch {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 90px; height: 26px;
      background: #000;
      border-radius: 13px;
      z-index: 10;
      pointer-events: none;
    }
    /* Side buttons (decorative) */
    .iphone-sim-button {
      position: absolute;
      background: #2a2f38;
      border-radius: 1px;
      pointer-events: none;
      z-index: 0;
    }
    .iphone-sim-button--left { left: -2px; top: 110px; width: 3px; height: 28px; }
    .iphone-sim-button--left2 { left: -2px; top: 150px; width: 3px; height: 50px; }
    .iphone-sim-button--right { right: -2px; top: 130px; width: 3px; height: 70px; }

    /* Inner screen */
    .iphone-sim-screen {
      position: absolute;
      inset: 8px;
      background: #0E1218;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }
    .iphone-sim-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      color: #fff;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .iphone-sim-content::-webkit-scrollbar { width: 4px; }
    .iphone-sim-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    /* Status bar (top of every screen) */
    .ip-statusbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 22px 4px;
      font-family: 'SF Pro Text', -apple-system, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      height: 28px;
    }
    .ip-statusbar-time { font-variant-numeric: tabular-nums; }
    .ip-statusbar-right {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .ip-statusbar-signal { font-size: 11px; opacity: 0.95; }
    .ip-statusbar-battery {
      position: relative;
      display: inline-flex;
      align-items: center;
      color: #fff;
    }
    .ip-statusbar-battery-pct {
      position: absolute;
      left: 4px; top: 50%;
      transform: translateY(-50%);
      font-size: 8px;
      font-weight: 700;
      color: #0E1218;
    }

    /* Generic screen container */
    .ip-screen {
      padding: 0;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Top bar — back / search / icons row */
    .ip-screen-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
    }
    .ip-screen-topbar--full { gap: 10px; }
    .ip-screen-topbar--center { justify-content: center; }
    .ip-topbar-icon {
      width: 32px; height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .ip-topbar-icon svg { width: 20px; height: 20px; }
    .ip-topbar-title {
      flex: 1;
      text-align: center;
    }
    .ip-topbar-title-ticker {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .ip-topbar-title-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #8B95A1;
    }
    .ip-search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: #8B95A1;
    }
    .ip-search-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .ip-search-placeholder {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #8B95A1;
      flex: 1;
    }

    /* Stock detail screen */
    .ip-stock-video {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      cursor: pointer;
      flex-shrink: 0;
    }
    .ip-stock-video-el {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .ip-stock-video-banner {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 0;
      text-align: left;
      transition: background 200ms ease;
    }
    .ip-stock-video-banner:hover { background: rgba(0, 0, 0, 0.9); }
    .ip-banner-icon { font-size: 14px; flex-shrink: 0; }
    .ip-banner-ticker { font-weight: 700; }
    .ip-banner-price { font-weight: 600; font-variant-numeric: tabular-nums; }
    .ip-banner-chg { font-weight: 600; font-size: 11px; }
    .ip-banner-chg.is-up { color: #34D982; }
    .ip-banner-chg.is-down { color: #FF6B6B; }
    .ip-banner-arrow {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #34D982;
      letter-spacing: 0.03em;
    }

    /* Native mode (chart + Buy/Sell) */
    .ip-stock-native {
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ip-stock-native-back {
      align-self: flex-start;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #8B95A1;
      padding: 5px 12px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease;
    }
    .ip-stock-native-back:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .ip-stock-native-chart {
      width: 100%;
      height: 120px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px;
      color: #34D982;
    }
    .ip-stock-native-chart svg { width: 100%; height: 100%; }
    .ip-stock-native-chart svg path { stroke: #34D982 !important; stroke-width: 1.6 !important; }
    .ip-stock-native-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .ip-stock-buy, .ip-stock-sell {
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
    }
    .ip-stock-buy { background: #34D982; color: #0E1218; }
    .ip-stock-sell { background: #FF4D6D; }
    .ip-stock-native-position {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #8B95A1;
      text-align: center;
    }

    /* Stock info section (below video / native) */
    .ip-stock-info {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ip-stock-price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .ip-stock-price-large {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .ip-stock-chg-pill {
      padding: 3px 8px;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
    }
    .ip-stock-chg-pill.is-up { background: rgba(52, 217, 130, 0.16); color: #34D982; }
    .ip-stock-chg-pill.is-down { background: rgba(255, 107, 107, 0.16); color: #FF6B6B; }
    .ip-stock-mini-chart {
      width: 100%; height: 32px;
      color: #FF6B6B;
    }
    .ip-stock-mini-chart svg path { stroke-width: 1.4 !important; }
    .ip-stock-tabs {
      display: flex;
      gap: 18px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .ip-stock-tab {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #8B95A1;
      padding-bottom: 6px;
    }
    .ip-stock-tab.is-active {
      color: #fff;
      border-bottom: 2px solid #34D982;
      font-weight: 600;
    }
    .ip-stock-desc {
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      line-height: 1.5;
      color: #C9D1DA;
      margin: 0;
    }

    /* Watchlist screen */
    .ip-screen-h1 {
      padding: 4px 18px 8px;
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .ip-screen-h1-chev { color: #8B95A1; font-size: 14px; margin-left: 4px; }
    .ip-screen-h2 {
      padding: 16px 18px 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .ip-filter-pills {
      display: flex;
      gap: 8px;
      padding: 6px 14px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .ip-filter-pills::-webkit-scrollbar { display: none; }
    .ip-filter-pill {
      flex-shrink: 0;
      padding: 5px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #C9D1DA;
      white-space: nowrap;
    }
    .ip-filter-pill.is-active {
      background: rgba(52, 217, 130, 0.18);
      color: #34D982;
      font-weight: 600;
    }
    .ip-section-head {
      display: flex;
      justify-content: space-between;
      padding: 6px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #8B95A1;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ip-stock-rows {
      display: flex;
      flex-direction: column;
    }
    .ip-stock-row {
      display: grid;
      grid-template-columns: 1fr 60px auto;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      text-align: left;
      transition: background 150ms ease;
    }
    .ip-stock-row:hover { background: rgba(255,255,255,0.04); }
    .ip-stock-row-left { min-width: 0; }
    .ip-stock-row-ticker {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .ip-stock-row-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #8B95A1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ip-stock-row-spark {
      width: 50px; height: 20px;
    }
    .ip-stock-row-spark svg { width: 100%; height: 100%; }
    .ip-stock-row-right {
      text-align: right;
      min-width: 78px;
    }
    .ip-stock-row-price {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .ip-stock-row-chg {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .ip-stock-row-chg.is-up { color: #34D982; }
    .ip-stock-row-chg.is-down { color: #FF6B6B; }
    .ip-chg-large { font-size: 18px; }

    /* Discover screen */
    .ip-disc-tabs {
      display: flex;
      gap: 14px;
      padding: 4px 18px 10px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ip-disc-tabs::-webkit-scrollbar { display: none; }
    .ip-disc-tab {
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      color: #8B95A1;
      padding-bottom: 8px;
      white-space: nowrap;
    }
    .ip-disc-tab.is-active {
      color: #fff;
      border-bottom: 2px solid #34D982;
      font-weight: 600;
      margin-bottom: -1px;
    }
    .ip-feature-card {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      width: calc(100% - 28px);
      margin: 0 14px;
      padding: 14px;
      background: linear-gradient(135deg, #1a3322 0%, #0f2417 100%);
      border: 1px solid rgba(52, 217, 130, 0.4);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .ip-feature-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(52, 217, 130, 0.22);
    }
    .ip-feature-card-mark {
      width: 56px; height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(52, 217, 130, 0.18);
      border: 1px solid rgba(52, 217, 130, 0.4);
      border-radius: 12px;
    }
    .ip-feature-card-mark-stv {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .ip-feature-card-mark-stv em {
      color: #34D982;
      font-style: italic;
    }
    .ip-feature-card-body { min-width: 0; }
    .ip-feature-card-title {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .ip-feature-card-sub {
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      color: #8B95A1;
    }
    .ip-feature-card-arrow {
      color: #34D982;
      font-size: 18px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Home screen */
    .ip-verify-card {
      margin: 8px 14px 12px;
      padding: 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
    }
    .ip-verify-progress {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 10px;
    }
    .ip-verify-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: #8B95A1;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ip-verify-dot--done { background: #34D982; color: #0E1218; }
    .ip-verify-dot--active { background: #fff; color: #0E1218; }
    .ip-verify-line {
      flex: 1;
      height: 1.5px;
      background: rgba(255,255,255,0.08);
    }
    .ip-verify-title {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .ip-verify-text {
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      color: #8B95A1;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .ip-cta-green {
      width: 100%;
      padding: 11px 16px;
      background: #34D982;
      color: #0E1218;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 200ms ease, transform 200ms ease;
    }
    .ip-cta-green:hover { background: #29c374; transform: translateY(-1px); }

    .ip-stv-broadcast-card {
      margin: 0 14px 14px;
      padding: 16px;
      width: calc(100% - 28px);
      min-height: 130px;
      background: linear-gradient(135deg, #1a3322 0%, #0a1d11 100%);
      border: 1px solid rgba(52, 217, 130, 0.3);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .ip-stv-broadcast-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(52, 217, 130, 0.25);
    }
    .ip-stv-broadcast-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
    }
    .ip-stv-broadcast-mark em {
      color: #34D982;
      font-style: italic;
    }
    .ip-stv-broadcast-headline {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #C9D1DA;
      line-height: 1.35;
      max-width: 65%;
    }
    .ip-stv-broadcast-tag {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      color: #34D982;
      margin-bottom: 4px;
    }
    .ip-stv-broadcast-play {
      position: absolute;
      right: 14px;
      bottom: 14px;
    }
    .ip-bigmovers {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      gap: 14px;
      padding: 12px 30px 16px;
      height: 100px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .ip-bigmover-bar {
      flex: 1;
      max-width: 36px;
      background: linear-gradient(180deg, #34D982 0%, #1a8c52 100%);
      border-radius: 4px 4px 0 0;
      position: relative;
    }
    .ip-bigmover-pct {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #34D982;
      white-space: nowrap;
    }

    /* Portfolio screen */
    .ip-portfolio-value {
      padding: 14px 18px 6px;
    }
    .ip-portfolio-value-num {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .ip-portfolio-value-label {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #8B95A1;
    }
    .ip-empty-state {
      padding: 24px 18px;
      text-align: center;
      color: #8B95A1;
    }

    /* ====================================================================== */

    /* ====================================================================== */
    .iphone-sim--citi .ip-bottomnav { background: #07111E; border-top: 1px solid rgba(255,255,255,0.08); }
    .iphone-sim--citi .ip-bottomnav-tab[data-active='true'] { color: #5AA0E6; }
    .iphone-sim--citi .ip-stock-tab.is-active { color: #5AA0E6; border-bottom-color: #5AA0E6; }

    .ip-screen--citi {

      color: #E6EEF6;
      font-family: 'DM Sans', 'Inter', Helvetica, Arial, sans-serif;
    }
    .ip-screen-topbar--citi {
      background: #0A1A2E;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: #E6EEF6;

    .ip-citi-screen-title {
      font-family: 'DM Sans', 'Inter', sans-serif;

      padding-top: 0.4em;

      pointer-events: none;

    /* Citi greeting line */
    .ip-citi-greeting {

      font-family: 'DM Sans', 'Inter', sans-serif;
      font-size: 19px;
      font-weight: 500;
      color: #E6EEF6;
      letter-spacing: -0.01em;

    .ip-citi-account-card {

      font-size: 11px;
      font-weight: 500;

    .ip-citi-account-balance {
      margin-top: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;

      margin-top: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;

    /* Citi quick action row */
    .ip-citi-quick-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 0 16px 14px;
    }
    .ip-citi-quick {

      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #E6EEF6;

      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;

    .ip-citi-quick > span:first-child { font-size: 16px; line-height: 1; color: #5AA0E6; }

    .ip-section-head--citi {
      color: #9FB3CC;

      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 16px;
    }
    .ip-citi-link { color: #5AA0E6; cursor: pointer; }

    /* Transaction list */
    .ip-citi-tx-list { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 10px; }
    .ip-citi-tx {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;

    .ip-citi-tx-meta { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #9FB3CC; margin-top: 2px; }
    .ip-citi-tx-amt { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: #E6EEF6; }
    .ip-citi-tx-amt.is-up-citi { color: #00C775; }

    /* Citi action rows (Pay & Transfer + Cards screens) */
    .ip-citi-section-h2 {
      padding: 14px 16px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #9FB3CC;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .ip-citi-action-row { display: flex; flex-direction: column; gap: 8px; padding: 0 16px 12px; }
    .ip-citi-action {
      display: grid;
      grid-template-columns: 32px 1fr 16px;
      gap: 12px;
      align-items: center;
      padding: 14px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #E6EEF6;
      cursor: pointer;
      text-align: left;

    .ip-citi-action-icon { font-size: 18px; line-height: 1; }
    .ip-citi-action-name { font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500; }
    .ip-citi-action-arrow { color: #5AA0E6; font-size: 18px; line-height: 1; }

    /* Recipient row */
    .ip-citi-recipient-row {
      display: grid;

    .ip-citi-recipient-avatar {

      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;

      border: 1px dashed rgba(255,255,255,0.18);

    .ip-citi-recipient-name { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #9FB3CC; text-align: center; }

    /* Disclosure footer */

      padding: 14px 16px 18px;

    /* Invest screen */

    .ip-citi-invest-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #9FB3CC;

    .ip-citi-invest-value {
      margin-top: 4px;

    .ip-citi-tabs {
      display: flex;
      gap: 14px;
      padding: 12px 16px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;

    .ip-citi-tab {
      font-family: 'DM Sans', sans-serif;

      font-weight: 500;

      padding-bottom: 8px;
      border-bottom: 2px solid transparent;

    .ip-stock-row--citi { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .ip-stock-row--citi .ip-stock-row-ticker { color: #FFFFFF; }

    .ip-stock-row-chg.is-down-citi { color: #D9261C; }

    .ip-search--citi { background: rgba(255,255,255,0.06); color: #E6EEF6; }

    /* Cards screen */
    .ip-citi-card-stack { padding: 14px 16px 4px; }
    .ip-citi-card {
      background: linear-gradient(135deg, #003B70 0%, #001F3D 100%);
      border-radius: 14px;
      padding: 18px 18px 16px;
      color: #FFFFFF;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);

      justify-content: space-between;

      justify-content: space-between;
      font-family: 'DM Sans', sans-serif;
      font-size: 10.5px;

      text-transform: uppercase;

      padding: 14px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;

    .ip-citi-card-meta-item {
      display: flex;

      align-items: baseline;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);

    /* Citi CTA button (replaces ip-cta-green for Citi screens) */
    .ip-citi-cta {
      display: block;
      margin: 16px 16px 4px;
      width: calc(100% - 32px);
      background: #003B70;
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 200ms ease, transform 120ms ease;

    .ip-citi-cta:active { transform: translateY(1px); }

    /* Citi menu profile */
    .ip-menu-profile--citi { background: linear-gradient(180deg, #07111E 0%, #0A1A2E 100%); }
    .ip-menu-avatar--citi { background: #003B70; color: #FFFFFF; }

    .ip-menu-profile-link--citi { color: #5AA0E6; }

      border-bottom: 1px solid rgba(255,255,255,0.05);

    .ip-stv-broadcast-card--citi .ip-stv-broadcast-tag { color: #D9261C; }

    .ip-screen--stock-detail.ip-screen--citi .ip-stock-price-large { color: #FFFFFF; }
    .ip-screen--stock-detail.ip-screen--citi .ip-stock-tab { color: #9FB3CC; }
    .ip-screen--stock-detail.ip-screen--citi .ip-stock-desc { color: #B5C5D5; }

    .ip-screen--stock-detail.ip-screen--citi .ip-stock-video-banner { background: linear-gradient(180deg, rgba(0,59,112,0.92) 0%, rgba(0,40,84,0.96) 100%); }
    .ip-screen--stock-detail.ip-screen--citi .ip-banner-chg.is-up { color: #00C775; }
    .ip-screen--stock-detail.ip-screen--citi .ip-banner-chg.is-down { color: #D9261C; }

    .ip-bottomnav-label {

    /* Foot note below iPhone */

      grid-column: 1 / -1;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
