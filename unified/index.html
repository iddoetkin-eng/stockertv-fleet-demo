<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#FAF7F2" id="theme-color-meta">
  <title>StockerTV — Unified Demo</title>

  <!-- Pre-paint theme. Light default per Beat 3 lock. Stateless try/catch. -->
  <script>
    (function(){try{var t=localStorage.getItem('stv-theme')||'light';document.documentElement.dataset.theme=t;var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content',t==='light'?'#FAF7F2':'#0A0B0F');}catch(e){document.documentElement.dataset.theme='light';}})();
  </script>

  <!-- Editorial typography per Beat 3.A -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Locked CDN versions per Beat 5.A. No @latest. -->
  <script src="https://cdn.tailwindcss.com?v=3.4.1"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    /* ============ NEUTRAL SUBSTRATE — set ONCE on first paint ============ */
    :root[data-theme='dark'] {
      --bg: #0A0B0F;
      --text-primary: #FAF7F2;
      --text-muted: #888c98;
      --border: rgba(255,255,255,0.08);
      --surface: #13151c;
      --surface-elevated: #1a1d27;
    }
    :root[data-theme='light'] {
      --bg: #FAF7F2;
      --text-primary: #0A0B0F;
      --text-muted: #666c78;
      --border: rgba(0,0,0,0.08);
      --surface: #FFFFFF;
      --surface-elevated: #F4EFE7;
    }
    :root {
      --red: #ef4444;
      --green: #22c55e; /* neutral fallback; brand-switch may override per B.4.D 3-way rule */
      /* Brand-specific vars — eToro defaults. Overwritten by brand-switch handler. */
      --accent: #6AAE22;
      --accent-deep: #8FC850;
      --accent-2: #A8D96E;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .display { font-family: 'Fraunces', Georgia, serif; font-feature-settings: 'liga', 'dlig'; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }

    /* Reduced-motion respect per Beat 3.C */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============ TEXTURE OVERLAYS — Beat 3.D ============ */
    .stv-grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 9998;
      mix-blend-mode: multiply;
    }
    :root[data-theme='dark'] .stv-grain { mix-blend-mode: screen; opacity: 0.04; }

    .stv-paper-fiber {
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent 0 2px, rgba(0,0,0,0.012) 2px 3px),
        repeating-linear-gradient(-45deg, transparent 0 2px, rgba(0,0,0,0.012) 2px 3px);
      opacity: 0.7;
      pointer-events: none;
      z-index: 9997;
    }
    :root[data-theme='dark'] .stv-paper-fiber { opacity: 0.3; mix-blend-mode: lighten; }

    .stv-watermark {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .stv-watermark-track {
      display: inline-block;
      white-space: nowrap;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 8rem;
      line-height: 1;
      color: var(--text-primary);
      opacity: 0.04;
      animation: stv-watermark-scroll 240s linear infinite;
      will-change: transform;
    }
    @keyframes stv-watermark-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ============ BEAT 1 — HOOK ============ */
    .boot-stage {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
    }
    .boot-stage::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 95%);
      opacity: 0.6;
      pointer-events: none;
    }
    .boot-content { text-align: center; position: relative; z-index: 1; }
    .boot-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 200ms forwards;
      margin-bottom: 1.5rem;
    }
    .boot-wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 1;
      letter-spacing: -0.03em;
      filter: blur(20px);
      opacity: 0;
      animation: stv-blur-focus 1800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .boot-wordmark-stocker { color: var(--text-primary); }
    .boot-wordmark-tv { color: var(--accent); font-style: italic; transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1); }
    .boot-status {
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 2400ms forwards;
    }
    .boot-status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: stv-pulse 1800ms ease-in-out infinite;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .boot-stage.fading-out {
      animation: stv-fade-out 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes stv-blur-focus {
      0%   { filter: blur(20px); opacity: 0; transform: scale(1.1); }
      60%  { filter: blur(0px); opacity: 1; transform: scale(1.02); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    @keyframes stv-fade-in {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes stv-fade-out {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes stv-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .hook-stage {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      opacity: 0;
      animation: stv-hook-enter 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 400ms forwards;
    }
    .hook-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .hook-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-hero-number {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(7rem, 22vw, 18rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      color: var(--text-primary);
      filter: blur(28px);
      opacity: 0;
      transform: scale(1.15);
      animation: stv-hero-reveal 2000ms cubic-bezier(0.25, 0.1, 0.25, 1) 1200ms forwards;
      margin: 0;
      font-feature-settings: 'liga', 'dlig', 'onum';
    }
    .hook-hero-unit {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--accent);
      margin-left: 0.5rem;
      letter-spacing: -0.02em;
      transition: color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hook-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.5vw, 16px);
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-top: 3rem;
      max-width: 56ch;
      line-height: 1.6;
      opacity: 0;
      animation: stv-fade-in 1000ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .hook-subline-emphasis { color: var(--text-primary); font-weight: 500; }
    .hook-continue {
      margin-top: 4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 4200ms forwards;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: color 200ms ease, border-color 200ms ease;
      border: 1px solid transparent;
      border-radius: 2px;
      background: transparent;
      font-weight: 500;
    }
    .hook-continue:hover { color: var(--accent); border-color: var(--border); }
    .hook-continue-arrow { display: inline-block; margin-left: 0.5rem; transition: transform 200ms ease; }
    .hook-continue:hover .hook-continue-arrow { transform: translateX(4px); }
    .hook-accent-line {
      width: 60px; height: 1px;
      background: var(--accent);
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: stv-line-grow 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 2600ms forwards;
      transform-origin: center;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-line-grow { from { opacity: 0; transform: scaleX(0); } to { opacity: 1; transform: scaleX(1); } }
    @keyframes stv-hero-reveal {
      0%   { filter: blur(28px); opacity: 0; transform: scale(1.15); }
      55%  { filter: blur(0px); opacity: 1; transform: scale(1.02); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    @keyframes stv-hook-enter { from { opacity: 0; } to { opacity: 1; } }

    /* ============ TOP BAR (Beats 2-7) ============ */
    .stv-topbar {
      position: sticky;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), border-color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-left {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .stv-topbar-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.125rem;
      line-height: 1;
      letter-spacing: -0.015em;
      font-weight: 500;
      color: var(--text-primary);
    }
    .stv-topbar-mark .stv-mark-tv {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stv-topbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border);
    }
    .stv-topbar-status {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .stv-topbar-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: stv-pulse 2400ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (min-width: 720px) {
      .stv-topbar-status { display: flex; }
    }
    .stv-topbar-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      background: var(--surface-elevated);
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .stv-brand-pill {
      min-width: 38px;
      height: 32px;
      padding: 0 0.625rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      transition: background 220ms ease, color 220ms ease, transform 220ms ease;
      position: relative;
    }
    .stv-brand-pill:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    .stv-brand-pill[data-active='true'] {
      color: var(--text-primary);
      background: var(--accent);
      transform: scale(1.02);
    }
    .stv-brand-pill[data-active='true'] .stv-brand-pill-initials { color: #fff; mix-blend-mode: difference; }
    .stv-brand-pill-initials {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
      font-size: 11px;
      font-weight: 700;
    }
    .stv-topbar-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .stv-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
    }
    .stv-icon-btn:hover {
      color: var(--text-primary);
      background: var(--bg);
    }
    .stv-icon-btn svg { width: 14px; height: 14px; }

    /* ============ APP FRAME (post-Hook content area) ============ */
    .stv-app-frame {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: stv-frame-enter 700ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .stv-app-content {
      flex: 1;
      position: relative;
    }
    @keyframes stv-frame-enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ============ BEAT 2 — BRAND LOCK-IN ============ */
    .brand-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 0;
    }
    .brand-scene-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .brand-scene-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-builtfor {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      line-height: 1.1;
      margin: 0 0 0.5rem 0;
    }
    .brand-scene-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(5rem, 14vw, 11rem);
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 0.9;
      margin: 0.5rem 0 0 0;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
      animation: stv-brand-name-pop 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes stv-brand-name-pop {
      0% { opacity: 0; filter: blur(8px); transform: scale(0.97); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }
    .brand-scene-line {
      width: 80px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand-scene-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
    }
    .brand-scene-subline strong {
      color: var(--text-primary);
      font-weight: 500;
    }
    .brand-scene-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 1rem;
      max-width: 720px;
      width: 100%;
      margin: 1rem auto 3rem;
    }
    @media (max-width: 720px) {
      .brand-scene-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .brand-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 220ms ease, transform 220ms ease, background 220ms ease;
    }
    .brand-card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }
    .brand-card[data-active='true'] {
      border-color: var(--accent);
      background: var(--surface-elevated);
    }
    .brand-card-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .brand-card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .brand-card[data-active='true'] .brand-card-label {
      color: var(--text-primary);
      font-weight: 600;
    }
    .brand-scene-helper {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .brand-scene-helper kbd {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface-elevated);
      font-family: inherit;
      font-size: 10px;
      color: var(--text-primary);
      margin: 0 2px;
    }

    /* Toast for defensive failures (B.4.G) */
    .stv-toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
      z-index: 9999;
      pointer-events: none;
    }
    .stv-toast[data-visible='true'] {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Continue control reused inside scenes */
    .scene-continue {
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.6rem 1.25rem;
      transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      font-weight: 500;
    }
    .scene-continue:hover {
      color: var(--text-primary);
      border-color: var(--accent);
      background: var(--surface-elevated);
    }
    .scene-continue-arrow {
      display: inline-block;
      margin-left: 0.5rem;
      transition: transform 200ms ease;
    }
    .scene-continue:hover .scene-continue-arrow { transform: translateX(4px); }

    /* ============ BEAT 3 — SCALE REVEAL ============ */
    .scale-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem 4rem;
      gap: 0;
      position: relative;
    }
    .scale-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .scale-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 32ch;
      text-align: center;
      margin: 0.5rem 0 0.5rem 0;
    }
    .scale-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.25rem 2.25rem;
      max-width: 720px;
      margin: 1.75rem 0 0.5rem;
    }
    .scale-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .scale-stat-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .scale-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 0.25rem;
    }
    .scale-globe-wrap {
      position: relative;
      width: 100%;
      max-width: 920px;
      aspect-ratio: 1.6 / 1;
      margin: 1rem auto 1rem;
    }
    .scale-globe-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .scale-globe-vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, var(--bg) 100%);
    }
    .scale-globe-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scale-arc-card {
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      max-width: 280px;
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      animation: stv-arc-card-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) 1500ms forwards,
                 stv-arc-card-out 600ms cubic-bezier(0.4, 0, 0.2, 1) 9000ms forwards;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes stv-arc-card-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes stv-arc-card-out {
      to { opacity: 0; transform: translateY(-4px) scale(0.97); }
    }
    .scale-arc-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .scale-arc-meta-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.4rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-arc-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-primary);
      margin: 0;
    }
    .scale-arc-foot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-top: 0.5rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .scale-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 60ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      text-align: center;
      margin: 0.5rem 0 1.5rem;
    }
    .scale-subline strong { color: var(--text-primary); font-weight: 500; }

    /* ============ BEAT 4 — THE SAFETY NET ============ */
    .safety-scene {
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2rem 1.5rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 880px) {
      .safety-scene {
        grid-template-columns: 1.1fr 1fr;
        gap: 2rem;
        padding: 3rem 2rem 5rem;
      }
    }
    .safety-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .safety-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .safety-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .safety-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0 auto;
    }
    .safety-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Card chrome reused across safety-scene panels */
    .safety-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.25rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), border-color 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .safety-card-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.875rem;
    }
    .safety-card-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.4rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* AI thought stream */
    .thought-stream {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 220px;
      overflow: hidden;
    }
    .thought-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.4rem 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      line-height: 1.45;
      color: var(--text-muted);
      background: var(--surface-elevated);
      border-radius: 4px;
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .thought-row[data-state='passed'] { color: var(--text-primary); border-left: 2px solid var(--green); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='checked'] { color: var(--text-primary); border-left: 2px solid var(--accent); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='blocked'] { color: var(--text-primary); border-left: 2px solid var(--red); padding-left: calc(0.5rem - 2px); }
    .thought-row[data-state='info'] { border-left: 2px solid var(--border); padding-left: calc(0.5rem - 2px); }
    .thought-row-time {
      color: var(--text-muted);
      flex-shrink: 0;
      width: 50px;
      font-weight: 500;
    }
    .thought-row-code {
      color: var(--accent);
      flex-shrink: 0;
      font-weight: 600;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .thought-row[data-state='passed'] .thought-row-code { color: var(--green); }
    .thought-row[data-state='blocked'] .thought-row-code { color: var(--red); }
    .thought-row-msg { flex: 1; min-width: 0; }
    @keyframes stv-thought-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Decision tree (8 nodes vertically) */
    .tree {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .tree-node {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      background: var(--surface-elevated);
      border-radius: 4px;
      color: var(--text-muted);
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1) both;
    }
    .tree-node[data-active='true'] {
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: calc(0.55rem - 1px) calc(0.6rem - 1px);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .tree-node-num {
      width: 18px; height: 18px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 9.5px;
      font-weight: 600;
    }
    .tree-node[data-active='true'] .tree-node-num {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      mix-blend-mode: difference;
    }
    .tree-node-label { flex: 1; }
    .tree-node-conf {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .tree-node[data-active='true'] .tree-node-conf { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }

    /* Integrity gates */
    .gates {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .gate {
      padding: 0.875rem 0.75rem;
      background: var(--surface-elevated);
      border-radius: 6px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .gate-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .gate-name {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .gate-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      transition: color 220ms ease;
    }
    .gate[data-status='pass'] .gate-status { color: var(--green); }
    .gate[data-status='check'] .gate-status { color: var(--accent); }
    .gate[data-status='checking'] .gate-status { color: var(--accent); opacity: 0.7; animation: stv-pulse 1100ms ease-in-out infinite; }
    .gate-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 0.25rem;
    }
    .gate-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      width: 100%;
      background: var(--border);
    }
    .gate-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 1100ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .gate[data-status='pass'] .gate-bar::after { width: 100%; }
    .gate[data-status='check'] .gate-bar::after { width: 100%; background: var(--accent); }
    .gate[data-status='checking'] .gate-bar::after { width: 60%; background: var(--accent); }

    /* Quality + Integrity dual reveal — the Fraunces numerals moment */
    .dual-reveal {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 1.5rem;
      align-items: center;
      padding: 1.25rem 1rem;
      margin-top: 1rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .dual-reveal-divider { background: var(--border); height: 60%; align-self: center; }
    .dual-reveal-col { text-align: center; }
    .dual-reveal-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .dual-reveal-number {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.5rem, 5vw, 3.75rem);
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .dual-reveal-number[data-metric='quality'] { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .dual-reveal-number[data-metric='integrity'] { color: var(--green); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .dual-reveal-scale {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 0.4rem;
    }

    /* Hash chain background ticker */
    .hash-chain {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 100px;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--text-muted);
    }
    .hash-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.2rem 0;
      animation: stv-thought-in 380ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .hash-row-tick {
      color: var(--green);
      flex-shrink: 0;
    }
    .hash-row-hash {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Trust badges */
    .trust-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    @media (min-width: 720px) {
      .trust-row { grid-template-columns: repeat(4, 1fr); }
    }
    .trust-badge {
      padding: 0.875rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      text-align: left;
    }
    .trust-badge-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .trust-badge-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .trust-badge-foot {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .safety-foot {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 1.5rem;
    }
    .safety-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin: 0 auto 1.5rem;
    }
    .safety-subline strong { color: var(--text-primary); font-weight: 500; }

    /* ============ BEAT 5 — FULL PIPELINE (LINK-OUT) ============ */
    .pipeline-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .pipeline-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0.5rem auto 0.75rem;
    }
    .pipeline-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pipeline-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.6;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }
    .pipeline-subline strong { color: var(--text-primary); font-weight: 500; }
    .pipeline-cta-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1rem 0 2.5rem;
    }
    .pipeline-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: linear-gradient(180deg, var(--accent-deep) 0%, var(--accent) 100%);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
      transition: transform 200ms ease, box-shadow 200ms ease, background 300ms ease;
      text-decoration: none;
      mix-blend-mode: normal;
    }
    .pipeline-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 40%, transparent);
      background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent-deep) 100%);
    }
    .pipeline-cta-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.78);
      text-transform: uppercase;
    }
    .pipeline-cta-arrow {
      display: inline-block;
      transition: transform 200ms ease;
    }
    .pipeline-cta:hover .pipeline-cta-arrow { transform: translateX(4px); }

    .pipeline-cta-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease;
    }
    .pipeline-cta-secondary:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    .pipeline-stages {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }
    @media (min-width: 720px) {
      .pipeline-stages { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    .pipeline-stage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.75rem 0.6rem;
      text-align: left;
      transition: border-color 220ms ease, transform 220ms ease;
      position: relative;
      overflow: hidden;
    }
    .pipeline-stage-card[data-wow='true'] {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .pipeline-stage-card[data-wow='true']::after {
      content: 'WOW';
      position: absolute;
      top: 6px; right: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 700;
    }
    .pipeline-stage-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .pipeline-stage-name {
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .pipeline-callout {
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      background: var(--surface-elevated);
      border: 1px solid var(--accent);
      border-radius: 8px;
      max-width: 720px;
      width: 100%;
      text-align: left;
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1), background 300ms cubic-bezier(0.4, 0, 0.2, 1);

    .pipeline-callout-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;

      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);

    .pipeline-callout-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      font-weight: 500;

      line-height: 1.35;
      margin: 0 0 0.5rem 0;

    .pipeline-callout-body {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ============ BEAT 6 — OUTPUT THROUGH USERS' EYES ============ */
    .output-scene {
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2.5rem 1.5rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    @media (min-width: 880px) {
      .output-scene {
        grid-template-columns: 1.1fr 1fr;
        gap: 2rem;
        padding: 3rem 2rem 5rem;
      }
    }
    .output-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .output-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;

      text-transform: uppercase;

      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);

      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;

      margin: 0 auto;

      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);

      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 16px 40px rgba(0,0,0,0.10);

      width: 100%;
      margin: 0 auto;

    .user-preview-frame {
      background: var(--surface-elevated);
      border-radius: 10px;
      padding: 1rem 1rem 0.75rem;

    .user-preview-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.875rem;
      margin-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);

    .user-preview-name {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);

      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;

      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;

      flex-shrink: 0;
      width: 56px;
      height: 56px;

      font-style: italic;
      color: #fff;

      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;

      text-transform: uppercase;
      margin-bottom: 0.2rem;

      display: inline-block;
      width: 12px;
      height: 9px;

      border-radius: 1px;
      margin-right: 4px;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .user-preview-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      line-height: 1.35;
      color: var(--text-primary);
      margin: 0;
      font-weight: 500;
    }
    .user-preview-foot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.12em;

    .user-preview-pill {
      padding: 1px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);

    .ops-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;

      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;

      align-items: center;
      gap: 0.5rem;

      margin-top: 1rem;
    }
    .output-subline {

      line-height: 1.4;

    .sim-badge strong {

      font-weight: 600;

    .close-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      position: relative;
    }
    .close-eyebrow {

      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 200ms forwards;

    .close-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);

    .close-line {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;

      margin: 0;
      filter: blur(20px);
      opacity: 0;
      animation: stv-blur-focus 1800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .close-line em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-accent-line {
      width: 80px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0;
      animation: stv-line-grow 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 1800ms forwards;
      transform-origin: center;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      opacity: 0;
      animation: stv-fade-in 1000ms cubic-bezier(0.25, 0.1, 0.25, 1) 2200ms forwards;
    }
    .close-mark em {
      font-style: italic;
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-restart {
      margin-top: 4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: color 200ms ease, border-color 200ms ease;
      border: 1px solid transparent;
      border-radius: 2px;
      background: transparent;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .close-restart:hover {
      color: var(--accent);
      border-color: var(--border);
    }
    .close-restart-arrow {
      display: inline-block;
      margin-left: 0.5rem;
      transition: transform 200ms ease;
    }
    .close-restart:hover .close-restart-arrow { transform: translateX(-4px); }

  // ---- Config cache (per Beat 4 B.4.A) ----
  const configCache = new Map();

  async function loadBrandConfig(slug) {
    if (configCache.has(slug)) return configCache.get(slug);
    const safe = String(slug).replace(/[^a-z0-9_-]/gi, '');
    const url = `../config/${encodeURIComponent(safe)}.json`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const cfg = await res.json();
    configCache.set(slug, cfg);
    return cfg;
  }

  function applyBrandVars(cfg) {
    if (!cfg || !cfg.branding) return;

    if (b.primaryColor) {
      root.style.setProperty('--accent', b.primaryColor);
      root.style.setProperty('--gold', b.primaryColor); // Mission Control alias

    if (b.accentDeep) root.style.setProperty('--accent-deep', b.accentDeep);
    if (b.accent2) {
      root.style.setProperty('--accent-2', b.accent2);

    // neutral fallback otherwise. Per Beat 4 B.4.D + B.3 lock.
    root.style.setProperty('--green', b.successColor || '#22c55e');
    if (b.pageTitle) document.title = b.pageTitle;
  }

  // ============================================================================
  // SimpleGlobe — Beat 3 supporting cinematic. Three.js sphere + 53 dots.
  // ----------------------------------------------------------------------------
  // Slow rotation, brand-tinted exchange dots, no perf-heavy effects.
  // perfMode (URL ?perf=1) reduces rotation speed and dot resolution.
  // ============================================================================
  function SimpleGlobe({ accent }) {
    const containerRef = useRef(null);
    const stateRef = useRef(null);

    useEffect(() => {
      const container = containerRef.current;
      if (!container) return;
      if (typeof THREE === 'undefined') {
        console.warn('[stv-unified] THREE.js not available — globe will render placeholder');
        return;
      }

      // Detect perf mode
      let perfMode = false;
      try {
        perfMode = new URLSearchParams(location.search).get('perf') === '1';
      } catch (e) { /* no-op */ }

      const width = container.clientWidth || 800;
      const height = container.clientHeight || 500;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      camera.position.z = 280;

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: !perfMode });
      renderer.setPixelRatio(perfMode ? 1 : Math.min(2, window.devicePixelRatio));
      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      // Globe sphere — subtle, low opacity, gives the "planet" silhouette
      const sphereGeom = new THREE.SphereGeometry(85, perfMode ? 32 : 64, perfMode ? 16 : 32);
      const sphereMat = new THREE.MeshBasicMaterial({
        color: 0x111418,
        transparent: true,
        opacity: 0.85,
        wireframe: false,
      });
      const sphere = new THREE.Mesh(sphereGeom, sphereMat);
      scene.add(sphere);

      // Wireframe overlay for "world grid" feel
      const wireGeom = new THREE.SphereGeometry(85.1, 24, 16);
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.05,
      });
      const wire = new THREE.Mesh(wireGeom, wireMat);
      scene.add(wire);

      // Helper: lat/lng → 3D position on sphere of radius R
      function latLngToVec3(lat, lng, R) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const x = -R * Math.sin(phi) * Math.cos(theta);
        const y = R * Math.cos(phi);
        const z = R * Math.sin(phi) * Math.sin(theta);
        return new THREE.Vector3(x, y, z);
      }

      // Exchange dots — 53 markers, brand-tinted via accent color
      const accentColor = new THREE.Color(accent || '#6AAE22');
      const dotsGroup = new THREE.Group();
      EXCHANGES_53.forEach((ex) => {
        const pos = latLngToVec3(ex.lat, ex.lng, 86);
        const dotGeom = new THREE.SphereGeometry(1.2, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0.95 });
        const dot = new THREE.Mesh(dotGeom, dotMat);
        dot.position.copy(pos);
        dotsGroup.add(dot);

        // Halo ring for visual emphasis
        const haloGeom = new THREE.RingGeometry(1.6, 2.4, 16);
        const haloMat = new THREE.MeshBasicMaterial({
          color: accentColor,
          transparent: true,
          opacity: 0.35,
          side: THREE.DoubleSide,
        });
        const halo = new THREE.Mesh(haloGeom, haloMat);
        halo.position.copy(pos);
        halo.lookAt(0, 0, 0);
        dotsGroup.add(halo);
      });
      scene.add(dotsGroup);

      // Initial rotation — angle the globe so North America + Europe are visible
      sphere.rotation.x = -0.25;
      wire.rotation.x = -0.25;
      dotsGroup.rotation.x = -0.25;
      sphere.rotation.y = -1.2;
      wire.rotation.y = -1.2;
      dotsGroup.rotation.y = -1.2;

      // Animate — slow Y rotation
      const speed = perfMode ? 0.0006 : 0.0009;
      let rafId = null;
      const animate = () => {
        sphere.rotation.y += speed;
        wire.rotation.y += speed;
        dotsGroup.rotation.y += speed;
        renderer.render(scene, camera);
        rafId = requestAnimationFrame(animate);
      };
      animate();

      // Resize handling
      const onResize = () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      };
      window.addEventListener('resize', onResize);

      stateRef.current = { renderer, scene, dotsGroup, accentColor };

      return () => {
        if (rafId) cancelAnimationFrame(rafId);
        window.removeEventListener('resize', onResize);
        renderer.dispose();
        sphereGeom.dispose();
        sphereMat.dispose();
        wireGeom.dispose();
        wireMat.dispose();
        dotsGroup.children.forEach((m) => {
          if (m.geometry) m.geometry.dispose();
          if (m.material) m.material.dispose();
        });
        if (renderer.domElement && renderer.domElement.parentNode === container) {
          container.removeChild(renderer.domElement);
        }
      };
    // eslint-disable-next-line react-hooks/exhaustive-deps
    }, []); // mount once; brand color updates via separate effect

    // Update dot colors when accent changes (brand switch). Animation loop
    // will pick up the new colors on the next frame; no manual render needed.
    useEffect(() => {
      const s = stateRef.current;
      if (!s || typeof THREE === 'undefined') return;
      const newColor = new THREE.Color(accent || '#6AAE22');
      s.accentColor = newColor;
      s.dotsGroup.children.forEach((m) => {
        if (m.material && m.material.color) m.material.color.copy(newColor);
      });
    }, [accent]);

    return <div ref={containerRef} className="scale-globe-canvas" />;
  }

    const seeds = ['a3f2', '6e1c', '8b4d', 'f9a0', '2c7e', '5d3b', 'e8f1', '7c2a'];
    const rows = [];
    const total = Math.min(seeds.length, phase * 2 + 2);
    for (let i = 0; i < total; i++) {
      const t = (i * 0.42 + 0.18).toFixed(2);
      const h = seeds[i % seeds.length] + 'b9c1' + seeds[(i + 1) % seeds.length] + '...';
      rows.push(
        <div className="hash-row" key={`${i}-${h}`}>
          <span className="hash-row-tick">✓</span>
          <span className="hash-row-hash">block #{1240 + i} · {h}</span>
          <span style={{ color: 'var(--text-muted)' }}>· t+{t}s</span>

      );

    return <div className="hash-chain">{rows}</div>;

  // ============================================================================
  // App — top-level state machine
  // ============================================================================
  function App() {
    const [booted, setBooted] = useState(false);
    const [activeBeat, setActiveBeat] = useState(BEATS.HOOK);
    const [theme, setTheme] = useState(() => {
      try { return document.documentElement.dataset.theme || 'light'; }
      catch (e) { return 'light'; }
    });
    const [brandSlug, setBrandSlug] = useState(() => {
      try {
        const param = new URLSearchParams(location.search).get('client');
        return KNOWN_SLUGS.includes(param) ? param : DEFAULT_SLUG;
      } catch (e) { return DEFAULT_SLUG; }
    });
    const [brandConfig, setBrandConfig] = useState(null);
    const switchInFlight = useRef(false);

    // Async config load on brandSlug change
    useEffect(() => {
      let cancelled = false;
      switchInFlight.current = true;
      loadBrandConfig(brandSlug)
        .then((cfg) => {
          if (cancelled) return;
          setBrandConfig(cfg);
          applyBrandVars(cfg);
          // Sync URL — stay shallow so back button works
          try {
            const u = new URL(location.href);
            if (brandSlug === DEFAULT_SLUG) u.searchParams.delete('client');
            else u.searchParams.set('client', brandSlug);
            history.replaceState({}, '', u.toString());
          } catch (e) { /* no-op */ }
        })
        .catch((err) => {
          if (cancelled) return;
          // Defensive fallback per B.4.G — keep current brand visually, surface a toast.
          console.error('[stv-unified] brand config load failed for', brandSlug, err);
          showToast(`Couldn't load ${BRAND_DISPLAY_DEFAULTS[brandSlug]?.shortName || brandSlug} config — staying on current.`);
          if (brandSlug !== DEFAULT_SLUG) {
            // Roll back to default if current load failed
            setBrandSlug(DEFAULT_SLUG);
          }
        })
        .finally(() => { switchInFlight.current = false; });
      return () => { cancelled = true; };
    }, [brandSlug]);

    // Theme persistence + meta theme-color sync
    useEffect(() => {
      try {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('stv-theme', theme);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#FAF7F2' : '#0A0B0F');
      } catch (e) { /* no-op */ }
    }, [theme]);

    // Keyboard navigation
    useEffect(() => {
      const onKey = (e) => {
        if (!booted) return;
        // 1-6 → brand switch (works in any beat after Hook)
        if (activeBeat !== BEATS.HOOK && /^[1-6]$/.test(e.key)) {
          const idx = parseInt(e.key, 10) - 1;
          const slug = KNOWN_SLUGS[idx];
          if (slug && slug !== brandSlug) handleBrandSwitch(slug);
          return;
        }
        // ArrowRight / Enter / Space — advance through beats
        if (e.key === 'ArrowRight' || e.key === 'Enter' || e.key === ' ') {
          const i = BEAT_ORDER.indexOf(activeBeat);
          if (i >= 0 && i < BEAT_ORDER.length - 1) {
            e.preventDefault();
            setActiveBeat(BEAT_ORDER[i + 1]);
          }
        }
        // ArrowLeft — back
        if (e.key === 'ArrowLeft') {
          const i = BEAT_ORDER.indexOf(activeBeat);
          if (i > 0) {
            e.preventDefault();
            setActiveBeat(BEAT_ORDER[i - 1]);
          }
        }
        // Escape — return to Hook
        if (e.key === 'Escape') {
          if (activeBeat !== BEATS.HOOK) setActiveBeat(BEATS.HOOK);
        }
      };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [booted, activeBeat, brandSlug]);

    const handleBrandSwitch = useCallback((slug) => {
      if (slug === brandSlug) return;
      setBrandSlug(slug);
    }, [brandSlug]);

    const handleToggleTheme = useCallback(() => {
      setTheme((t) => t === 'light' ? 'dark' : 'light');
    }, []);

    const goNext = useCallback(() => {
      const i = BEAT_ORDER.indexOf(activeBeat);
      if (i < BEAT_ORDER.length - 1) setActiveBeat(BEAT_ORDER[i + 1]);
    }, [activeBeat]);

    const goBack = useCallback(() => {
      const i = BEAT_ORDER.indexOf(activeBeat);
      if (i > 0) setActiveBeat(BEAT_ORDER[i - 1]);
    }, [activeBeat]);

    if (!booted) {
      return <BootSequence onComplete={() => setBooted(true)} />;
    }

    if (activeBeat === BEATS.HOOK) {
      return <HookScene onContinue={goNext} />;
    }

    // Post-Hook: app frame with persistent top bar
    let scene = null;
    if (activeBeat === BEATS.BRAND) {
      scene = (
        <BrandScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onBrandSwitch={handleBrandSwitch}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.SCALE) {
      scene = (
        <ScaleScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.SAFETY) {
      scene = (
        <SafetyScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.PIPELINE) {
      scene = (
        <PipelineScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.OUTPUT) {
      scene = (
        <OutputScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.CLOSE) {
      scene = (
        <CloseScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onRestart={() => setActiveBeat(BEATS.HOOK)}
        />
      );
    } else {
      const beatLabels = {
      };
      const meta = beatLabels[activeBeat] || { id: '?', name: 'Unknown' };
      const i = BEAT_ORDER.indexOf(activeBeat);
      scene = (
        <PlaceholderScene
          beatId={meta.id}
          beatName={meta.name}
          onContinue={i < BEAT_ORDER.length - 1 ? goNext : null}
          onBack={i > 0 ? goBack : null}
        />
      );
    }

    return (
      <div className="stv-app-frame">
        <TopBar
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onBrandSwitch={handleBrandSwitch}
          theme={theme}
          onToggleTheme={handleToggleTheme}
        />
        <main className="stv-app-content">{scene}</main>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
