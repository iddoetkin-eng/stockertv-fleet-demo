  // ============================================================================
  // AUDIO SYSTEM (audit A4) — procedural Web Audio, default OFF
  // ----------------------------------------------------------------------------
  // 4 sounds: click, gatePass, typewriter, closeChord. Tasteful frequencies.
  // Lazy-init AudioContext on first toggle-on (user gesture required).
  // ============================================================================
  const audioState = {
    ctx: null,
    enabled: false,
    init() {
      if (this.ctx) return this.ctx;
      try {
        const C = window.AudioContext || window.webkitAudioContext;
        if (!C) return null;
        this.ctx = new C();
      } catch (e) { return null; }
      return this.ctx;
    },
    play(name) {
      if (!this.enabled) return;
      const ctx = this.init();
      if (!ctx) return;
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.value = 0;
      master.connect(ctx.destination);
      try {
        if (name === 'click') {
          const o = ctx.createOscillator();
          o.type = 'sine'; o.frequency.value = 580;
          o.connect(master);
          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(0.05, now + 0.005);
          master.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
          o.start(now); o.stop(now + 0.1);
        } else if (name === 'gatePass') {
          // soft 220Hz → 330Hz pass tone
          const o = ctx.createOscillator();
          o.type = 'sine'; o.frequency.setValueAtTime(220, now);
          o.frequency.exponentialRampToValueAtTime(330, now + 0.18);
          o.connect(master);
          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(0.07, now + 0.04);
          master.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
          o.start(now); o.stop(now + 0.34);
        } else if (name === 'typewriter') {
          // brief click — 1.5kHz quick triangle
          const o = ctx.createOscillator();
          o.type = 'triangle'; o.frequency.value = 1500;
          o.connect(master);
          master.gain.setValueAtTime(0, now);
          master.gain.linearRampToValueAtTime(0.025, now + 0.002);
          master.gain.exponentialRampToValueAtTime(0.0001, now + 0.025);
          o.start(now); o.stop(now + 0.03);
        } else if (name === 'closeChord') {
          // soft major triad — 261.6 (C) + 329.6 (E) + 392 (G)
          [261.6, 329.6, 392].forEach((f, i) => {
            const o = ctx.createOscillator();
            o.type = 'sine'; o.frequency.value = f;
            const g = ctx.createGain(); g.gain.value = 0;
            o.connect(g); g.connect(master);
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.08, now + 0.05 + i * 0.04);
            g.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
            o.start(now); o.stop(now + 1.7);
          });
          master.gain.setValueAtTime(1, now);
        }
      } catch (e) { /* swallow */ }
    },

    // R5 D5 — Ambient sound layer per beat (default OFF; only plays when audio enabled)
    ambient: { source: null, gain: null, lfo: null, lfoGain: null, beat: null },
    startAmbient(beat) {
      if (!this.enabled) return;
      const ctx = this.init();
      if (!ctx) return;
      // Don't restart if already on the same beat
      if (this.ambient.beat === beat) return;
      this.stopAmbient();
      const now = ctx.currentTime;
      try {
        if (beat === 'scale') {
          // Trading-floor murmur — filtered white noise, very low volume
          const bufLen = ctx.sampleRate * 2;
          const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.6;
          const src = ctx.createBufferSource();
          src.buffer = buf; src.loop = true;
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass'; lp.frequency.value = 380;
          const hp = ctx.createBiquadFilter();
          hp.type = 'highpass'; hp.frequency.value = 80;
          const g = ctx.createGain();
          g.gain.value = 0;
          g.gain.linearRampToValueAtTime(0.012, now + 1.5);
          src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(ctx.destination);
          src.start();
          this.ambient = { source: src, gain: g, lfo: null, lfoGain: null, beat };
        } else if (beat === 'safety') {
          // Broadcast-booth tone — 60Hz hum + slow LFO amplitude wobble
          const o = ctx.createOscillator();
          o.type = 'sine'; o.frequency.value = 60;
          const g = ctx.createGain(); g.gain.value = 0;
          // LFO modulates gain at 0.4Hz for an organic breathing
          const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.4;
          const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.005;
          lfo.connect(lfoGain); lfoGain.connect(g.gain);
          g.gain.setValueAtTime(0, now);
          g.gain.linearRampToValueAtTime(0.012, now + 1.5);
          o.connect(g); g.connect(ctx.destination);
          o.start(); lfo.start();
          this.ambient = { source: o, gain: g, lfo, lfoGain, beat };
        } else if (beat === 'output') {
          // Broadcast-on tone — soft 220Hz sine with subtle 4Hz tremolo
          const o = ctx.createOscillator();
          o.type = 'sine'; o.frequency.value = 220;
          const g = ctx.createGain(); g.gain.value = 0;
          const trem = ctx.createOscillator(); trem.type = 'sine'; trem.frequency.value = 4;
          const tremGain = ctx.createGain(); tremGain.gain.value = 0.004;
          trem.connect(tremGain); tremGain.connect(g.gain);
          g.gain.setValueAtTime(0, now);
          g.gain.linearRampToValueAtTime(0.010, now + 1.5);
          o.connect(g); g.connect(ctx.destination);
          o.start(); trem.start();
          this.ambient = { source: o, gain: g, lfo: trem, lfoGain: tremGain, beat };
        }
      } catch (e) { /* swallow */ }
    },
    stopAmbient() {
      const ctx = this.ctx;
      if (!ctx) return;
      const a = this.ambient;
      if (!a || !a.source) { this.ambient = { source: null, gain: null, lfo: null, lfoGain: null, beat: null }; return; }
      try {
        const now = ctx.currentTime;
        if (a.gain) {
          a.gain.gain.cancelScheduledValues(now);
          a.gain.gain.setValueAtTime(a.gain.gain.value, now);
          a.gain.gain.linearRampToValueAtTime(0.0001, now + 0.4);
        }
        setTimeout(() => {
          try { if (a.source && a.source.stop) a.source.stop(); } catch (e) {}
          try { if (a.lfo && a.lfo.stop) a.lfo.stop(); } catch (e) {}
        }, 500);
      } catch (e) {}
      this.ambient = { source: null, gain: null, lfo: null, lfoGain: null, beat: null };
    },
  };

  // ---- CountUp (audit 3.2 + D2) — animated numerical reveal ----
  // Counts from 0 (or `from`) to `to` over `duration` ms with easeOutCubic.
  // 60Hz tick. Settles exactly on `to`. Optional `format` for "+", "%", "k" etc.
  function useCountUp(target, opts) {
    const { duration = 1200, delay = 0, format = (v) => Math.round(v).toString(), enabled = true } = opts || {};
    const [val, setVal] = useState(enabled ? 0 : target);
    useEffect(() => {
      if (!enabled) { setVal(target); return; }
      let rafId = null;
      let startTs = null;
      const startTimer = setTimeout(() => {
        const tick = (ts) => {
          if (startTs === null) startTs = ts;
          const elapsed = ts - startTs;
          const t = Math.min(1, elapsed / duration);
          // easeOutCubic
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(target * eased);
          if (t < 1) rafId = requestAnimationFrame(tick);
          else setVal(target);
        };
        rafId = requestAnimationFrame(tick);
      }, delay);
      return () => {
        clearTimeout(startTimer);
        if (rafId) cancelAnimationFrame(rafId);
      };
    }, [target, duration, delay, enabled]);
    return format(val);
  }
  function CountUp({ to, duration, delay, format, suffix, className, style }) {
    const display = useCountUp(to, { duration, delay, format });
    return (
      <span className={className} style={style}>
        {display}{suffix || ''}
      </span>
    );
  }

  // ---- R5 D1 — Spring-physics CountUp (4% overshoot, then settle) ----
  // Used for the Beat 1 hero numbers. Spring sim: F = k(target - x) - c·v.
  // k=180 (stiffness), c=11 (damping → ~4-6% overshoot, settle in ~1.6s).
  function useSpringCountUp(target, opts) {
    const { delay = 0, format = (v) => Math.round(v).toString(), stiffness = 180, damping = 11, enabled = true } = opts || {};
    const [val, setVal] = useState(enabled ? 0 : target);
    useEffect(() => {
      if (!enabled) { setVal(target); return; }
      let rafId = null;
      let lastTs = null;
      let x = 0;
      let v = 0;
      const startTimer = setTimeout(() => {
        const tick = (ts) => {
          if (lastTs === null) lastTs = ts;
          const dt = Math.min(0.04, (ts - lastTs) / 1000); // clamp to 25fps slowdown safety
          lastTs = ts;
          // Spring step
          const force = stiffness * (target - x) - damping * v;
          v += force * dt;
          x += v * dt;
          setVal(x);
          // Settle when both displacement and velocity are small enough
          if (Math.abs(target - x) < 0.05 && Math.abs(v) < 0.05) {
            setVal(target);
            return;
          }
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
      }, delay);
      return () => {
        clearTimeout(startTimer);
        if (rafId) cancelAnimationFrame(rafId);
      };
    }, [target, delay, stiffness, damping, enabled]);
    // R10 E — clamp displayed value at target so the spring overshoot (47→49→47)
    // doesn't show "49" briefly. Internal spring physics keeps its settle feel;
    // only the value passed to format() is clamped.
    return format(Math.min(val, target));
  }
  function SpringCountUp({ to, delay, format, suffix, stiffness, damping, className, style }) {
    const display = useSpringCountUp(to, { delay, format, stiffness, damping });
    return (
      <span className={className} style={style}>
        {display}{suffix || ''}
      </span>
    );
  }

  // ---- Config cache (per Beat 4 B.4.A) ----
  const configCache = new Map();

  async function loadBrandConfig(slug) {
    if (configCache.has(slug)) return configCache.get(slug);
    const safe = String(slug).replace(/[^a-z0-9_-]/gi, '');
    const url = `../config/${encodeURIComponent(safe)}.json`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const cfg = await res.json();
    configCache.set(slug, cfg);
    return cfg;
  }

  // ---- CSS variable application (per Beat 4 B.4.D, hybrid 3-way --green rule) ----
  function applyBrandVars(cfg) {
    if (!cfg || !cfg.branding) return;
    const b = cfg.branding;
    const root = document.documentElement;
    if (b.primaryColor) {
      root.style.setProperty('--accent', b.primaryColor);
      root.style.setProperty('--gold', b.primaryColor); // Mission Control alias
    }
    if (b.accentDeep) root.style.setProperty('--accent-deep', b.accentDeep);
    if (b.accent2) {
      root.style.setProperty('--accent-2', b.accent2);
      root.style.setProperty('--cyan', b.accent2); // Mission Control alias
    }
    // --green hybrid 3-way rule: brand-aligned green if successColor present;
    // neutral fallback otherwise. Per Beat 4 B.4.D + B.3 lock.
    root.style.setProperty('--green', b.successColor || '#22c55e');
    if (b.pageTitle) document.title = b.pageTitle;
  }

  // ---- Toast helper for defensive failures ----
  function showToast(msg, ms) {
    const el = document.getElementById('stv-toast');
    if (!el) return;
    el.textContent = msg;
    el.setAttribute('data-visible', 'true');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => el.setAttribute('data-visible', 'false'), ms || 3000);
  }

    const [phase, setPhase] = useState(0);

    const [exiting, setExiting] = useState(false);
    useEffect(() => {
      const t = [];
      // Phase 1 — coalesce + eyebrow at 1400ms
      t.push(setTimeout(() => setPhase(1), 1400));
      // Phase 2 — brand pulse at 2400ms
      t.push(setTimeout(() => setPhase(2), 2400));
      // Phase 3 — coverage line at 3800ms
      t.push(setTimeout(() => setPhase(3), 3800));
      // Phase 4 — checks scroll, staggered
      [0, 1, 2, 3].forEach((i) => {

      t.push(setTimeout(() => setPhase(4), 4800));
      // Phase 5 — status line at 6500ms

      // Phase 6 — exit at 7200ms
      t.push(setTimeout(() => { setPhase(6); setExiting(true); }, 7200));

      return () => t.forEach(clearTimeout);

  // ============================================================================
  // SimpleGlobe — Beat 3 cinematic. Three.js sphere + 53 markers + flying arcs +
  // atmospheric haze + cloud layer + orbit particles + airplane-blink markers.
  // ----------------------------------------------------------------------------
  // Audit upgrades: 3.3 faster rotation, 3.4 flying arcs Tokyo→NY (and others),
  // E3 atmosphere/clouds/airplane blinks, D4 orbit particles, A3 hooks for
  // headline-on-arc-land event (handled by parent ScaleScene via onArc callback).
  // ============================================================================
  // Helper: lat/lng → 3D position on sphere of radius R (module scope so other
  // utilities can reuse for screen-space projection if needed).
  function latLngToVec3(lat, lng, R) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lng + 180) * (Math.PI / 180);
    const x = -R * Math.sin(phi) * Math.cos(theta);
    const y = R * Math.cos(phi);
    const z = R * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }

  // Build a CanvasTexture of the world with continents from FLEET_SHOWCASE
  // (Natural Earth 110m public-domain land paths, projected x = lng + 180,
  // y = 90 - lat — equirectangular).
  function buildWorldTexture() {
    if (typeof window === 'undefined' || !window.FLEET_SHOWCASE || !window.FLEET_SHOWCASE.continents) return null;
    const continents = window.FLEET_SHOWCASE.continents;
    if (!Array.isArray(continents) || continents.length === 0) return null;
    const w = 2048, h = 1024;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    const sx = w / 360;
    const sy = h / 180;
    // Helper: parse one Natural-Earth-format path into a Path2D
    function parsePath(pathStr) {
      const path = new Path2D();
      const tokens = pathStr.match(/([MLZ])\s*([-\d.]+)?\s*,?\s*([-\d.]+)?/g) || [];
      let started = false;
      tokens.forEach((tok) => {
        const m = tok.match(/^([MLZ])\s*([-\d.]+)?\s*,?\s*([-\d.]+)?/);
        if (!m) return;
        const cmd = m[1];
        const x = parseFloat(m[2]);
        const y = parseFloat(m[3]);
        if (cmd === 'M') { path.moveTo(x * sx, y * sy); started = true; }
        else if (cmd === 'L' && started) { path.lineTo(x * sx, y * sy); }
        else if (cmd === 'Z') { path.closePath(); }
      });
      return path;
    }
    // Ocean fill — slightly lighter than the dark sphere so continents read
    ctx.fillStyle = '#0d1015';
    ctx.fillRect(0, 0, w, h);
    // Continent fill (the visible land mass)
    ctx.fillStyle = '#1f2630';
    continents.forEach((pathStr) => { ctx.fill(parsePath(pathStr)); });
    // Round 3 P3 — Natural Earth 110m country borders, drawn at higher opacity
    // so individual countries read as a real political world map (not just continents).
    if (Array.isArray(window.NE_COUNTRIES_110M)) {
      ctx.strokeStyle = 'rgba(255,255,255,0.38)';
      ctx.lineWidth = 0.75;
      window.NE_COUNTRIES_110M.forEach((pathStr) => { ctx.stroke(parsePath(pathStr)); });
    }
    // Continent outline on top — keeps coastlines crisp where countries don't overlap them
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 0.65;
    continents.forEach((pathStr) => { ctx.stroke(parsePath(pathStr)); });
    return new THREE.CanvasTexture(canvas);
  }

  function SimpleGlobe({ accent, onArcLand, onMarkerClick, onMarkerHover, onDragStart }) {
    const containerRef = useRef(null);
    const stateRef = useRef(null);
    const onArcLandRef = useRef(onArcLand);
    const onMarkerClickRef = useRef(onMarkerClick);
    const onMarkerHoverRef = useRef(onMarkerHover);
    const onDragStartRef = useRef(onDragStart);
    useEffect(() => { onArcLandRef.current = onArcLand; }, [onArcLand]);
    useEffect(() => { onMarkerClickRef.current = onMarkerClick; }, [onMarkerClick]);
    useEffect(() => { onMarkerHoverRef.current = onMarkerHover; }, [onMarkerHover]);
    useEffect(() => { onDragStartRef.current = onDragStart; }, [onDragStart]);

    useEffect(() => {
      const container = containerRef.current;
      if (!container) return;
      if (typeof THREE === 'undefined') {
        console.warn('[stv-unified] THREE.js not available — globe will render placeholder');
        return;
      }

      // Detect perf mode (URL param OR auto-enabled on small viewports per Round 4 P3)
      let perfMode = false;
      try {
        perfMode = new URLSearchParams(location.search).get('perf') === '1';
      } catch (e) { /* no-op */ }
      if (!perfMode && typeof window !== 'undefined' && window.innerWidth < 768) {
        perfMode = true;
      }

      const width = container.clientWidth || 800;
      const height = container.clientHeight || 500;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      camera.position.z = 280;

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: !perfMode });
      renderer.setPixelRatio(perfMode ? 1 : Math.min(2, window.devicePixelRatio));
      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      const accentColor = new THREE.Color(accent || '#6AAE22');

      // Globe sphere — with real continent texture if FLEET_SHOWCASE is loaded
      const worldTex = buildWorldTexture();
      const sphereGeom = new THREE.SphereGeometry(85, perfMode ? 32 : 64, perfMode ? 16 : 32);
      const sphereMat = new THREE.MeshBasicMaterial({
        color: worldTex ? 0xffffff : 0x111418,
        map: worldTex || null,
        transparent: true,
        opacity: 0.94,
        wireframe: false,
      });
      const sphere = new THREE.Mesh(sphereGeom, sphereMat);
      scene.add(sphere);

      // Atmospheric haze — outer sphere with brand-tint glow (E3)
      const hazeGeom = new THREE.SphereGeometry(91, 32, 16);
      const hazeMat = new THREE.MeshBasicMaterial({
        color: accentColor,
        transparent: true,
        opacity: 0.06,
        side: THREE.BackSide,
      });
      const haze = new THREE.Mesh(hazeGeom, hazeMat);
      scene.add(haze);

      // Cloud layer — second outer sphere with subtle noise texture (E3)
      // Procedural via short canvas-derived texture
      const cloudCanvas = document.createElement('canvas');
      cloudCanvas.width = 256; cloudCanvas.height = 128;
      const cctx = cloudCanvas.getContext('2d');
      cctx.fillStyle = 'rgba(0,0,0,0)';
      cctx.fillRect(0, 0, 256, 128);
      // Random soft cloud blobs
      for (let i = 0; i < 22; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 128;
        const r = 8 + Math.random() * 14;
        const grad = cctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, 'rgba(255,255,255,0.45)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        cctx.fillStyle = grad;
        cctx.beginPath(); cctx.arc(x, y, r, 0, Math.PI * 2); cctx.fill();
      }
      const cloudTex = new THREE.CanvasTexture(cloudCanvas);
      cloudTex.wrapS = THREE.RepeatWrapping;
      cloudTex.wrapT = THREE.RepeatWrapping;
      const cloudGeom = new THREE.SphereGeometry(86.4, 32, 16);
      const cloudMat = new THREE.MeshBasicMaterial({
        map: cloudTex,
        transparent: true,
        opacity: 0.18,
        depthWrite: false,
      });
      const clouds = new THREE.Mesh(cloudGeom, cloudMat);
      scene.add(clouds);

      // Wireframe overlay for "world grid" feel
      const wireGeom = new THREE.SphereGeometry(85.1, 24, 16);
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.05,
      });
      const wire = new THREE.Mesh(wireGeom, wireMat);
      scene.add(wire);

      // Round 4 P1 — read --accent-2 (lighter brand shade) for marker hover color
      function readCssColor(varName, fallback) {
        try {
          const v = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
          if (v) return new THREE.Color(v);
        } catch (e) {}
        return new THREE.Color(fallback);
      }
      let hoverColor = readCssColor('--accent-2', '#A8D96E');

      // Exchange dots — 53 markers, brand-tinted, click/hover-pickable
      const dotsGroup = new THREE.Group();
      const blinkMaterials = [];
      const pickableMeshes = []; // raycasting targets — dots only
      // Round 4 P1 — track materials per exchange code for hover-color swapping
      const markerMatsByCode = new Map(); // code -> { dotMat, haloMat, phase, target }
      EXCHANGES_53.forEach((ex) => {
        const pos = latLngToVec3(ex.lat, ex.lng, 86);
        const dotGeom = new THREE.SphereGeometry(1.6, 10, 10); // slightly larger for easier clicking
        const dotMat = new THREE.MeshBasicMaterial({ color: accentColor.clone(), transparent: true, opacity: 0.95 });
        const dot = new THREE.Mesh(dotGeom, dotMat);
        dot.position.copy(pos);
        dot.userData.exchangeCode = ex.code;
        dot.userData.exchangeName = ex.name;
        dotsGroup.add(dot);
        pickableMeshes.push(dot);
        // Halo ring
        const haloGeom = new THREE.RingGeometry(1.8, 2.8, 16);
        const haloMat = new THREE.MeshBasicMaterial({
          color: accentColor.clone(),
          transparent: true,
          opacity: 0.35,
          side: THREE.DoubleSide,
        });
        const halo = new THREE.Mesh(haloGeom, haloMat);
        halo.position.copy(pos);
        halo.lookAt(0, 0, 0);
        halo.userData.exchangeCode = ex.code; // also pickable for easier clicks
        dotsGroup.add(halo);
        pickableMeshes.push(halo);
        // Round 4 P1 — register per-marker materials for color tween
        markerMatsByCode.set(ex.code, { dotMat, haloMat, phase: 0, target: 0 });
        // Airplane-blink — tiny pulsing dot just above each marker (E3)
        const blinkMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
        const blink = new THREE.Mesh(new THREE.SphereGeometry(0.55, 6, 6), blinkMat);
        blink.position.copy(pos.clone().multiplyScalar(1.025));
        blinkMaterials.push({ mat: blinkMat, phase: Math.random() * Math.PI * 2 });
        dotsGroup.add(blink);
      });
      scene.add(dotsGroup);

      // Raycaster for hover + click on markers
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      let hoveredCode = null;
      // R6 P4 — drag-to-rotate state (declared up-front so onPointerMove can guard against hover during drag)
      let isDragging = false;
      let dragStartX = 0, dragStartY = 0;
      let dragStartRotX = 0, dragStartRotY = 0;
      let lastInteractionTs = 0;
      let returnAnim = null; // { startTs, fromX, fromY, toX, toY }
      function pickAt(clientX, clientY) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(pickableMeshes, false);
        if (hits.length === 0) return null;
        return hits[0].object.userData.exchangeCode || null;
      }
      function onPointerMove(e) {
        // R4 P1 — color shift on hover (stays in R6).
        // R6 P3 — also fires onMarkerHover with screen position so a transient
        // preview card can render. Click still opens the full side panel.
        // Skip hover updates while dragging (R6 P4) so the preview doesn't flicker.
        if (isDragging) return;
        const code = pickAt(e.clientX, e.clientY);
        if (code !== hoveredCode) {
          if (hoveredCode) {
            const prev = markerMatsByCode.get(hoveredCode);
            if (prev) prev.target = 0;
          }
          if (code) {
            const next = markerMatsByCode.get(code);
            if (next) next.target = 1;
          }
          hoveredCode = code;
          renderer.domElement.setAttribute('data-hovering', code ? 'true' : 'false');
          if (onMarkerHoverRef.current) {
            const ex = code ? EXCHANGES_53.find((x) => x.code === code) : null;
            onMarkerHoverRef.current(ex, e.clientX, e.clientY);
          }
        } else if (code && onMarkerHoverRef.current) {
          // Update position while still over the same marker (card follows cursor)
          const ex = EXCHANGES_53.find((x) => x.code === code);
          onMarkerHoverRef.current(ex, e.clientX, e.clientY);
        }
      }
      function onPointerDown(e) {
        const code = pickAt(e.clientX, e.clientY);
        if (code && onMarkerClickRef.current) {
          // Marker click commits to the side panel (existing behaviour)
          const ex = EXCHANGES_53.find((x) => x.code === code);
          onMarkerClickRef.current(ex);
          audioState.play('click');
          return;
        }
        // R6 P4 — empty space → start drag-to-rotate
        isDragging = true;
        returnAnim = null; // cancel any in-progress return
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartRotY = dotsGroup.rotation.y;
        dragStartRotX = dotsGroup.rotation.x;
        // R10 D — fire onDragStart so the affordance hint can dismiss
        if (onDragStartRef.current) onDragStartRef.current();
        renderer.domElement.setAttribute('data-dragging', 'true');
        try { renderer.domElement.setPointerCapture(e.pointerId); } catch (err) {}
        // Clear any active hover preview during drag
        if (hoveredCode) {
          const prev = markerMatsByCode.get(hoveredCode);
          if (prev) prev.target = 0;
          hoveredCode = null;
          if (onMarkerHoverRef.current) onMarkerHoverRef.current(null, 0, 0);
        }
      }
      function onPointerDrag(e) {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        // 1px = ~0.5deg of rotation; tune to feel like a small physical globe
        const ROT_PER_PX = 0.005;
        const newRotY = dragStartRotY + dx * ROT_PER_PX;
        const newRotX = Math.max(-1.2, Math.min(1.2, dragStartRotX + dy * ROT_PER_PX));
        [sphere, haze, clouds, wire, dotsGroup].forEach((m) => {
          m.rotation.y = newRotY;
          m.rotation.x = newRotX;
        });
      }
      function onPointerUp(e) {
        if (!isDragging) return;
        isDragging = false;
        lastInteractionTs = performance.now();
        renderer.domElement.setAttribute('data-dragging', 'false');
        try { renderer.domElement.releasePointerCapture(e.pointerId); } catch (err) {}
      }
      function onPointerLeave() {
        // R6 P3 — clear hover state when cursor leaves the canvas
        if (hoveredCode) {
          const prev = markerMatsByCode.get(hoveredCode);
          if (prev) prev.target = 0;
          hoveredCode = null;
          renderer.domElement.setAttribute('data-hovering', 'false');
          if (onMarkerHoverRef.current) onMarkerHoverRef.current(null, 0, 0);
        }
        // Don't end drag here — pointer capture handles continuity outside the canvas
      }
      renderer.domElement.addEventListener('pointermove', onPointerMove, { passive: true });
      renderer.domElement.addEventListener('pointermove', onPointerDrag, { passive: true });
      renderer.domElement.addEventListener('pointerdown', onPointerDown);
      renderer.domElement.addEventListener('pointerup', onPointerUp);
      renderer.domElement.addEventListener('pointercancel', onPointerUp);
      renderer.domElement.addEventListener('pointerleave', onPointerLeave);

      // Orbit particles — 60 small dots in a slow ring around the planet (D4)
      const orbitGroup = new THREE.Group();
      const orbitParticles = [];
      const orbitCount = perfMode ? 30 : 60;
      for (let i = 0; i < orbitCount; i++) {
        const angle = (i / orbitCount) * Math.PI * 2;
        const tilt = (Math.random() - 0.5) * 0.6;
        const r = 110 + Math.random() * 12;
        const orbitMat = new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0.45 + Math.random() * 0.35 });
        const orbitMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 4, 4), orbitMat);
        orbitParticles.push({ angle, tilt, r, mesh: orbitMesh, mat: orbitMat });
        orbitGroup.add(orbitMesh);
      }
      scene.add(orbitGroup);

      // Initial rotation — favor NA + Europe in default view
      const initialRotX = -0.25;
      const initialRotY = -1.2;
      [sphere, haze, clouds, wire, dotsGroup].forEach((m) => {
        m.rotation.x = initialRotX;
        m.rotation.y = initialRotY;
      });

      // R6 P4 — drag-to-rotate state (lifted up so animate loop can read it).
      // Pointer-events handle both mouse + touch on modern browsers; no separate
      // touch handlers needed. dragStartXY captures pointer at down; deltas
      // translate to rotation deltas. Auto-rotation pauses for 5s after release,
      // then smoothly returns to (initialRotX, initialRotY) over 1.5s.
      // (isDragging declared up here so onPointerMove above can short-circuit
      // its hover handling during drag.)

      // Flying arcs (audit 3.4) — animated great-circle paths between exchange pairs
      const arcGroup = new THREE.Group();
      // Arcs sit OUTSIDE the rotating dots group so they remain in view long
      // enough for the user to read the headline overlay. Position is computed
      // including the current dotsGroup rotation at fire time.
      scene.add(arcGroup);

      const ARC_EVENTS = [
        { fromCode: 'TSE-TYO', toCode: 'NYSE',     headline: '日経平均、連日の高値更新',                       trans: 'Nikkei extends record high, second day',   lang: 'JP' },
        { fromCode: 'B3',      toCode: 'LSE',      headline: 'Petrobras anuncia recorde de exportação',         trans: 'Petrobras announces record oil export',   lang: 'PT' },
        { fromCode: 'XETRA',   toCode: 'HKEX',     headline: 'ASML sichert TSMC-Großauftrag',                  trans: 'ASML secures major TSMC order',           lang: 'DE' },
        { fromCode: 'NYSE',    toCode: 'TSE-TYO',  headline: 'Fed minutes signal patience on cuts',             trans: '',                                        lang: 'EN' },
        { fromCode: 'EURONEXT',toCode: 'BMV',      headline: 'LVMH crece 9,4% en mercados latinoamericanos',    trans: 'LVMH grows 9.4% in Latin American markets', lang: 'ES' },
        { fromCode: 'HKEX',    toCode: 'EURONEXT', headline: 'Tencent dépasse les attentes du Q1',              trans: 'Tencent beats Q1 expectations',           lang: 'FR' },
      ];

      function getExchangePos(code) {
        const ex = EXCHANGES_53.find((e) => e.code === code);
        if (!ex) return null;
        return latLngToVec3(ex.lat, ex.lng, 86);
      }

      function fireArc(eventIdx) {
        const ev = ARC_EVENTS[eventIdx % ARC_EVENTS.length];
        const a = getExchangePos(ev.fromCode);
        const b = getExchangePos(ev.toCode);
        if (!a || !b) return;
        // Apply current dotsGroup rotation so arc starts/ends at the visible
        // marker positions (the arc itself doesn't rotate with the planet).
        const m4 = new THREE.Matrix4();
        m4.makeRotationY(dotsGroup.rotation.y);
        m4.multiply(new THREE.Matrix4().makeRotationX(dotsGroup.rotation.x));
        const aRot = a.clone().applyMatrix4(m4);
        const bRot = b.clone().applyMatrix4(m4);

        // Great-circle approximation via QuadraticBezierCurve3 with elevated control point
        const mid = aRot.clone().add(bRot).multiplyScalar(0.5);
        const dist = aRot.distanceTo(bRot);
        const elev = Math.min(60, dist * 0.45);
        const ctrl = mid.clone().normalize().multiplyScalar(86 + elev);
        const curve = new THREE.QuadraticBezierCurve3(aRot, ctrl, bRot);
        const points = curve.getPoints(64);
        const geom = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({ color: accentColor, transparent: true, opacity: 0.95 });
        const line = new THREE.Line(geom, mat);
        line.geometry.setDrawRange(0, 0);
        arcGroup.add(line);

        // Bloom at destination — sphere that scales + fades after arc lands
        const bloomMat = new THREE.MeshBasicMaterial({ color: accentColor, transparent: true, opacity: 0 });
        const bloom = new THREE.Mesh(new THREE.SphereGeometry(2.5, 16, 16), bloomMat);
        bloom.position.copy(bRot);
        arcGroup.add(bloom);

        // Animate draw range over 1500ms; then bloom; then fade arc + bloom.
        const arcStart = performance.now();
        const arcDur = 1500;
        const fadeDur = 1500;
        const totalDur = arcDur + 4500 + fadeDur;
        let bloomFired = false;

        function tick() {
          const t = performance.now() - arcStart;
          if (t < arcDur) {
            const p = t / arcDur;
            // ease-out-quart
            const eased = 1 - Math.pow(1 - p, 4);
            line.geometry.setDrawRange(0, Math.floor(64 * eased) + 1);
          } else if (t < arcDur + 800) {
            // Bloom phase
            line.geometry.setDrawRange(0, 65);
            if (!bloomFired) {
              bloomFired = true;
              try { onArcLandRef.current && onArcLandRef.current(ev); } catch (e) {}
            }
            const bp = (t - arcDur) / 800;
            bloomMat.opacity = (1 - bp) * 0.85;
            bloom.scale.setScalar(1 + bp * 1.8);
          } else if (t < totalDur - fadeDur) {
            // Hold
            mat.opacity = 0.92;
            bloomMat.opacity = 0;
          } else if (t < totalDur) {
            // Fade out
            const fp = (t - (totalDur - fadeDur)) / fadeDur;
            mat.opacity = 0.92 * (1 - fp);
          } else {
            // Cleanup
            arcGroup.remove(line);
            arcGroup.remove(bloom);
            geom.dispose(); mat.dispose(); bloomMat.dispose();
            bloom.geometry.dispose();
            return;
          }
          requestAnimationFrame(tick);
        }
        tick();
      }

      // R11.2 Fix 1 — auto-arc loop removed (was setInterval(8000) + 1200ms kickoff).
      // Both the Three.js arc visual and the popup card were wired to this fire chain;
      // banker feedback flagged the popup as distracting from the globe itself.
      // fireArc function kept defined for trivial revival later if needed.

      // Round 3 P3 — slowed rotation to feel meditative (~145s full revolution)
      // Was 0.0025 (≈8°/s); now 0.0008 (≈2.5°/s).
      const speed = perfMode ? 0.0006 : 0.0008;
      const cloudSpeed = speed * 0.4; // clouds drift slower than planet
      let rafId = null;
      // Round 4 P1 — marker hover-color tween: lerp phase toward target each frame.
      // 200ms total transition at 60fps ≈ 12 frames → step ≈ 0.083 per frame.
      const HOVER_TWEEN_STEP = 0.083;
      let lastFrameTs = performance.now();
      const animate = () => {
        const tNow = performance.now() * 0.001;
        const ts = performance.now();
        const dt = ts - lastFrameTs;
        lastFrameTs = ts;
        // R6 P4 — rotation policy:
        // - Dragging: skip auto-rotation (user controls)
        // - Within 5s of drag-end: pause (idle window)
        // - 5s+ since drag-end and rotation differs from initial: lerp back over 1.5s
        // - Otherwise (or after return completes): auto-rotate at `speed`
        const sinceInteraction = lastInteractionTs ? (ts - lastInteractionTs) : Infinity;
        const PAUSE_MS = 5000;
        const RETURN_MS = 1500;
        if (isDragging) {
          // user controls; do nothing else this frame
        } else if (sinceInteraction < PAUSE_MS) {
          // idle window — no rotation
          clouds.rotation.y += cloudSpeed * 0.4; // very subtle cloud drift only
        } else if (lastInteractionTs && (sinceInteraction - PAUSE_MS) < RETURN_MS) {
          // Smooth lerp back to (initialRotX, initialRotY) over RETURN_MS
          if (!returnAnim) {
            // Choose shortest angular path for Y rotation (so we don't spin the long way)
            let toY = initialRotY;
            const curY = dotsGroup.rotation.y;
            const TWO_PI = Math.PI * 2;
            const diff = ((toY - curY) % TWO_PI + TWO_PI) % TWO_PI;
            toY = curY + (diff > Math.PI ? diff - TWO_PI : diff);
            returnAnim = {
              startTs: ts,
              fromX: dotsGroup.rotation.x,
              fromY: dotsGroup.rotation.y,
              toX: initialRotX,
              toY,
            };
          }
          const t = Math.min(1, (sinceInteraction - PAUSE_MS) / RETURN_MS);
          // ease-in-out cubic
          const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
          const newX = returnAnim.fromX + (returnAnim.toX - returnAnim.fromX) * eased;
          const newY = returnAnim.fromY + (returnAnim.toY - returnAnim.fromY) * eased;
          [sphere, haze, wire, dotsGroup].forEach((m) => {
            m.rotation.x = newX;
            m.rotation.y = newY;
          });
          clouds.rotation.x = newX;
          clouds.rotation.y = newY;
          if (t >= 1) {
            // Return complete — clear interaction marker, reset to initial Y baseline
            // so subsequent auto-rotation continues from the natural angle.
            const TWO_PI = Math.PI * 2;
            [sphere, haze, clouds, wire, dotsGroup].forEach((m) => {
              m.rotation.y = ((m.rotation.y % TWO_PI) + TWO_PI) % TWO_PI;
            });
            lastInteractionTs = 0;
            returnAnim = null;
          }
        } else {
          // Auto-rotate (default state, R3 P3 slowed to 0.0008)
          sphere.rotation.y += speed;
          haze.rotation.y += speed;
          wire.rotation.y += speed;
          dotsGroup.rotation.y += speed;
          clouds.rotation.y += cloudSpeed;
        }
        // Orbit particles spin around the planet
        orbitParticles.forEach((p, i) => {
          const a = p.angle + tNow * 0.15;
          const x = Math.cos(a) * p.r * Math.cos(p.tilt);
          const y = Math.sin(p.tilt) * p.r;
          const z = Math.sin(a) * p.r * Math.cos(p.tilt);
          p.mesh.position.set(x, y, z);
        });
        // Airplane-blink animation
        blinkMaterials.forEach((b) => {
          b.mat.opacity = (Math.sin(tNow * 2.5 + b.phase) + 1) * 0.5 * 0.55;
        });
        // Round 4 P1 — tween marker hover colors toward target (200ms ease)
        const stepSize = HOVER_TWEEN_STEP * (dt / 16.67); // normalise to 60fps
        // Read live colors from stateRef so brand-switch is reflected in tweens
        const liveAccent = (stateRef.current && stateRef.current.accentColor) || accentColor;
        const liveHover = (stateRef.current && stateRef.current.hoverColor) || hoverColor;
        markerMatsByCode.forEach((m) => {
          // Always update unhovered markers to current accent (handles brand switch)
          if (m.phase === 0 && m.target === 0) {
            if (!m.dotMat.color.equals(liveAccent)) {
              m.dotMat.color.copy(liveAccent);
              m.haloMat.color.copy(liveAccent);
            }
            return;
          }
          if (m.phase < m.target) m.phase = Math.min(m.target, m.phase + stepSize);
          else if (m.phase > m.target) m.phase = Math.max(m.target, m.phase - stepSize);
          // Lerp dot+halo color between accent (phase=0) and hover (phase=1)
          m.dotMat.color.copy(liveAccent).lerp(liveHover, m.phase);
          m.haloMat.color.copy(liveAccent).lerp(liveHover, m.phase);
        });
        renderer.render(scene, camera);
        rafId = requestAnimationFrame(animate);
      };
      animate();

      // Resize handling
      const onResize = () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        if (w === 0 || h === 0) return;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      };
      window.addEventListener('resize', onResize);

      stateRef.current = { renderer, scene, dotsGroup, accentColor, hoverColor, hazeMat, blinkMaterials, orbitParticles };

      return () => {
        if (rafId) cancelAnimationFrame(rafId);
        // R11.2 Fix 1 — arcInterval / arcKickoff removed above; cleanup no-op
        window.removeEventListener('resize', onResize);
        renderer.domElement.removeEventListener('pointermove', onPointerMove);
        renderer.domElement.removeEventListener('pointermove', onPointerDrag);
        renderer.domElement.removeEventListener('pointerdown', onPointerDown);
        renderer.domElement.removeEventListener('pointerup', onPointerUp);
        renderer.domElement.removeEventListener('pointercancel', onPointerUp);
        renderer.domElement.removeEventListener('pointerleave', onPointerLeave);
        renderer.dispose();
        sphereGeom.dispose(); sphereMat.dispose();
        if (worldTex) worldTex.dispose();
        wireGeom.dispose(); wireMat.dispose();
        hazeGeom.dispose(); hazeMat.dispose();
        cloudGeom.dispose(); cloudMat.dispose();
        cloudTex.dispose();
        dotsGroup.children.forEach((m) => {
          if (m.geometry) m.geometry.dispose();
          if (m.material) m.material.dispose();
        });
        orbitParticles.forEach((p) => {
          p.mesh.geometry.dispose();
          p.mat.dispose();
        });
        if (renderer.domElement && renderer.domElement.parentNode === container) {
          container.removeChild(renderer.domElement);
        }
      };
    // eslint-disable-next-line react-hooks/exhaustive-deps
    }, []); // mount once; brand color updates via separate effect

    // Update dot colors when accent changes (brand switch)
    useEffect(() => {
      const s = stateRef.current;
      if (!s || typeof THREE === 'undefined') return;
      const newColor = new THREE.Color(accent || '#6AAE22');
      s.accentColor = newColor;
      // Round 4 P1 — also refresh the lighter --accent-2 hover color so the
      // hover-color tween stays in the new brand family
      try {
        const v = getComputedStyle(document.documentElement).getPropertyValue('--accent-2').trim();
        if (v) s.hoverColor = new THREE.Color(v);
      } catch (e) {}
      s.dotsGroup.children.forEach((m) => {
        if (m.material && m.material.color) m.material.color.copy(newColor);
      });
      if (s.hazeMat) s.hazeMat.color.copy(newColor);
      s.orbitParticles.forEach((p) => p.mat.color.copy(newColor));
    }, [accent]);

    return <div ref={containerRef} className="scale-globe-canvas" />;
  }

  // ============================================================================
  // ScaleScene — Beat 3 main. "You operate everywhere your users do."
  // Audit upgrades: 4.1 scale tower, D2 stat countUps, 3.4+E3+D4 globe upgrades,
  // A3 native-language headline on arc landing.
  // ============================================================================
  // Map ARC_EVENTS lang code → arc-card flag code + display label
  const ARC_LANG_META = {
    JP: { flag: 'JP', name: 'Japanese' },
    PT: { flag: 'BR', name: 'Portuguese' },
    DE: { flag: 'DE', name: 'German' },
    EN: { flag: 'US', name: 'English' },
    ES: { flag: 'ES', name: 'Spanish' },
    FR: { flag: 'FR', name: 'French' },
  };

  // R10 D — drag-to-rotate affordance hint: bottom-right pill on the globe.
  // Auto-dismisses after 8s OR on first drag (parent passes onDismiss).
  function GlobeDragHint({ onDismiss }) {
    useEffect(() => {
      const t = setTimeout(() => { if (onDismiss) onDismiss(); }, 8000);
      return () => clearTimeout(t);
    }, [onDismiss]);
    return (
      <div className="globe-drag-hint" role="note" aria-label="Globe drag hint">
        <span className="globe-drag-hint-icon" aria-hidden="true">↻</span>
        <span className="globe-drag-hint-text">Drag to rotate</span>
      </div>
    );
  }

  function ScaleScene({ brandSlug, brandConfig, onContinue, hintDismissed, onDismissHint, dragHintDismissed, onDismissDragHint }) {
    const [accent, setAccent] = useState(() => {
      try { return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6AAE22'; }
      catch (e) { return '#6AAE22'; }
    });
    useEffect(() => {
      try {
        const newAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        if (newAccent) setAccent(newAccent);
      } catch (e) { /* no-op */ }
    }, [brandSlug]);

    const display = (brandConfig && brandConfig.branding && brandConfig.branding.shortName)
      ? brandConfig.branding.shortName
      : (BRAND_DISPLAY_DEFAULTS[brandSlug] || { shortName: 'this client' }).shortName;

    // A3 — current arc event drives the headline overlay
    const [currentArc, setCurrentArc] = useState(null);
    const handleArcLand = useCallback((ev) => { setCurrentArc({ ...ev, key: Date.now() }); }, []);

    // R2 3.3 click-to-open side panel · R3 P3 removed tooltip · R6 P3 re-add transient hover preview
    const [openExchange, setOpenExchange] = useState(null);   // exchange code or null
    const [hoverPreview, setHoverPreview] = useState(null);    // {ex, x, y} or null
    const handleMarkerClick = useCallback((ex) => {

  // ============================================================================
  // GenInset (E4) — token-by-token script generation animation
  // Types out the eToro pinned final script (or fallback) at ~12 chars/sec.
  // ============================================================================
  function GenInset({ active, text, onPlayTone }) {
    const [shown, setShown] = useState(0);
    useEffect(() => {
      if (!active || !text) { setShown(0); return; }
      let cancelled = false;
      let lastSoundIdx = -1;
      const charPerMs = 12 / 1000;
      const start = performance.now();
      const tick = () => {
        if (cancelled) return;
        const t = performance.now() - start;
        const next = Math.min(text.length, Math.floor(t * charPerMs));
        setShown(next);
        // typewriter sound on every ~5th char
        if (onPlayTone && next > lastSoundIdx + 4) {
          lastSoundIdx = next;
          onPlayTone();
        }
        if (next < text.length) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
      return () => { cancelled = true; };
    }, [active, text, onPlayTone]);
    return (
      <div className="gen-inset">
        <div className="gen-inset-head">
          <span className="gen-inset-head-dot" />
          AI is writing the script now · Sonnet 4.6
        </div>
        <div className="gen-inset-text">
          {text ? text.slice(0, shown) : ''}
          {active && shown < (text?.length || 0) && <span className="gen-cursor" aria-hidden="true" />}
        </div>
      </div>
    );
  }

  // Persist Beat 4 view mode across page reloads + brand switches.
  const SAFETY_VIEW_KEY = 'stv-beat4-view-mode';
  function readSafetyViewMode() {
    try {
      const v = localStorage.getItem(SAFETY_VIEW_KEY);
      return v === 'dashboard' ? 'dashboard' : 'journey';
    } catch (e) { return 'journey'; }
  }
  function writeSafetyViewMode(mode) {
    try { localStorage.setItem(SAFETY_VIEW_KEY, mode); } catch (e) {}
  }

  function StationJourney() {
    // Active station index. Auto-advances every ~5s; clicking jumps.
    const [activeIdx, setActiveIdx] = useState(0);
    const [completed, setCompleted] = useState(() => new Set());
    const [runId, setRunId] = useState(0);
    const reduceMotion = typeof window !== 'undefined' && window.matchMedia
      && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    useEffect(() => {
      setActiveIdx(0);
      setCompleted(new Set());
      if (reduceMotion) {
        setActiveIdx(SAFETY_STATIONS.length - 1);
        setCompleted(new Set([0, 1, 2, 3, 4]));
        return;
      }
      const STEP = 5000;
      const timers = [];
      SAFETY_STATIONS.forEach((_, i) => {
        if (i === 0) return;
        timers.push(setTimeout(() => {
          setActiveIdx(i);
          setCompleted((prev) => {
            const next = new Set(prev);
            next.add(i - 1);
            return next;
          });
          audioState.play('gatePass');
        }, i * STEP));
      });
      timers.push(setTimeout(() => {
        setCompleted((prev) => {
          const next = new Set(prev);
          next.add(SAFETY_STATIONS.length - 1);
          return next;
        });
      }, SAFETY_STATIONS.length * STEP));
      return () => timers.forEach(clearTimeout);
    }, [runId, reduceMotion]);

    const jump = useCallback((i) => {
      setActiveIdx(i);
      setCompleted((prev) => {
        const next = new Set(prev);
        for (let k = 0; k < i; k++) next.add(k);
        return next;
      });
      audioState.play('click');
    }, []);

    return (
      <div className="station-journey" role="list" aria-label="Five-station safety-net journey">
        {SAFETY_STATIONS.map((s, i) => {
          const isActive = i === activeIdx;
          const isCompleted = completed.has(i);
          const Illust = s.Illust;
          return (
            <article
              key={s.key}
              className="station"
              data-active={isActive}
              data-completed={isCompleted}
              role="listitem"
              tabIndex="0"
              onClick={() => jump(i)}
              onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); jump(i); } }}
              aria-label={`Station ${s.n} of ${SAFETY_STATIONS.length}`}
              style={{ cursor: 'pointer' }}
            >
              <div className="station-medallion">
                <div className="station-num" aria-hidden="true">{s.n}</div>
              </div>
              <div className="station-content">
                <div className="station-text">
                  <div className={`station-eyebrow ${isActive ? 'station-eyebrow-active' : ''}`}>{s.eyebrow}</div>
                  <h3 className="station-headline">{s.headline}</h3>
                  <p className="station-body">{s.body}</p>
                  <div className="station-meta">
                    {s.meta.map((m, k) => (
                      <span className="station-meta-pill" key={k}>{m}</span>
                    ))}
                  </div>
                </div>
                <div className="station-illust">
                  {/* R5 B2 — unifying medallion frame around each station illustration */}
                  <div className="station-illust-medallion" aria-hidden="true">
                    <svg className="station-medallion-frame" viewBox="0 0 120 120" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                      {/* Outer ring */}
                      <circle cx="60" cy="60" r="56" fill="none" stroke="currentColor" strokeWidth="0.8" opacity="0.65"/>
                      {/* Inner ring */}
                      <circle cx="60" cy="60" r="48" fill="none" stroke="currentColor" strokeWidth="0.5" opacity="0.5" strokeDasharray="2 3"/>
                      {/* 8-petal scallop edge marks (William Morris register) */}
                      {Array.from({ length: 16 }).map((_, k) => {
                        const a = (k / 16) * Math.PI * 2 - Math.PI / 2;
                        const inner = 56;
                        const outer = 60;
                        return (
                          <line key={k}
                            x1={60 + Math.cos(a) * inner}
                            y1={60 + Math.sin(a) * inner}
                            x2={60 + Math.cos(a) * outer}
                            y2={60 + Math.sin(a) * outer}
                            stroke="currentColor"
                            strokeWidth="0.7"
                            opacity="0.55"
                          />
                        );
                      })}
                      {/* Top + bottom keystone marks (small filled triangles) */}
                      <path d="M 60 0 L 56 6 L 64 6 Z" fill="currentColor" opacity="0.7"/>
                      <path d="M 60 120 L 56 114 L 64 114 Z" fill="currentColor" opacity="0.7"/>
                      {/* Roman numeral indicating station number */}
                      <text x="60" y="14" textAnchor="middle" fontSize="6.5" fontFamily="serif" fill="currentColor" opacity="0.7" letterSpacing="1">
                        {['I','II','III','IV','V'][s.n - 1]}
                      </text>
                    </svg>
                    <div className="station-medallion-inner">
                      <Illust />
                    </div>
                  </div>
                </div>
              </div>
            </article>
          );
        })}

        <div className="station-journey-foot">
          <div className="station-progress-dots" role="presentation">
            {SAFETY_STATIONS.map((_, i) => (
              <span
                key={i}
                className="station-progress-dot"
                data-active={i === activeIdx}
                data-completed={completed.has(i) && i !== activeIdx}

            ))}

          <button
            onClick={() => setRunId((r) => r + 1)}
            style={{
              background: 'transparent', border: '1px solid var(--border)',
              borderRadius: 999, color: 'var(--text-muted)', padding: '4px 12px', cursor: 'pointer',
              fontSize: 9, letterSpacing: '0.18em', textTransform: 'uppercase', display: 'inline-flex',
              alignItems: 'center', gap: 6, fontFamily: 'JetBrains Mono, monospace'
            }}
            title="Restart the safety-net journey"
          >
            <ScriptRefreshIcon /> Replay
          </button>
        </div>
      </div>
    );
  }

            573 production tests
            <button

            >
              <span className="safety-view-toggle-dot" aria-hidden="true" />

          </div>
          <h2 className="safety-headline">

        </div>

        {/* Round 2 Phase B4 — default 5-station journey replaces dense dashboard */}
        {!isDashboard && <StationJourney />}

        {isDashboard && (<>

        {/* 4.2 — DUAL-REVEAL FULL-WIDTH HERO (Quality + Integrity numerals with bars + deltas) — dashboard mode only */}
        <div className="dual-reveal-hero">
          <div className="dual-reveal-col">
            <div className="dual-reveal-eyebrow">Quality Score</div>
            <div className={`dual-reveal-number ${ambient ? 'is-shimmer' : ''}`} data-metric="quality">
              {phase >= 4 ? <CountUp to={95} duration={1400} delay={0} /> : '—'}
            </div>
            <div className="dual-reveal-track">
              <div className="dual-reveal-track-fill" style={{ width: phase >= 4 ? '86%' : '0%', color: 'var(--accent)' }} />

            </div>
            {phase >= 4 && (

                <strong>+60</strong> over the line · /110

          <div className="dual-reveal-col">

        {/* LEFT — Live thought stream + decision tree + token gen inset */}

            <div className="safety-card-eyebrow">
              Live thought stream

                  borderRadius: 4, color: 'var(--text-muted)', padding: '2px 8px', cursor: 'pointer',
                  fontSize: 9, letterSpacing: '0.16em', textTransform: 'uppercase', display: 'inline-flex',
                  alignItems: 'center', gap: 4

                title="Replay the safety-net cinematic"

                <ScriptRefreshIcon /> Re-run

            <ThoughtStream rows={THOUGHT_STREAM_SCRIPT.slice(0, thoughtIdx)} />
            {/* E4 — token-by-token script generation appears at SCRIPT phase */}

          </div>
          <div className="safety-card">
            <div className="safety-card-eyebrow">
              Decision tree
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              {treeIdx + 1} of 8 nodes
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              confidence per step
            </div>
            <DecisionTree activeIdx={treeIdx} />
          </div>
        </div>

        {/* RIGHT — Integrity gates + hash chain */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
          <div className="safety-card">
            <div className="safety-card-eyebrow">
              Integrity gates
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              L1 regex
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              L2 semantic
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              L3 holistic
            </div>
            <IntegrityGates phase={phase} />
          </div>
          <div className="safety-card">
            <div className="safety-card-eyebrow">
              Audit chain
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              SHA-256
              <span className="safety-card-eyebrow-dot" aria-hidden="true" />
              every script signed
            </div>
            <HashChainVis phase={phase} />
          </div>
        </div>

        </>)}

        {/* R10 A — "When something is wrong" panel: pre-empts the legal team's first

        <div className="when-wrong">

  // ============================================================================
  // Sparkline (audit 4.7) — small inline 30-day-ish sparkline
  // ============================================================================
  function Sparkline({ data, width, height }) {
    const w = width || 100;
    const h = height || 18;
    const pad = 2;
    if (!data || data.length === 0) return null;
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;
    const stepX = (w - pad * 2) / (data.length - 1);
    const points = data.map((v, i) => {
      const x = pad + i * stepX;
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return [x, y];
    });
    const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
    const last = points[points.length - 1];
    return (
      <svg className="ops-cell-sparkline" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" aria-hidden="true">
        <path d={path} />
        <circle cx={last[0]} cy={last[1]} r="1.6" />
      </svg>
    );
  }
  // Pre-generated sparkline data per ops cell — looks "trendy upward" for most
  function genSparkData(seed, len, baseDir) {
    const arr = [];
    let v = 50 + (seed * 7) % 30;
    for (let i = 0; i < len; i++) {
      v += (Math.sin(i * 0.5 + seed) * 4) + (Math.random() - 0.45) * 6 + (baseDir || 0) * 0.8;
      arr.push(Math.max(10, Math.min(95, v)));
    }
    return arr;
  }

  // ============================================================================

  // ----------------------------------------------------------------------------

  // values as a smooth gradient-filled area + 4 weekly axis labels below.
  // ============================================================================
  function AreaChart({ data, weeks, height }) {
    const h = height || 56;
    const w = 280;
    const pad = 4;
    if (!data || data.length === 0) return null;
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = (max - min) || 1;
    const stepX = (w - pad * 2) / (data.length - 1);
    const points = data.map((v, i) => {
      const x = pad + i * stepX;
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return [x, y];
    });
    const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
    const areaPath = `${linePath} L ${points[points.length - 1][0]} ${h} L ${points[0][0]} ${h} Z`;
    const last = points[points.length - 1];
    return (
      <div className="ops-area">
        <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" aria-hidden="true" className="ops-area-svg">
          <defs>
            <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.40" />
              <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.02" />
            </linearGradient>
          </defs>
          <path d={areaPath} fill="url(#areaGradient)" />
          <path d={linePath} fill="none" stroke="var(--accent)" strokeWidth="1.4" opacity="0.95" />
          <circle cx={last[0]} cy={last[1]} r="2.2" fill="var(--accent)" />
        </svg>
        {weeks && (
          <div className="ops-area-axis">
            {weeks.map((w, i) => (

          </div>

    );

  // ============================================================================
  // App — top-level state machine
  // ============================================================================
  function App() {
    // Round 2 Phase B5 — `?beat=N` URL param (1-indexed) auto-advances on mount.
    // Used by pipeline-template return CTA to land back on Beat 5.
    const initialBeatFromUrl = (() => {
      try {
        const param = new URLSearchParams(location.search).get('beat');
        const n = parseInt(param, 10);
        if (Number.isFinite(n) && n >= 1 && n <= BEAT_ORDER.length) {
          return BEAT_ORDER[n - 1];
        }
      } catch (e) {}
      return null;
    })();
    const [booted, setBooted] = useState(() => initialBeatFromUrl !== null);
    const [activeBeat, setActiveBeat] = useState(initialBeatFromUrl || BEATS.HOOK);
    const [theme, setTheme] = useState(() => {
      try { return document.documentElement.dataset.theme || 'light'; }
      catch (e) { return 'light'; }
    });
    const [brandSlug, setBrandSlug] = useState(() => {
      try {
        const raw = (new URLSearchParams(location.search).get('client') || '').toLowerCase();
        const resolved = SLUG_ALIASES[raw] || raw;
        return KNOWN_SLUGS.includes(resolved) ? resolved : DEFAULT_SLUG;
      } catch (e) { return DEFAULT_SLUG; }
    });
    // R8 C4 — brand lock: when ?client= is in URL with a known slug, hide pills
    // + disable 1-N keyboard switching. R11: aliases ('citibank' → 'citi') count as locked.
    // Set ONCE on mount; not affected by history.replaceState which keeps URL synced.
    const isBrandLocked = useRef((() => {
      try {
        const raw = (new URLSearchParams(location.search).get('client') || '').toLowerCase();
        const resolved = SLUG_ALIASES[raw] || raw;
        return KNOWN_SLUGS.includes(resolved);
      } catch (e) { return false; }
    })()).current;
    const [brandConfig, setBrandConfig] = useState(null);
    const [audioOn, setAudioOn] = useState(false);
    const [brandFlashKey, setBrandFlashKey] = useState(0);
    const switchInFlight = useRef(false);
    // R8 C5 — globe click hint dismissal. Lifted to App so it survives beat
    // navigation within one session (state would reset if held in ScaleScene
    // because ScaleScene unmounts when leaving Beat 3). Page reload re-arms.
    const [globeHintDismissed, setGlobeHintDismissed] = useState(false);
    const dismissGlobeHint = useCallback(() => setGlobeHintDismissed(true), []);
    // R10 D — globe DRAG-to-rotate affordance hint, separate state (independent
    // dismissal). Same lifecycle pattern: dismisses on first drag OR after 8s.
    const [globeDragHintDismissed, setGlobeDragHintDismissed] = useState(false);
    const dismissGlobeDragHint = useCallback(() => setGlobeDragHintDismissed(true), []);

    // Trigger brand-flash overlay on every brand change (audit 1.4 + E2)
    useEffect(() => {
      if (brandFlashKey === 0) return; // skip first paint
      const el = document.getElementById('stv-brand-flash');
      if (!el) return;
      el.setAttribute('data-firing', 'false');
      // Force reflow so the animation re-fires
      void el.offsetWidth;
      el.setAttribute('data-firing', 'true');
      audioState.play('click');
    }, [brandFlashKey]);

    // Async config load on brandSlug change
    useEffect(() => {
      let cancelled = false;
      switchInFlight.current = true;
      loadBrandConfig(brandSlug)
        .then((cfg) => {
          if (cancelled) return;
          setBrandConfig(cfg);
          applyBrandVars(cfg);
          // Sync URL — stay shallow so back button works
          try {
            const u = new URL(location.href);
            if (brandSlug === DEFAULT_SLUG) u.searchParams.delete('client');
            else u.searchParams.set('client', brandSlug);
            history.replaceState({}, '', u.toString());
          } catch (e) { /* no-op */ }
        })
        .catch((err) => {
          if (cancelled) return;
          // Defensive fallback per B.4.G — keep current brand visually, surface a toast.
          console.error('[stv-unified] brand config load failed for', brandSlug, err);
          showToast(`Couldn't load ${BRAND_DISPLAY_DEFAULTS[brandSlug]?.shortName || brandSlug} config — staying on current.`);
          if (brandSlug !== DEFAULT_SLUG) {
            // Roll back to default if current load failed
            setBrandSlug(DEFAULT_SLUG);
          }
        })
        .finally(() => { switchInFlight.current = false; });
      return () => { cancelled = true; };
    }, [brandSlug]);

    // Theme persistence + meta theme-color sync
    useEffect(() => {
      try {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('stv-theme', theme);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#F4F0E8' : '#0A0B0F');
      } catch (e) { /* no-op */ }
    }, [theme]);

    // Body data-beat attribute drives per-beat orb-position overrides (audit C1)
    useEffect(() => {
      try { document.body.dataset.beat = activeBeat; } catch (e) { /* no-op */ }
    }, [activeBeat]);

    // R8 C7 — scroll-to-top on every beat change. Behaviour set by the caller
    // via scrollBehaviorRef (smooth for Continue/arrow-key navigation, instant
    // for pager-dot clicks). Initial mount also scrolls to top.
    const scrollBehaviorRef = useRef('smooth');
    useEffect(() => {
      try {
        window.scrollTo({ top: 0, behavior: scrollBehaviorRef.current });
      } catch (e) {
        try { window.scrollTo(0, 0); } catch (e2) { /* no-op */ }
      }
      // Reset to smooth as the default after each use; specific callers can
      // override before calling setActiveBeat.
      scrollBehaviorRef.current = 'smooth';
    }, [activeBeat]);

    // R5 D5 — Ambient sound layer per beat (only plays when audioState.enabled).
    // Beat 3 trading-floor murmur · Beat 4 booth tone · Beat 6 broadcast-on tone.
    useEffect(() => {
      if (!booted) return;
      if (activeBeat === BEATS.SCALE)        audioState.startAmbient('scale');
      else if (activeBeat === BEATS.SAFETY)  audioState.startAmbient('safety');
      else if (activeBeat === BEATS.OUTPUT)  audioState.startAmbient('output');
      else                                    audioState.stopAmbient();
    }, [activeBeat, booted]);

    // R5 C4 + D4 — Idle detection: after 8s of no interaction, set body[data-idle='true']
    // to enable: animated grain drift, idle-tint pulse, breath animation on .stv-breathe
    useEffect(() => {
      let idleTimer = null;
      const goActive = () => {
        document.body.removeAttribute('data-idle');
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          document.body.setAttribute('data-idle', 'true');
        }, 8000);
      };
      ['pointermove', 'pointerdown', 'keydown', 'wheel', 'touchstart'].forEach((ev) => {
        window.addEventListener(ev, goActive, { passive: true });
      });
      goActive();
      return () => {
        if (idleTimer) clearTimeout(idleTimer);
        ['pointermove', 'pointerdown', 'keydown', 'wheel', 'touchstart'].forEach((ev) => {
          window.removeEventListener(ev, goActive);
        });
        document.body.removeAttribute('data-idle');
      };
    }, []);

    // Mouse parallax for atmosphere orbs (audit C2). ±10px max.
    useEffect(() => {
      const onMove = (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;  // ±10px
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        document.documentElement.style.setProperty('--paraX', `${x.toFixed(1)}px`);
        document.documentElement.style.setProperty('--paraY', `${y.toFixed(1)}px`);
      };
      window.addEventListener('pointermove', onMove, { passive: true });
      return () => window.removeEventListener('pointermove', onMove);
    }, []);

    // Keyboard navigation
    useEffect(() => {
      const onKey = (e) => {
        if (!booted) return;
        // 1-7 → brand switch (works in any beat after Hook).
        // R8 C4 — disabled when brand is locked via ?client= URL param.
        // R11 — extended to 7 brands (added Citi).
        if (!isBrandLocked && activeBeat !== BEATS.HOOK && /^[1-7]$/.test(e.key)) {
          const idx = parseInt(e.key, 10) - 1;
          const slug = KNOWN_SLUGS[idx];
          if (slug && slug !== brandSlug) handleBrandSwitch(slug);
          return;
        }
        // ArrowRight / Enter / Space — advance through beats
        if (e.key === 'ArrowRight' || e.key === 'Enter' || e.key === ' ') {
          const i = BEAT_ORDER.indexOf(activeBeat);
          if (i >= 0 && i < BEAT_ORDER.length - 1) {
            e.preventDefault();
            setActiveBeat(BEAT_ORDER[i + 1]);
          }
        }
        // ArrowLeft — back
        if (e.key === 'ArrowLeft') {
          const i = BEAT_ORDER.indexOf(activeBeat);
          if (i > 0) {
            e.preventDefault();
            setActiveBeat(BEAT_ORDER[i - 1]);
          }
        }
        // Escape — return to Hook
        if (e.key === 'Escape') {
          if (activeBeat !== BEATS.HOOK) setActiveBeat(BEATS.HOOK);
        }
      };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [booted, activeBeat, brandSlug]);

    const handleBrandSwitch = useCallback((slug) => {
      if (slug === brandSlug) return;
      setBrandSlug(slug);
      setBrandFlashKey((k) => k + 1);
    }, [brandSlug]);

    const handleToggleTheme = useCallback(() => {
      setTheme((t) => t === 'light' ? 'dark' : 'light');
    }, []);

    const handleAudioToggle = useCallback(() => {
      setAudioOn((on) => {
        const next = !on;
        audioState.enabled = next;
        if (next) {
          // Init context on first toggle so user-gesture requirement is satisfied
          audioState.init();
          audioState.play('click');
          // R5 D5 — when re-enabling audio mid-beat, fire ambient for current beat
          if (activeBeat === BEATS.SCALE)        audioState.startAmbient('scale');
          else if (activeBeat === BEATS.SAFETY)  audioState.startAmbient('safety');
          else if (activeBeat === BEATS.OUTPUT)  audioState.startAmbient('output');
        } else {
          audioState.stopAmbient();
        }
        return next;
      });
    }, [activeBeat]);

    const goNext = useCallback(() => {
      const i = BEAT_ORDER.indexOf(activeBeat);
      if (i < BEAT_ORDER.length - 1) setActiveBeat(BEAT_ORDER[i + 1]);
    }, [activeBeat]);

    const goBack = useCallback(() => {
      const i = BEAT_ORDER.indexOf(activeBeat);
      if (i > 0) setActiveBeat(BEAT_ORDER[i - 1]);
    }, [activeBeat]);

    if (!booted) {
      return <BootSequence onComplete={() => setBooted(true)} />;
    }

    if (activeBeat === BEATS.HOOK) {
      return <HookScene onContinue={goNext} />;
    }

    // Post-Hook: app frame with persistent top bar
    let scene = null;
    if (activeBeat === BEATS.BRAND) {
      scene = (
        <BrandScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onBrandSwitch={handleBrandSwitch}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.SCALE) {
      scene = (
        <ScaleScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
          hintDismissed={globeHintDismissed}
          onDismissHint={dismissGlobeHint}
          dragHintDismissed={globeDragHintDismissed}
          onDismissDragHint={dismissGlobeDragHint}
        />
      );
    } else if (activeBeat === BEATS.SAFETY) {
      scene = (
        <SafetyScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.PIPELINE) {
      scene = (
        <PipelineScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.OUTPUT) {
      scene = (
        <OutputScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onContinue={goNext}
        />
      );
    } else if (activeBeat === BEATS.CLOSE) {
      scene = (
        <CloseScene
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onRestart={() => setActiveBeat(BEATS.HOOK)}
        />
      );
    } else {
      const beatLabels = {
      };
      const meta = beatLabels[activeBeat] || { id: '?', name: 'Unknown' };
      const i = BEAT_ORDER.indexOf(activeBeat);
      scene = (
        <PlaceholderScene
          beatId={meta.id}
          beatName={meta.name}
          onContinue={i < BEAT_ORDER.length - 1 ? goNext : null}
          onBack={i > 0 ? goBack : null}
        />
      );
    }

    return (
      <div className="stv-app-frame">
        <TopBar
          brandSlug={brandSlug}
          brandConfig={brandConfig}
          onBrandSwitch={handleBrandSwitch}
          theme={theme}
          onToggleTheme={handleToggleTheme}
          activeBeat={activeBeat}
          onAudioToggle={handleAudioToggle}
          audioOn={audioOn}
          brandLocked={isBrandLocked}
        />
        <main className="stv-app-content">{scene}</main>
        <BeatPager
          activeBeat={activeBeat}
          onJump={(b) => {
            // R8 C7 — pager dot clicks scroll instantly (user picked a specific
            // destination; smooth scroll over a long page would feel sluggish).
            scrollBehaviorRef.current = 'instant';
            setActiveBeat(b);
          }}
        />
      </div>
    );
  }

  // ============================================================================
  // BeatPager (audit 1.1) — fixed bottom-right beat navigator with 7 dots,
  // current-beat label, and arrow-key cue. Persists across all post-Hook beats.
  // ============================================================================
  function BeatPager({ activeBeat, onJump }) {
    const meta = BEAT_LABELS[activeBeat] || BEAT_LABELS.hook;
    const activeIdx = BEAT_ORDER.indexOf(activeBeat);
    return (
      <nav className="stv-pager" aria-label="Beat navigation">
        <div className="stv-pager-current">
          <span className="stv-pager-current-num">{meta.num} / 07</span>
          <span className="stv-pager-current-name">{meta.name}</span>
        </div>
        <div className="stv-pager-dots">
          {BEAT_ORDER.map((b, i) => (
            <button
              key={b}
              className="stv-pager-dot"
              data-active={b === activeBeat}
              data-visited={i < activeIdx}
              onClick={() => onJump(b)}
              aria-label={`Beat ${i + 1} · ${BEAT_LABELS[b].name}`}
              aria-current={b === activeBeat ? 'step' : undefined}
              title={BEAT_LABELS[b].name}
            />
          ))}
        </div>
        <div className="stv-pager-keys" aria-hidden="true">← →</div>
      </nav>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
