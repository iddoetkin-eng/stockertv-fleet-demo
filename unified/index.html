      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .academy-modal-icon {
      font-size: 44px;
      margin-bottom: 14px;
    }
    .academy-modal-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 10px;
      letter-spacing: -0.018em;
    }
    .academy-modal-body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text-muted);
      max-width: 38ch;
      margin: 0 auto;
    }

    /* Empty state pie icon styling */
    .ip-empty-icon { stroke: rgba(255,255,255,0.18); }

    /* R10 A — "When something is wrong" panel: pre-empts legal-team objections.
       4-cell grid (icon + title + text). Editorial register matches Beat 4 stations. */
    .when-wrong {
      grid-column: 1 / -1;
      margin: 1.25rem 0 0.5rem;
      padding: 1.5rem 1.5rem 1.4rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 20%, transparent) 0%, var(--border) 60%, color-mix(in srgb, var(--accent) 6%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .when-wrong-head {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .when-wrong-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.1rem, 2.2vw, 1.45rem);
      font-weight: 500;
      line-height: 1.2;
      color: var(--text-primary);
      margin: 0 0 0.4rem;
      letter-spacing: -0.018em;
    }
    .when-wrong-subline {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.4;
    }
    .when-wrong-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
    }
    @media (min-width: 720px) {
      .when-wrong-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem 1.25rem; }
    }
    @media (min-width: 1100px) {
      .when-wrong-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .when-wrong-cell {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 0.7rem;
      padding: 0.75rem 0.85rem;
      background: var(--surface-elevated);
      border-radius: 6px;
      border-left: 2px solid color-mix(in srgb, var(--accent) 60%, transparent);
      transition: border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .when-wrong-cell-icon {
      width: 24px; height: 24px;
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
      align-self: start;
    }
    .when-wrong-cell-icon svg { width: 100%; height: 100%; display: block; }
    .when-wrong-cell-body { min-width: 0; }
    .when-wrong-cell-title {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
      letter-spacing: -0.005em;
    }
    .when-wrong-cell-text {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
    }

    /* Trust badges */
    .trust-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    @media (min-width: 720px) {
      /* R10 B — 5 badges across (was 4) to fit the new "Built with" stack provenance */
      .trust-row { grid-template-columns: repeat(5, 1fr); gap: 0.6rem; }
    }
    .trust-badge {
      padding: 0.875rem 1rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, transparent) 0%, var(--border) 60%, color-mix(in srgb, var(--accent) 6%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      text-align: left;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    /* R5 C5 — halftone-dot pattern over trust-row backgrounds */
    .trust-badge::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(
        circle at center,
        color-mix(in srgb, var(--green) 22%, transparent) 0.7px,
        transparent 0.85px
      );
      background-size: 5px 5px;
      pointer-events: none;
      opacity: 0.45;
      mix-blend-mode: multiply;
    }
    :root[data-theme='dark'] .trust-badge::after {
      mix-blend-mode: screen;
      opacity: 0.35;
    }
    .trust-badge > * { position: relative; z-index: 1; }
    .trust-badge-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .trust-badge-label svg { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .trust-badge-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }
    /* R10 B — mono variant for the "Built with" stack list (vendor list reads as code) */
    .trust-badge-value--mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.04em;
      font-weight: 600;
      line-height: 1.45;
    }
    .trust-badge-foot {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    /* R10 B — TrustBadgeStack viz */
    .trust-viz--stack {
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
      width: 60px;
    }
    .trust-viz--stack svg { width: 100%; height: auto; display: block; }

    .safety-foot {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 1.5rem;
    }
    .safety-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin: 0 auto 1.5rem;
    }
    .safety-subline strong { color: var(--text-primary); font-weight: 500; }

    /* ============ BEAT 4 — 5-STATION JOURNEY (Round 2 Phase B4) ============ */
    /* Vertical narrative flow: Read → Verify → Apply Rules → Review → Sign.
       Default Beat-4 view. "Show all" toggle reveals legacy dashboard. */
    .safety-view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease, background 200ms ease;
      margin-left: 0.5rem;
    }
    /* Round 4 P4 — hide dashboard toggle on phone; journey-only is the mobile path */
    @media (max-width: 720px) {
      .safety-view-toggle { display: none; }
    }
    .safety-view-toggle:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      background: color-mix(in srgb, var(--accent) 6%, transparent);
    }
    .safety-view-toggle[data-active='true'] {
      border-color: var(--accent);
      color: var(--text-primary);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .safety-view-toggle-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
    }

    .station-journey {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 920px;
      margin: 0.5rem auto 1rem;
      width: 100%;
      position: relative;
    }
    /* Vertical progress rail running through left side of all stations */
    .station-journey::before {
      content: '';
      position: absolute;
      left: 38px;
      top: 60px;
      bottom: 60px;
      width: 2px;
      background: linear-gradient(180deg, var(--border) 0%, color-mix(in srgb, var(--accent) 30%, var(--border)) 50%, var(--border) 100%);
      z-index: 0;
    }
    @media (max-width: 720px) {
      .station-journey::before { display: none; }
    }

    .station {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      gap: 1.25rem;
      align-items: stretch;
      padding: 1.25rem 1.25rem 1.25rem 0;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, var(--border) 0%, var(--border) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 12px;
      position: relative;
      z-index: 1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1),
                  transform 380ms cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 380ms cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.55;
    }
    .station[data-active='true'] {
      opacity: 1;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent) 0%, var(--border) 60%, color-mix(in srgb, var(--green) 18%, transparent) 100%) border-box;
      box-shadow: 0 12px 36px color-mix(in srgb, var(--accent) 12%, transparent);
      transform: translateY(-1px);
    }
    .station[data-completed='true']:not([data-active='true']) {
      opacity: 0.85;
    }
    @media (max-width: 720px) {
      .station { grid-template-columns: 64px minmax(0, 1fr); gap: 0.75rem; padding: 1rem 1rem 1rem 0; }
    }

    /* Number medallion with ring and label */
    .station-medallion {
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 0.5rem;
      flex-shrink: 0;
    }
    @media (max-width: 720px) {
      .station-medallion { width: 64px; }
    }
    .station-num {
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      font-family: 'Fraunces', Georgia, serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-muted);
      transition: background 380ms cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 380ms cubic-bezier(0.4, 0, 0.2, 1),
                  color 380ms cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 2;
    }
    .station[data-active='true'] .station-num {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent);
    }
    .station[data-completed='true']:not([data-active='true']) .station-num {
      background: color-mix(in srgb, var(--green) 80%, transparent);
      border-color: transparent;
      color: #fff;
    }
    .station-tick {
      display: none;
      width: 44px; height: 44px;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0.5rem;
      border-radius: 50%;
      pointer-events: none;
    }
    .station[data-completed='true']:not([data-active='true']) .station-num { font-size: 0; }
    .station[data-completed='true']:not([data-active='true']) .station-num::before {
      content: '';
      width: 14px; height: 8px;
      border-left: 2.4px solid #fff;
      border-bottom: 2.4px solid #fff;
      transform: rotate(-45deg);
      margin-bottom: 4px;
    }

    .station-content {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 1rem;
      align-items: center;
    }
    @media (max-width: 720px) {
      .station-content { grid-template-columns: 1fr; }
    }
    .station-text { min-width: 0; }
    .station-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .station-eyebrow-active { color: var(--accent); }
    .station-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--text-primary);
      margin: 0 0 0.5rem;
      letter-spacing: -0.018em;
    }
    .station-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .station-body {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-muted);
      margin: 0 0 0.6rem;
      max-width: 56ch;
    }
    .station-body strong { color: var(--text-primary); font-weight: 500; }
    .station-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .station-meta-pill {
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-elevated);
    }
    .station[data-active='true'] .station-meta-pill {
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
      color: var(--text-primary);
    }
    .station-illust {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      color: var(--text-primary);
      opacity: 0.85;
      transition: opacity 380ms cubic-bezier(0.4, 0, 0.2, 1), transform 380ms cubic-bezier(0.4, 0, 0.2, 1);
      align-self: center;
      justify-self: end;
      position: relative;
    }
    /* R5 B2 — unifying medallion frame (William Morris ornament register) */
    .station-illust-medallion {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .station-medallion-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      color: var(--accent);
      opacity: 0.7;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1), opacity 380ms ease;
    }
    .station[data-active='true'] .station-medallion-frame { opacity: 1; }
    .station-medallion-inner {
      position: relative;
      width: 70%;
      height: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .station-medallion-inner > svg { width: 100%; height: 100%; display: block; }
    @media (max-width: 720px) {
      .station-illust { justify-self: start; opacity: 0.7; transform: scale(0.85); }
    }
    .station[data-active='true'] .station-illust { opacity: 1; transform: scale(1.05); }
    @media (max-width: 720px) {
      .station[data-active='true'] .station-illust { transform: scale(0.92); }
    }

    /* Replay button for journey mode */
    .station-journey-foot {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      align-items: center;
      margin-top: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .station-progress-dots {
      display: flex;
      gap: 0.45rem;
      align-items: center;
    }
    .station-progress-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 300ms ease, transform 300ms ease;
    }
    .station-progress-dot[data-active='true'] {
      background: var(--accent);
      transform: scale(1.4);
    }
    .station-progress-dot[data-completed='true'] { background: var(--green); }

    /* ============ BEAT 5 — FULL PIPELINE (LINK-OUT) ============ */
    .pipeline-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .pipeline-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0.5rem auto 0.75rem;
    }
    .pipeline-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pipeline-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.6;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }
    .pipeline-subline strong { color: var(--text-primary); font-weight: 500; }
    .pipeline-cta-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1rem 0 2.5rem;
    }
    /* Round 3 P4 — bottom CTA row: extra top margin to separate from the callout */
    .pipeline-cta-row--foot {
      margin: 2.5rem 0 1rem;
    }
    /* Round 4 P5 — stack CTA buttons vertically on phone, full-width per row */
    @media (max-width: 520px) {
      .pipeline-cta-row { flex-direction: column; align-items: stretch; gap: 0.6rem; }
      .pipeline-cta, .pipeline-cta-continue, .pipeline-cta-secondary {
        width: 100%;
        justify-content: center;
      }
    }
    /* R8 C3 — Beat 5 secondary Continue scaled up alongside the new prominent .scene-continue */
    .pipeline-cta-continue {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 16px 38px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
      transition: background 300ms ease, transform 200ms ease, box-shadow 300ms ease;
      /* R10 C — breathing pulse delayed 8s from beat mount */
      animation: stv-continue-breathe 2500ms ease-in-out 8000ms infinite;
    }
    .pipeline-cta-continue:hover {
      background: var(--accent-deep);
      transform: translateY(-1px);
      box-shadow: 0 14px 36px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    .pipeline-cta-continue .pipeline-cta-arrow {
      font-size: 1.15em;
      line-height: 1;
      transition: transform 200ms ease;
    }
    .pipeline-cta-continue:hover .pipeline-cta-arrow {
      transform: translateX(5px);
    }
    @media (max-width: 520px) {
      .pipeline-cta-continue { padding: 13px 28px; font-size: 1rem; }
    }
    .pipeline-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: linear-gradient(180deg, var(--accent-deep) 0%, var(--accent) 100%);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
      transition: transform 200ms ease, box-shadow 200ms ease, background 300ms ease;
      text-decoration: none;
      mix-blend-mode: normal;
    }
    .pipeline-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 40%, transparent);
      background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent-deep) 100%);
    }
    .pipeline-cta-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.78);
      text-transform: uppercase;
    }
    .pipeline-cta-arrow {
      display: inline-block;
      transition: transform 200ms ease;
    }
    .pipeline-cta:hover .pipeline-cta-arrow { transform: translateX(4px); }

    .pipeline-cta-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease;
    }
    .pipeline-cta-secondary:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    .pipeline-stages {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }
    @media (min-width: 720px) {
      .pipeline-stages { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    /* Round 4 P5 — 2-column on narrow phones so each stage card stays readable */
    @media (max-width: 414px) {
      .pipeline-stages { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.55rem; }
      .pipeline-stage-panel { padding: 1rem 1.1rem 1.1rem; }
      .pipeline-stage-panel-name { font-size: clamp(1rem, 4.4vw, 1.25rem); }
    }
    /* Pipeline stage card — Round 2 Phase B5 reworked as a clickable button */
    .pipeline-stage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.75rem 0.6rem;
      text-align: left;
      transition: border-color 220ms ease, transform 220ms ease, background 220ms ease, box-shadow 220ms ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      font: inherit;
      width: 100%;
      display: block;
    }
    .pipeline-stage-card:hover {
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
      transform: translateY(-1px);
      box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .pipeline-stage-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .pipeline-stage-card[data-wow='true'] {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .pipeline-stage-card[data-expanded='true'] {
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    /* Round 3 P4 — dropped the literal "WOW" caption. The brand-accent border
       and box-shadow on data-wow='true' cards do the visual work; viewers
       perceive Stage 13 as the featured beat without being told. */
    .pipeline-stage-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .pipeline-stage-name {
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .pipeline-stage-expand {
      position: absolute;
      bottom: 6px; right: 8px;
      width: 14px; height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1;
      color: var(--text-muted);
      opacity: 0.7;
      transition: color 200ms ease, opacity 200ms ease;
    }
    /* R5 E2 — proportional duration bar at the bottom of each stage card */
    .pipeline-stage-duration {
      position: relative;
      margin-top: 0.55rem;
      padding-top: 0.45rem;
      border-top: 1px dashed color-mix(in srgb, var(--border) 80%, transparent);
      height: 8px;
    }
    .pipeline-stage-duration-fill {
      position: absolute;
      left: 0; bottom: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 1.5px;
      opacity: 0.55;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1), opacity 200ms ease;
    }
    .pipeline-stage-card:hover .pipeline-stage-duration-fill,
    .pipeline-stage-card[data-expanded='true'] .pipeline-stage-duration-fill {
      opacity: 0.95;
    }
    .pipeline-stage-duration-lbl {
      position: absolute;
      right: 0; top: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0.65;
    }
    .pipeline-stage-card[data-wow='true'] .pipeline-stage-duration-lbl {
      color: var(--accent);
      opacity: 0.95;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pipeline-stage-card:hover .pipeline-stage-expand,
    .pipeline-stage-card[data-expanded='true'] .pipeline-stage-expand {
      color: var(--accent);
      opacity: 1;
    }

    /* Expanded panel below stage grid (one at a time) */
    .pipeline-stage-panel {
      width: 100%;
      max-width: 920px;
      margin: 1rem auto 0;
      padding: 1.25rem 1.5rem 1.4rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 28%, transparent) 0%, var(--border) 60%, color-mix(in srgb, var(--accent) 8%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      box-shadow: 0 10px 28px color-mix(in srgb, var(--accent) 10%, transparent);
      animation: stv-stage-panel-in 320ms cubic-bezier(0.25, 0.1, 0.25, 1);
      text-align: left;
    }
    @keyframes stv-stage-panel-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pipeline-stage-panel-head {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .pipeline-stage-panel-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      flex-shrink: 0;
    }
    .pipeline-stage-panel-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 500;
      color: var(--text-primary);
      margin: 0;
      flex: 1;
      letter-spacing: -0.018em;
      line-height: 1.2;
    }
    .pipeline-stage-panel-wow {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 2px 8px;
      background: var(--accent);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      border-radius: 999px;
      vertical-align: middle;
      font-weight: 600;
    }
    .pipeline-stage-panel-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 200ms ease, color 200ms ease;
    }
    .pipeline-stage-panel-close:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .pipeline-stage-panel-detail {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-primary);
      margin: 0 0 0.9rem;
      max-width: 64ch;
    }
    .pipeline-stage-panel-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .pipeline-stage-panel-meta-pill {
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .pipeline-callout {
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      background:
        linear-gradient(135deg, var(--surface-elevated) 0%, color-mix(in srgb, var(--accent) 4%, var(--surface-elevated)) 100%) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 60%, transparent) 0%, var(--accent) 50%, color-mix(in srgb, var(--accent) 35%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      max-width: 720px;
      width: 100%;
      text-align: left;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 30px color-mix(in srgb, var(--accent) 16%, transparent);
    }
    .pipeline-callout-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pipeline-callout-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.35;
      margin: 0 0 0.5rem 0;
    }
    .pipeline-callout-body {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* 4.6 — Inline Stage 13 multi-language preview (the WOW moment) */
    .stage13-wrap {
      max-width: 1100px;
      width: 100%;
      margin: 2.5rem auto 1rem;
    }
    .stage13-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.875rem;
      margin-bottom: 1rem;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      width: fit-content;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1), color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stage13-banner-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: stv-pulse 1100ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stage13-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1rem;
    }
    @media (max-width: 880px) {
      .stage13-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .stage13-grid { grid-template-columns: 1fr; }
    }
    .stage13-col {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 28%, transparent) 0%, var(--border) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(8px);
      animation: stv-stage13-col-in 600ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 230px;
      text-align: left;
    }
    @keyframes stv-stage13-col-in {
      to { opacity: 1; transform: translateY(0); }
    }
    .stage13-col-flag {
      height: 60px;
      background: var(--surface-elevated);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .stage13-col-flag svg {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.92;
    }
    .stage13-col-flag::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--surface) 60%, transparent) 100%);
      pointer-events: none;
    }
    .stage13-col-body {
      padding: 0.875rem 0.875rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .stage13-col-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .stage13-col-heading {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      margin: 0;
      font-weight: 500;
    }
    .stage13-col-headline {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-primary);
      margin: 0;
    }
    .stage13-col-body-text {
      font-size: 11.5px;
      line-height: 1.45;
      color: var(--text-muted);
      margin: 0;
    }
    /* Native typography per language column (audit E5) */
    .stage13-col[data-lang='en'] .stage13-col-headline,
    .stage13-col[data-lang='en'] .stage13-col-body-text { font-family: 'Fraunces', Georgia, serif; }
    .stage13-col[data-lang='de'] .stage13-col-headline,
    .stage13-col[data-lang='de'] .stage13-col-body-text { font-family: 'Bitter', 'Fraunces', Georgia, serif; letter-spacing: 0; }
    .stage13-col[data-lang='it'] .stage13-col-headline,
    .stage13-col[data-lang='it'] .stage13-col-body-text { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; font-size: 15px; }
    .stage13-col[data-lang='es'] .stage13-col-headline,
    .stage13-col[data-lang='es'] .stage13-col-body-text { font-family: 'Cormorant Garamond', 'Fraunces', Georgia, serif; font-size: 14.5px; }
    .stage13-col[data-lang='fr'] .stage13-col-headline,
    .stage13-col[data-lang='fr'] .stage13-col-body-text { font-family: 'Marcellus', 'Fraunces', Georgia, serif; font-size: 14.5px; letter-spacing: 0.005em; }

    /* ============ BEAT 6 — OUTPUT THROUGH USERS' EYES ============ */
    .output-scene {
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2.5rem 1.5rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    @media (min-width: 880px) {
      .output-scene {
        grid-template-columns: 1.1fr 1fr;
        gap: 2rem;
        padding: 3rem 2rem 5rem;
      }
    }
    .output-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .output-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.30em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .output-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .output-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      max-width: 36ch;
      margin: 0 auto;
    }
    .output-headline em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* R5 A6 — "your users" promoted to italic-display moment with line-break */
    .output-headline--magazine {
      max-width: 24ch;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    .output-headline-promo {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-variation-settings: 'opsz' 96;
      margin: 0.15em 0;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Round 2 Phase B6 — phone showcase wrapper (phone + annotation labels) */
    .phone-showcase {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.75rem;
      align-items: center;
      padding: 1rem 0 1.5rem;
    }
    @media (min-width: 880px) {
      .phone-showcase {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 2.5rem;
        padding: 1.25rem 0 2rem;
      }
    }
    .phone-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1rem;
      min-height: 420px;
      gap: 0.875rem;
    }
    /* R6 P5 — country selector row above the iPhone (eToro only) */
    .country-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      max-width: 100%;
    }
    .country-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 200ms ease, border-color 200ms ease, color 200ms ease, transform 200ms ease;
    }
    .country-pill:hover {
      color: var(--text-primary);
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
    }
    .country-pill[data-active='true'] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: scale(1.04);
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 25%, transparent);
    }
    .country-pill-flag {
      width: 14px; height: 10px;
      flex-shrink: 0;
      border-radius: 1.5px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15) inset;
    }
    .country-pill-flag svg { width: 100%; height: 100%; display: block; }
    .country-pill-label { white-space: nowrap; }
    @media (max-width: 720px) {
      .country-pill { padding: 4px 8px; font-size: 8.5px; gap: 4px; }
      .country-pill-flag { width: 12px; height: 8px; }
    }
    .brand-phone {
      width: 100%;
      max-width: 280px;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 24px 60px rgba(0,0,0,0.18))
        drop-shadow(0 8px 24px color-mix(in srgb, var(--accent) 16%, transparent));
      transition: filter 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Round 4 P6 — phone showcase mobile: smaller iPhone, callouts as plain
       vertical list below, ops cells go single-column. */
    @media (max-width: 720px) {
      .phone-stage { min-height: 380px; padding: 0.5rem; }
      .brand-phone { max-width: 220px; }
      .phone-callout { padding: 0.6rem 0.75rem; }
    }
    @media (max-width: 414px) {
      .brand-phone { max-width: 200px; }
      .phone-stage { min-height: 340px; }
    }
    /* Annotation labels around the phone — connector lines drawn via ::before */
    .phone-callouts {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      align-self: center;
      max-width: 100%;
    }
    .phone-callout {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 0.65rem;
      padding: 0.75rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      transition: border-color 220ms ease, transform 220ms ease, box-shadow 220ms ease;
    }
    .phone-callout:hover {
      transform: translateX(2px);
      box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .phone-callout-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      align-self: start;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phone-callout-body { min-width: 0; }
    .phone-callout-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.25;
      margin-bottom: 0.25rem;
      letter-spacing: -0.01em;
    }
    .phone-callout-text {
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .phone-foot-note {
      grid-column: 1 / -1;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: -0.5rem;
      opacity: 0.78;
    }
    .phone-foot-note-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.5rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Round 3 P5 — full-screen video modal (StockerTV demo video) */
    .stv-video-modal {
      position: fixed;
      inset: 0;
      z-index: 1500;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2rem;
      animation: stv-video-modal-in 280ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes stv-video-modal-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .stv-video-modal-close {
      position: absolute;
      top: 18px; right: 22px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 200ms ease, transform 200ms ease;
    }
    .stv-video-modal-close:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(1.05);
    }
    .stv-video-modal-stage {
      width: 100%;
      max-width: 1024px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }
    /* Round 4 P6 — full-viewport video on phone (no max-width constraint) */
    @media (max-width: 720px) {
      .stv-video-modal { padding: 0.75rem; gap: 0.5rem; }
      .stv-video-modal-stage { border-radius: 4px; max-width: 100%; }
      .stv-video-modal-close {
        top: 12px; right: 12px;
        width: 44px; height: 44px;
      }
      .stv-video-modal-caption { font-size: 9.5px; padding: 0 0.5rem; text-align: center; }
    }
    .stv-video-modal-video {
      width: 100%;
      height: 100%;
      display: block;
    }
    .stv-video-modal-caption {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.72);
      text-transform: uppercase;
    }

    /* User surface preview (phone-ish mockup) */
    .user-preview {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent) 0%, var(--border) 55%, color-mix(in srgb, var(--accent) 12%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 16px 40px rgba(0,0,0,0.10),
                  0 0 0 1px color-mix(in srgb, var(--accent) 6%, transparent),
                  0 30px 80px color-mix(in srgb, var(--accent) 12%, transparent);
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1), box-shadow 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .user-preview-frame {
      background: var(--surface-elevated);
      border-radius: 10px;
      padding: 1rem 1rem 0.75rem;
    }
    .user-preview-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.875rem;
      margin-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .user-preview-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .user-preview-name {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    .user-preview-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .user-preview-card {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    .user-preview-card:last-child { border-bottom: none; }
    .user-preview-thumb {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent-deep) 0%, var(--accent) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      position: relative;
    }
    .user-preview-thumb--portrait { padding: 0; }
    .user-preview-thumb--portrait svg { width: 100%; height: 100%; display: block; }

    /* Audio-suggesting waveform under reporter portrait (audit E6) */
    .stv-waveform {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      height: 10px;
      margin: 0 0.4rem;
    }
    .stv-waveform span {
      display: inline-block;
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
      animation: stv-wave 1400ms ease-in-out infinite;
      transform-origin: center;
    }
    .stv-waveform span:nth-child(1) { animation-delay: 0ms;   height: 4px; }
    .stv-waveform span:nth-child(2) { animation-delay: 120ms; height: 7px; }
    .stv-waveform span:nth-child(3) { animation-delay: 240ms; height: 9px; }
    .stv-waveform span:nth-child(4) { animation-delay: 360ms; height: 6px; }
    .stv-waveform span:nth-child(5) { animation-delay: 480ms; height: 8px; }
    .stv-waveform span:nth-child(6) { animation-delay: 600ms; height: 5px; }
    .stv-waveform span:nth-child(7) { animation-delay: 720ms; height: 7px; }
    @keyframes stv-wave {
      0%, 100% { transform: scaleY(0.55); opacity: 0.55; }
      50%      { transform: scaleY(1); opacity: 1; }
    }
    .user-preview-body { flex: 1; min-width: 0; }
    .user-preview-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .user-preview-meta-flag {
      display: inline-block;
      width: 13px;
      height: 9px;
      vertical-align: middle;
      border-radius: 1px;
      margin-right: 4px;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border) inset;
    }
    .user-preview-meta-flag svg { width: 100%; height: 100%; display: block; }
    .user-preview-headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      line-height: 1.35;
      color: var(--text-primary);
      margin: 0;
      font-weight: 500;
    }
    .user-preview-foot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }
    .user-preview-pill {
      padding: 1px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
    }
    .user-preview-pill[data-tone='accent'] {
      color: var(--accent);
      border-color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1), border-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Operational metrics panel */
    .ops-panel {
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, transparent) 0%, var(--border) 55%, color-mix(in srgb, var(--accent) 8%, transparent) 100%) border-box;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 1.25rem;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-panel-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ops-panel-eyebrow-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: stv-pulse 2400ms ease-in-out infinite;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem 1rem;
    }
    /* Round 4 P6 — ops cells are already 2-col which works at 375px;
       on very narrow viewports drop to single column for breathing room */
    @media (max-width: 360px) {
      .ops-grid { grid-template-columns: 1fr; }
    }
    .ops-cell {
      padding: 0.875rem 0.875rem;
      background: var(--surface-elevated);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }
    /* R5 E1 — wide ops cell spans 2 columns to host the area chart */
    .ops-cell--wide {
      grid-column: 1 / -1;
      padding: 1rem 1rem;
    }
    .ops-area {
      margin: 0.55rem 0 0.6rem;
      width: 100%;
    }
    .ops-area-svg {
      width: 100%;
      height: 56px;
      display: block;
    }
    .ops-area-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 0.3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0.75;
    }
    /* 4.7 — Sparkline on ops cells */
    .ops-cell-sparkline {
      width: 100%;
      height: 18px;
      margin: 0.4rem 0 0.55rem;
      display: block;
    }
    .ops-cell-sparkline path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.4;
      opacity: 0.65;
      transition: stroke 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-cell-sparkline circle {
      fill: var(--accent);
      transition: fill 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* E6 — User preview screen reflection (subtle scroll-tied gradient) */
    .user-preview {
      position: relative;
    }
    .user-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        100deg,
        transparent 0%,
        color-mix(in srgb, var(--accent) 8%, transparent) var(--reflectPos, 30%),
        color-mix(in srgb, white 6%, transparent) calc(var(--reflectPos, 30%) + 6%),
        transparent calc(var(--reflectPos, 30%) + 30%)
      );
      border-radius: 16px;
      transition: background 1200ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ops-cell-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .ops-cell-value[data-tone='accent'] { color: var(--accent); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .ops-cell-value[data-tone='success'] { color: var(--green); transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1); }
    .ops-cell-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .ops-cell-foot {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 0.35rem;
      line-height: 1.3;
    }

    .output-foot {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 1rem;
    }
    .output-subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--text-muted);
      max-width: 64ch;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin: 0 auto 1.5rem;
    }
    .output-subline strong { color: var(--text-primary); font-weight: 500; }

    /* 1.1 — Bottom-right beat pager (replaces per-scene Continue buttons) */
    .stv-pager {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 60;
      padding: 0.625rem 0.875rem;
      background:
        linear-gradient(var(--surface), var(--surface)) padding-box,
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 28%, transparent) 0%, var(--border) 60%) border-box;
      border: 1px solid transparent;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 0.625rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 720px) {
      .stv-pager {
        right: 50%;
        transform: translateX(50%);
        bottom: 1rem;
      }
    }
    .stv-pager-current {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
      padding-right: 0.4rem;
      border-right: 1px solid var(--border);
    }
    .stv-pager-current-num {
      color: var(--text-primary);
      font-weight: 600;
    }
    .stv-pager-current-name {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 11.5px;
      color: var(--text-primary);
      letter-spacing: -0.005em;
      text-transform: none;
      margin-left: 4px;
    }
    .stv-pager-dots {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    /* Round 4 P7 — pager dots: visible at 8px, but click-target padded to 16px */
    .stv-pager-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 200ms ease, border-color 200ms ease, transform 200ms ease;
      position: relative;
    }
    /* Round 4 P7 — invisible 32×32 hit area on touch via padded ::before */
    @media (hover: none) and (pointer: coarse) {
      .stv-pager-dot::before {
        content: '';
        position: absolute;
        inset: -12px;
        border-radius: 50%;
      }
    }
    .stv-pager-dot:hover {
      transform: scale(1.3);
      border-color: var(--text-muted);
    }
    .stv-pager-dot[data-active='true'] {
      background: var(--accent);
      border-color: var(--accent);
      width: 10px; height: 10px;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    .stv-pager-dot[data-visited='true']:not([data-active='true']) {
      background: color-mix(in srgb, var(--accent) 35%, transparent);
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .stv-pager-keys {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      padding-left: 0.4rem;
      border-left: 1px solid var(--border);
    }
    @media (max-width: 480px) {
      .stv-pager-current { display: none; }
      .stv-pager-keys { display: none; }
    }

    /* D1 — letter-spacing entry animation on text mounts */
    .stv-letter-enter {
      animation: stv-letter-spread 700ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes stv-letter-spread {
      from { letter-spacing: 0.08em; opacity: 0; }
      to   { letter-spacing: inherit; opacity: 1; }
    }

    /* R1 3.6 ink-fill hover — DELETED in R8 C3 (the new prominent button is filled
       by default, so the ink-fill-on-hover would conflict and look broken). */

    /* "Live data simulation" badge per L.1 */
    .sim-badge {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      opacity: 0.42;
      pointer-events: none;
      z-index: 40;
      max-width: 280px;
      line-height: 1.4;
    }
    .sim-badge strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ============ BEAT 7 — CLOSE ============ */
    .close-scene {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      position: relative;
    }
    /* Background wash on close scene — wider, more prominent */
    .close-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, color-mix(in srgb, var(--accent) 14%, transparent) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: background 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.34em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 200ms forwards;
    }
    .close-eyebrow-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.6rem;
      vertical-align: middle;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-line {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      max-width: 22ch;
      margin: 0;
      filter: blur(20px);
      opacity: 0;
      animation: stv-blur-focus 1800ms cubic-bezier(0.25, 0.1, 0.25, 1) 600ms forwards;
    }
    .close-line em {
      color: var(--accent);
      font-style: italic;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* R5 A7 — XL close line: bigger Fraunces at full opsz */
    .close-line--xl {
      font-size: clamp(4rem, 12vw, 9rem);
      letter-spacing: -0.04em;
      line-height: 1.0;
      max-width: 18ch;
      font-variation-settings: 'opsz' 144;
    }
    .close-line--xl em {
      font-style: italic;
      font-variation-settings: 'opsz' 144;
    }
    /* R6 P6 + R7 Fix 1 — two interlinked circles (rebuilt as inline SVG so
       text-anchor positions each label OUT of the overlap region). */
    .close-circles {
      margin: 0 auto 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      opacity: 0;
      animation: stv-close-circles-in 1400ms cubic-bezier(0.25, 0.1, 0.25, 1) 300ms forwards;
    }
    @keyframes stv-close-circles-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .close-circles-svg {
      width: clamp(300px, 80vw, 420px);
      height: auto;
      display: block;
      filter: drop-shadow(0 12px 32px rgba(0,0,0,0.06))
              drop-shadow(0 12px 32px color-mix(in srgb, var(--accent) 10%, transparent));
    }
    .close-circles-caption {
      font-family: 'Helvetica', Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 500;
    }
    .close-circles-rule {
      width: 80px;
      height: 1px;
      background: var(--text-muted);
      opacity: 0.3;
      margin-top: -0.4rem;
    }
    @media (max-width: 720px) {
      .close-circles { gap: 0.85rem; }
      .close-circles-caption { font-size: 11px; letter-spacing: 0.22em; padding: 0 1rem; text-align: center; }
    }
    .close-accent-line {
      width: 80px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0;
      animation: stv-line-grow 1200ms cubic-bezier(0.25, 0.1, 0.25, 1) 1800ms forwards;
      transform-origin: center;
      transition: background 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-mark {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0;
      animation: stv-fade-in 1000ms cubic-bezier(0.25, 0.1, 0.25, 1) 2200ms forwards;
      display: inline-flex;
      align-items: baseline;
      gap: 0.55rem;
    }
    .close-mark em {
      font-style: italic;
      color: var(--accent);
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-mark-stv { position: relative; color: var(--text-primary); }
    /* E7 — wordmark shimmer animation */
    .close-mark-shimmer {
      position: absolute;
      inset: -2px -4px;
      background: linear-gradient(110deg, transparent 30%, color-mix(in srgb, var(--accent) 38%, transparent) 50%, transparent 70%);
      background-size: 200% 100%;
      background-position: -100% 0;
      animation: stv-mark-shimmer 4000ms linear infinite;
      mix-blend-mode: screen;
      pointer-events: none;
      border-radius: 4px;
    }
    @keyframes stv-mark-shimmer {
      0%   { background-position: -120% 0; }
      35%  { background-position: 120% 0; }
      100% { background-position: 120% 0; }
    }
    .close-mark-x {
      color: var(--text-muted);
      opacity: 0.6;
      font-size: 14px;
      font-style: normal;
    }
    .close-mark-brand {
      color: var(--accent);
      font-style: italic;
      font-weight: 500;
      transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .close-restart {
      margin-top: 4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: color 200ms ease, border-color 200ms ease;
      border: 1px solid transparent;
      border-radius: 2px;
      background: transparent;
      opacity: 0;
      animation: stv-fade-in 800ms cubic-bezier(0.25, 0.1, 0.25, 1) 3000ms forwards;
    }
    .close-restart:hover {
      color: var(--accent);
      border-color: var(--border);
    }
    .close-restart-arrow {
      display: inline-block;
      margin-left: 0.5rem;
      transition: transform 200ms ease;
    }
    .close-restart:hover .close-restart-arrow { transform: translateX(-4px); }
  </style>
</head>
<body>

<div id="root"></div>

<!-- Atmospheric blur orbs per scene (audit C1) — brand-tinted via --accent -->
<div class="stv-atmosphere" aria-hidden="true">
  <div class="stv-orb stv-orb--a"></div>
  <div class="stv-orb stv-orb--b"></div>
  <div class="stv-orb stv-orb--c"></div>
</div>

<!-- Texture overlays per Beat 3.D -->
<div class="stv-paper-fiber" aria-hidden="true"></div>
<div class="stv-grain" aria-hidden="true"></div>

<div class="stv-watermark" aria-hidden="true">

  // ============================================================================
  const RIBBON_EXCHANGES = [
    { code: 'TYO',     name: 'Tokyo',         openUtc: 0,    closeUtc: 6,    region: 'APAC' },
    { code: 'HKEX',    name: 'Hong Kong',     openUtc: 1.5,  closeUtc: 8,    region: 'APAC' },

    { code: 'LSE',     name: 'London',        openUtc: 8,    closeUtc: 16.5, region: 'EU' },
    { code: 'XETRA',   name: 'Frankfurt',     openUtc: 8,    closeUtc: 16.5, region: 'EU' },
    { code: 'EURONEXT',name: 'Paris',         openUtc: 8,    closeUtc: 16.5, region: 'EU' },
    { code: 'B3',      name: 'São Paulo',     openUtc: 13,   closeUtc: 20,   region: 'LATAM' },
    { code: 'NYSE',    name: 'New York',      openUtc: 14.5, closeUtc: 21,   region: 'NA' },
    { code: 'NASDAQ',  name: 'Nasdaq',        openUtc: 14.5, closeUtc: 21,   region: 'NA' },
    { code: 'BMV',     name: 'Mexico City',   openUtc: 15.5, closeUtc: 22,   region: 'NA' },
    { code: 'ASX',     name: 'Sydney',        openUtc: 23,   closeUtc: 30,   region: 'APAC' }, // wraps past 24
  ];

  function isOpenAt(ex, utcHr) {
    if (ex.closeUtc <= 24) return utcHr >= ex.openUtc && utcHr < ex.closeUtc;
    // Wrapped (ASX): open if utcHr ≥ openUtc OR utcHr < (closeUtc - 24)
    return utcHr >= ex.openUtc || utcHr < (ex.closeUtc - 24);
  }

  function ExchangeOpeningRibbon() {
    const [now, setNow] = useState(() => new Date());
    useEffect(() => {
      const t = setInterval(() => setNow(new Date()), 30000);
      return () => clearInterval(t);
    }, []);
    const utcHr = now.getUTCHours() + now.getUTCMinutes() / 60;
    const nowPct = (utcHr / 24) * 100;
    const utcLabel = `${String(now.getUTCHours()).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')} UTC`;
    const openExchanges = RIBBON_EXCHANGES.filter((e) => isOpenAt(e, utcHr));

    return (
      <div className="ribbon" aria-label={`Exchange-opening ribbon · ${utcLabel} · ${openExchanges.length} exchanges currently live`}>
        <div className="ribbon-head">
          <div className="ribbon-head-eyebrow">
            <span className="ribbon-head-dot" aria-hidden="true" />
            Live coverage
            <span className="ribbon-head-divider" aria-hidden="true">·</span>

          </div>

            <span className="ribbon-head-stat-lbl">currently live</span>
          </div>
        </div>
        <div className="ribbon-grid">
          {/* Hour ticks 00 / 06 / 12 / 18 / 24 */}
          <div className="ribbon-axis" aria-hidden="true">
            {[0, 6, 12, 18, 24].map((h) => (
              <div key={h} className="ribbon-axis-tick" style={{ left: `${(h / 24) * 100}%` }}>
                <span className="ribbon-axis-lbl">{String(h).padStart(2, '0')}</span>
              </div>
            ))}
          </div>
          {/* Per-exchange row */}
          <div className="ribbon-rows">
            {RIBBON_EXCHANGES.map((ex) => {
              const live = isOpenAt(ex, utcHr);
              // Render bar(s). For wrapped exchanges, render two bars.
              const bars = [];
              if (ex.closeUtc <= 24) {
                bars.push({ left: (ex.openUtc / 24) * 100, width: ((ex.closeUtc - ex.openUtc) / 24) * 100 });
              } else {
                bars.push({ left: (ex.openUtc / 24) * 100, width: ((24 - ex.openUtc) / 24) * 100 });
                bars.push({ left: 0, width: ((ex.closeUtc - 24) / 24) * 100 });
              }
              return (
                <div className="ribbon-row" key={ex.code} data-live={live}>
                  <span className="ribbon-row-lbl">
                    {live && <span className="ribbon-row-pulse" aria-hidden="true" />}
                    {ex.name}
                  </span>
                  <div className="ribbon-row-track">
                    {bars.map((b, i) => (
                      <div
                        key={i}
                        className="ribbon-row-bar"
                        style={{ left: `${b.left}%`, width: `${b.width}%` }}
                      />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          {/* Vertical "now" line */}
          {/* R6 P2 — left position is interpolated INSIDE the bars area only.
              Use CSS var --gutter (96px desktop / 64px ≤720px) so the line never
              extends past the right edge of the ribbon container. */}
          <div
            className="ribbon-now-line"
            style={{ left: `calc(var(--gutter, 96px) + (100% - var(--gutter, 96px)) * ${nowPct} / 100)` }}
            aria-hidden="true"
          >
            <div className="ribbon-now-line-marker" />
          </div>
        </div>
      </div>
    );
